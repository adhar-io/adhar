version: 2

project_name: adhar

before:
  hooks:
    - go mod tidy
    - go generate ./...

release:
  # Tags containing a prerelease suffix (e.g. v0.2.0-rc.1) are marked as prerelease
  prerelease: auto
  draft: false
  header: |
    ## Adhar {{ .Tag }}

    Install via Homebrew (`brew install adhar-io/tap/adhar`), container image
    (`ghcr.io/adhar-io/adhar:{{ .Version }}`), or download a binary below.

builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -X adhar-io/adhar/cmd/version.Version={{ .Version }}
      - -X adhar-io/adhar/cmd/version.GitCommit={{ .FullCommit }}
      - -X adhar-io/adhar/cmd/version.BuildDate={{ .CommitDate }}
      - -w
      - -s
    binary: adhar

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - docs/**/*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

dockers:
  - image_templates:
      - ghcr.io/adhar-io/adhar:{{ .Version }}-amd64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goarch: amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description=Adhar - Open Foundation for Cloud-Native Platform Engineering
      - --label=org.opencontainers.image.source=https://github.com/adhar-io/adhar
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=Apache-2.0
  - image_templates:
      - ghcr.io/adhar-io/adhar:{{ .Version }}-arm64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goarch: arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description=Adhar - Open Foundation for Cloud-Native Platform Engineering
      - --label=org.opencontainers.image.source=https://github.com/adhar-io/adhar
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=Apache-2.0

docker_manifests:
  - name_template: ghcr.io/adhar-io/adhar:{{ .Version }}
    image_templates:
      - ghcr.io/adhar-io/adhar:{{ .Version }}-amd64
      - ghcr.io/adhar-io/adhar:{{ .Version }}-arm64
  - name_template: ghcr.io/adhar-io/adhar:latest
    # Don't move the `latest` tag for prereleases
    skip_push: auto
    image_templates:
      - ghcr.io/adhar-io/adhar:{{ .Version }}-amd64
      - ghcr.io/adhar-io/adhar:{{ .Version }}-arm64

brews:
  - name: adhar
    homepage: "https://adhar.io"
    description: "Open Foundation for Cloud-Native Platform Engineering"
    license: "Apache-2.0"
    # Skipped automatically when no Homebrew tap token is available
    # (e.g. local snapshots or releases from forks); also skipped for prereleases.
    skip_upload: '{{ if envOrDefault "HOMEBREW_TOKEN" "" }}auto{{ else }}true{{ end }}'
    repository:
      owner: adhar-io
      name: homebrew-tap
      token: '{{ envOrDefault "HOMEBREW_TOKEN" "" }}'
    commit_author:
      name: "AdharAutomation"
      email: "noreply@adhar.io"
    directory: Formula
    install: |
      bin.install "adhar"
    test: |
      system "#{bin}/adhar version --short"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: "✨ Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "🔧 Other Changes"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
