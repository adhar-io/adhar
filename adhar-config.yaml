# Production-Ready Adhar Configuration
# This file demonstrates how to configure production Kubernetes clusters
# across multiple cloud providers with Cilium CNI and platform components

# Global Settings
globalSettings:
  adharContext: "adhar-management"
  defaultHost: "adhar.production.example.com"
  defaultHttpPort: 80
  defaultHttpsPort: 443
  defaultRegion: "us-east1"

  # Dual-Provider Configuration
  # Production provider is used for management cluster and production environments
  productionProvider: "gke"
  productionRegion: "us-east1-a"
  
  # Non-production provider is used for dev/test/staging environments
  nonProductionProvider: "do"
  nonProductionRegion: "nyc3"

  # Provider Credentials Configuration
  providerCredentials:
    # DigitalOcean
    do:
      type: environment
      envVar: DIGITALOCEAN_TOKEN

    # Google Cloud Platform
    gke:
      type: file
      path: "~/.config/gcloud/application_default_credentials.json"
      projectID: "my-production-project"

    # Amazon Web Services
    aws:
      type: environment
      # Uses standard AWS environment variables: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY

    # Microsoft Azure
    azure:
      type: environment
      # Uses standard Azure environment variables: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID

    # Civo Cloud
    civo:
      type: environment
      envVar: CIVO_TOKEN

# Environment Templates for reusable configurations
environmentTemplates:
  # Production template with high availability and security
  production-defaults:
    clusterConfig:
      - key: "autoScale"
        value: "true"
      - key: "minNodes"
        value: "3"
      - key: "maxNodes"
        value: "10"
    coreServices:
      cilium:
        chart:
          repoURL: "https://helm.cilium.io/"
          name: "cilium"
          version: "1.15.7"
        values:
          - key: "cluster.name"
            value: "production-cluster"
          - key: "kubeProxyReplacement"
            value: "strict"
          - key: "hubble.enabled"
            value: "true"
          - key: "hubble.relay.enabled"
            value: "true"
          - key: "hubble.ui.enabled"
            value: "true"
          - key: "encryption.enabled"
            value: "true"
          - key: "encryption.type"
            value: "wireguard"
          - key: "operator.replicas"
            value: "2"
      nginx:
        chart:
          repoURL: "https://kubernetes.github.io/ingress-nginx"
          name: "ingress-nginx"
          version: "4.10.1"
        values:
          - key: "controller.replicaCount"
            value: "3"
          - key: "controller.service.type"
            value: "LoadBalancer"
      gitea:
        chart:
          repoURL: "https://dl.gitea.com/charts/"
          name: "gitea"
          version: "10.3.0"
        values:
          - key: "postgresql.enabled"
            value: "true"
          - key: "redis.enabled"
            value: "true"
          - key: "persistence.enabled"
            value: "true"
      argocd:
        chart:
          repoURL: "https://argoproj.github.io/argo-helm"
          name: "argo-cd"
          version: "6.11.1"
        values:
          - key: "server.replicas"
            value: "2"
          - key: "controller.replicas"
            value: "2"
          - key: "repoServer.replicas"
            value: "2"
      addons:
        - name: prometheus
          chart:
            repoURL: "https://prometheus-community.github.io/helm-charts"
            name: "kube-prometheus-stack"
            version: "59.0.0"
          targetNamespace: monitoring
          createNamespace: true
          values:
            - key: "grafana.enabled"
              value: "true"
            - key: "prometheus.prometheusSpec.retention"
              value: "30d"

        - name: cert-manager
          chart:
            repoURL: "https://charts.jetstack.io"
            name: "cert-manager"
            version: "v1.15.0"
          targetNamespace: cert-manager
          createNamespace: true
          values:
            - key: "installCRDs"
              value: "true"

        - name: external-dns
          chart:
            repoURL: "https://kubernetes-sigs.github.io/external-dns/"
            name: "external-dns"
            version: "1.14.5"
          targetNamespace: external-dns
          createNamespace: true

  # Development template with cost optimization
  development-defaults:
      clusterConfig:
        - key: "autoScale"
          value: "true"
        - key: "minNodes"
          value: "1"
        - key: "maxNodes"
          value: "5"
      coreServices:
        cilium:
          chart:
            repoURL: "https://helm.cilium.io/"
            name: "cilium"
            version: "1.15.7"
        nginx:
          chart:
            repoURL: "https://kubernetes.github.io/ingress-nginx"
            name: "ingress-nginx"
            version: "4.10.1"
        gitea:
          chart:
            repoURL: "https://dl.gitea.com/charts/"
            name: "gitea"
            version: "10.3.0"
        argocd:
          chart:
            repoURL: "https://argoproj.github.io/argo-helm"
            name: "argo-cd"
            version: "6.11.1"
      addons:
        - name: metrics-server
          chart:
            repoURL: "https://kubernetes-sigs.github.io/metrics-server/"
            name: "metrics-server"
            version: "3.12.1"
          targetNamespace: kube-system

# Environment Definitions
environments:
  # Development environments (auto-assigned to non-production provider: DigitalOcean)
  dev:
    type: non-production
    template: development-defaults
    clusterConfig:
      - key: "name"
        value: "adhar-dev"
      - key: "nodeSize"
        value: "s-2vcpu-4gb"
      - key: "nodeCount"
        value: "2"

  # Testing environment (auto-assigned to non-production provider: DigitalOcean)
  test:
    type: non-production
    template: development-defaults
    clusterConfig:
      - key: "name"
        value: "adhar-test"
      - key: "nodeSize"
        value: "s-2vcpu-4gb"
      - key: "nodeCount"
        value: "2"

  # Staging environment (auto-assigned to production provider: GKE for production-like testing)
  staging:
    type: production
    template: production-defaults
    clusterConfig:
      - key: "name"
        value: "adhar-staging"
      - key: "machineType"
        value: "e2-standard-4"
      - key: "numNodes"
        value: "3"
      - key: "projectID"
        value: "my-staging-project"

  # Production environment (auto-assigned to production provider: GKE)
  production:
    type: production
    template: production-defaults
    clusterConfig:
      - key: "name"
        value: "adhar-production"
      - key: "machineType"
        value: "n2-standard-8"
      - key: "numNodes"
        value: "5"
      - key: "projectID"
        value: "my-production-project"
      - key: "releaseChannel"
        value: "STABLE"
      - key: "enableNetworkPolicy"
        value: "true"
      - key: "enablePodSecurityPolicy"
        value: "true"

  # Alternative production environment with explicit provider override
  production-aws:
    type: production
    provider: aws  # Override production provider for this specific environment
    region: us-east-1
    template: production-defaults
    clusterConfig:
      - key: "name"
        value: "adhar-production-aws"
      - key: "nodeInstanceType"
        value: "m5.xlarge"
      - key: "nodeCount"
        value: "6"
      - key: "kubernetesVersion"
        value: "1.29"
      - key: "managedNodeGroup"
        value: "true"

  # Alternative production environment with explicit provider override
  production-azure:
    type: production
    provider: azure  # Override production provider for this specific environment
    region: eastus
    template: production-defaults
    clusterConfig:
      - key: "name"
        value: "adhar-production-azure"
      - key: "resourceGroup"
        value: "rg-adhar-production"
      - key: "vmSize"
        value: "Standard_D4s_v3"
      - key: "nodeCount"
        value: "5"
      - key: "kubernetesVersion"
        value: "1.29"

  # Cost-optimized development environment with explicit provider override
  dev-civo:
    type: non-production
    provider: civo  # Override non-production provider for this specific environment
    region: LON1
    template: development-defaults
    clusterConfig:
      - key: "name"
        value: "adhar-dev-civo"
      - key: "nodeSize"
        value: "g4s.kube.medium"
      - key: "nodeCount"
        value: "2"

  # On-premises deployment (explicit provider override)
  on-premises:
    provider: onprem
    coreServices:
      cilium:
        chart:
          repoURL: "https://helm.cilium.io/"
          name: "cilium"
          version: "1.15.7"
        values:
          - key: "kubeProxyReplacement"
            value: "strict"
          - key: "hubble.enabled"
            value: "true"
      nginx:
        chart:
          repoURL: "https://kubernetes.github.io/ingress-nginx"
          name: "ingress-nginx"
          version: "4.10.1"
        values:
          - key: "controller.service.type"
            value: "NodePort"
    addons:
      - name: metallb
        chart:
          repoURL: "https://metallb.github.io/metallb"
          name: "metallb"
          version: "0.14.3"
        targetNamespace: metallb-system
        createNamespace: true
