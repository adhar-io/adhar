# Adhar Management Cluster Configuration
# This file defines the configuration for the management cluster bootstrap process

cluster:
  # Basic cluster information
  name: "adhar-management"
  kubernetesVersion: "v1.31.7"
  
  # Control plane endpoint (HAProxy load balancer)
  controlPlaneEndpoint: "adhar-mgmt.example.com:7443"
  
  # Network configuration
  networking:
    podSubnet: "10.244.0.0/16"
    serviceSubnet: "10.96.0.0/16"
    dnsDomain: "cluster.local"
  
  # Master nodes configuration
  masters:
    - name: "master01"
      ip: "10.30.155.99"
      hostname: "adhar-master01"
    - name: "master02"
      ip: "10.30.155.100"
      hostname: "adhar-master02"
    - name: "master03"
      ip: "10.30.155.101"
      hostname: "adhar-master03"
  
  # Worker nodes configuration (optional for management cluster)
  workers:
    - name: "worker01"
      ip: "10.30.155.102"
      hostname: "adhar-worker01"
    - name: "worker02"
      ip: "10.30.155.103"
      hostname: "adhar-worker02"

# Cilium configuration
cilium:
  version: "1.15.7"
  features:
    kubeProxyReplacement: true
    hubble: true
    encryption: true
    encryptionType: "wireguard"
    l7Proxy: true
    gatewayAPI: true

# Monitoring configuration
monitoring:
  prometheus:
    enabled: true
    retention: "30d"
    storageSize: "50Gi"
  grafana:
    enabled: true
    adminPassword: "admin123"
  alertmanager:
    enabled: true

# Security configuration
security:
  audit:
    enabled: true
    logPath: "/var/log/kubernetes/audit.log"
    policyFile: "/etc/kubernetes/audit-policy.yaml"
  networkPolicies:
    defaultDeny: true
    allowDNS: true
  rbac:
    enabled: true

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: "30d"
  location: "/opt/adhar-backups"

# Day-2 operations
operations:
  healthCheck:
    interval: "5m"
    enabled: true
  upgrades:
    automatic: false
    maintenance_window: "02:00-04:00"
  logging:
    level: "info"
    retention: "7d"
