# Gitea routed through the Cilium Gateway (adhar-gateway). TLS terminates at the
# Gateway (adhar-cert). The /gitea prefix is stripped before forwarding to
# gitea-http:3000 (URLRewrite ReplacePrefixMatch "/"), preserving the behaviour
# of the previous nginx rewrite-target. NOTE: for fully-correct absolute links
# (redirects, OAuth callbacks, clone URLs) Gitea's ROOT_URL should be set to the
# external URL https://adhar.localtest.me:8443/gitea/ via hack/gitea/values.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitea-server
  namespace: adhar-system
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: gitea
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: gitea
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /gitea
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: gitea-http
          port: 3000
---
# Gitea admin credential, consumed by:
#   * the controller's gitea admin password-sync flow (utils.GiteaAdminSecret),
#   * Backstage's `gitea-credentials` ExternalSecret via the `gitea`
#     ClusterSecretStore (remoteNamespace: adhar-system).
# Values mirror the break-glass admin defined in hack/gitea/values.yaml. When
# StaticPassword mode is enabled the controller rotates the password and patches
# this Secret in place.
apiVersion: v1
kind: Secret
metadata:
  name: gitea-credential
  namespace: adhar-system
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: gitea
type: Opaque
