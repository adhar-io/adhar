apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: adhar-controller
rules:
  - apiGroups: ["platform.adhar.io"]
    resources: ["adharplatforms"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["platform.adhar.io"]
    resources: ["adharplatforms/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["platform.adhar.io"]
    resources: ["adharplatforms/finalizers"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      [
        "services",
        "configmaps",
        "secrets",
        "namespaces",
        "persistentvolumeclaims",
        "serviceaccounts",
      ]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: adhar-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: adhar-controller
subjects:
  - kind: ServiceAccount
    name: default
    namespace: adhar-system
---
# ArgoCD UI/API routed through the Cilium Gateway (adhar-gateway). TLS is
# terminated at the Gateway (adhar-cert); argo-cd-argocd-server runs with
# server.insecure=true and basehref/rootpath /argocd, so we forward plain HTTP
# on port 80 and keep the /argocd prefix (no rewrite).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: adhar-system
  labels:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/instance: argo-cd
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: argocd
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /argocd
      backendRefs:
        - name: argo-cd-argocd-server
          port: 80
