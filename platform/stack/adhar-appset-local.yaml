apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-charts-local
  namespace: adhar-system
spec:
  generators:
    - list:
        elements:
          - name: "external-secrets"
            enabled: "true"
            namespace: "external-secrets"
            category: "security"
            manifestPath: "packages/security/external-secrets/manifests"
          - name: "cert-manager"
            enabled: "true"
            namespace: "cert-manager"
            category: "security"
            manifestPath: "packages/security/cert-manager/manifests"
          - name: "cnpg"
            enabled: "true"
            namespace: "cnpg-system"
            category: "data"
            manifestPath: "packages/data/cnpg/manifests"
          - name: "kyverno"
            enabled: "true"
            namespace: "kyverno"
            category: "security"
            manifestPath: "packages/security/kyverno/manifests"
          - name: "kyverno-policies"
            enabled: "true"
            namespace: "kyverno"
            category: "security"
            manifestPath: "packages/security/kyverno-policies/manifests"
          - name: "jupyterhub"
            enabled: "true"
            namespace: "jupyterhub"
            category: "data"
            manifestPath: "packages/data/jupyterhub/manifests"
          - name: "headlamp"
            enabled: "true"
            namespace: "adhar-system"
            category: "observability"
            manifestPath: "packages/observability/headlamp/manifests"
          - name: "keycloak"
            enabled: "true"
            namespace: "keycloak"
            category: "security"
            manifestPath: "packages/security/keycloak/manifests"
          - name: "argo-workflows"
            enabled: "true"
            namespace: "argo"
            category: "application"
            manifestPath: "packages/application/argo-workflows/manifests/dev"
          - name: "adhar-console"
            enabled: "true"
            namespace: "backstage"
            category: "core"
            manifestPath: "packages/core/adhar-console/manifests"
          - name: "harbor"
            enabled: "true"
            namespace: "harbor"
            category: "application"
            manifestPath: "packages/application/harbor/manifests"
          - name: "kargo"
            enabled: "true"
            namespace: "argocd"
            category: "application"
            manifestPath: "packages/application/kargo/manifests"
          - name: "minio"
            enabled: "true"
            namespace: "minio"
            category: "data"
            manifestPath: "packages/data/minio/manifests"
          - name: "velero"
            enabled: "true"
            namespace: "velero"
            category: "core"
            manifestPath: "packages/core/velero/manifests"
          - name: "spark-operator"
            enabled: "true"
            namespace: "spark-operator"
            category: "data"
            manifestPath: "packages/data/spark-operator/manifests"
          - name: "metrics-server"
            enabled: "true"
            namespace: "kube-system"
            category: "observability"
            manifestPath: "packages/observability/metrics-server/manifests"
          - name: "kube-prometheus"
            enabled: "true"
            namespace: "monitoring"
            category: "observability"
            manifestPath: "packages/observability/kube-prometheus/manifests"
          - name: "loki"
            enabled: "true"
            namespace: "monitoring"
            category: "observability"
            manifestPath: "packages/observability/loki-stack/manifests"
          - name: "opencost"
            enabled: "true"
            namespace: "monitoring"
            category: "observability"
            manifestPath: "packages/observability/opencost/manifests"
          - name: "alloy"
            enabled: "true"
            namespace: "monitoring"
            category: "observability"
            manifestPath: "packages/observability/alloy/manifests"
          - name: "oncall"
            enabled: "true"
            namespace: "monitoring"
            category: "observability"
            manifestPath: "packages/observability/oncall/manifests"
          - name: "tempo"
            enabled: "true"
            namespace: "monitoring"
            category: "observability"
            manifestPath: "packages/observability/tempo/manifests"
          - name: "mimir"
            enabled: "true"
            namespace: "monitoring"
            category: "observability"
            manifestPath: "packages/observability/mimir/manifests"
          - name: "k6"
            enabled: "true"
            namespace: "adhar-system"
            category: "application"
            manifestPath: "packages/application/k6/manifests"
          - name: "crossplane"
            enabled: "true"
            namespace: "crossplane-system"
            category: "infrastructure"
            manifestPath: "packages/infrastructure/crossplane/manifests"
          - name: "terraform"
            enabled: "true"
            namespace: "adhar-system"
            category: "infrastructure"
            manifestPath: "packages/infrastructure/terraform/manifests"
          - name: "dapr"
            enabled: "true"
            namespace: "dapr-system"
            category: "application"
            manifestPath: "packages/application/dapr/manifests"
          - name: "redis"
            enabled: "true"
            namespace: "redis-operator"
            category: "data"
            manifestPath: "packages/data/redis/manifests"
          - name: "keda"
            enabled: "true"
            namespace: "keda"
            category: "application"
            manifestPath: "packages/application/keda/manifests"
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  template:
    metadata:
      finalizers:
        - resources-finalizer.argoproj.io
      labels:
        adhar.io/package-name: "{{ .name }}"
        adhar.io/category: "{{ .category }}"
        environment: "local"
      name: "{{ .name }}"
    spec:
      destination:
        namespace: "{{ .namespace }}"
        server: https://kubernetes.default.svc
      project: default
      sources:
        - path: "{{ .manifestPath }}"
          repoURL: http://gitea-http-clusterip.adhar-system.svc.cluster.local:3000/gitea_admin/packages
          targetRevision: main
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m0s
          limit: 30
        syncOptions:
          - Replace=true
          - CreateNamespace=true
          - ServerSideApply=true
