# JupyterHub routed through the Cilium Gateway (adhar-gateway). TLS terminates
# at the Gateway (adhar-cert). The old nginx Ingress used use-regex with
# rewrite-target: /jupyterhub/$2 on path /jupyterhub(/|$)(.*) -- i.e. it kept the
# /jupyterhub prefix when forwarding (JupyterHub's base_url is /jupyterhub), so
# we ReplacePrefixMatch to /jupyterhub. Backend proxy-public:80 (plain HTTP).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jupyterhub
  namespace: jupyterhub
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - jupyterhub.adhar.localtest.me
    - localhost
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /jupyterhub
      backendRefs:
        - name: proxy-public
          port: 80
