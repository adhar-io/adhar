replicas: 1
mode: standalone

resources:
  requests:
    memory: 128Mi

persistence:
  enabled: true
  storageClass: standard
  size: 512Mi
  volumeName: backup

buckets:
  - name: adhar-backups

# Ingress is disabled: the MinIO console is now exposed via a Gateway API
# HTTPRoute (manifests/httproute.yaml) attached to the Cilium adhar-gateway,
# replacing the old nginx Ingress. If generate-manifests.sh is re-run, do not
# re-enable this -- maintain the HTTPRoute instead.
consoleIngress:
  enabled: false

existingSecret: root-creds
