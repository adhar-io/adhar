apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-sync
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: '-20'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-sync
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: '-20'
rules:
- apiGroups:
  - ''
  resources:
  - secrets
  verbs:
  - get
  - create
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-sync
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: '-20'
subjects:
- kind: ServiceAccount
  name: secret-sync
  namespace: adhar-system
roleRef:
  kind: Role
  name: secret-sync
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: secret-sync
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/hook: PostSync
spec:
  template:
    metadata:
      generateName: secret-sync
    spec:
      serviceAccountName: secret-sync
      restartPolicy: Never
      containers:
      - name: kubectl
        image: docker.io/bitnamilegacy/kubectl:1.31
        command:
        - /bin/bash
        - -c
        args:
        - "set -e\nkubectl get secrets -n adhar-system root-creds -o json > /tmp/secret\n\
          ACCESS=$(jq -r '.data.rootUser | @base64d'  /tmp/secret)\nSECRET=$(jq -r\
          \ '.data.rootPassword | @base64d'  /tmp/secret)\n\necho \\\n\"apiVersion:\
          \ v1\nkind: Secret\nmetadata:\n  name: secret-key\n  namespace: adhar-system\n\
          type: Opaque\nstringData:\n  aws: |\n    [default]\n      aws_access_key_id=${ACCESS}\n\
          \      aws_secret_access_key=${SECRET}\n\" > /tmp/secret.yaml\n\nkubectl\
          \ apply -f /tmp/secret.yaml\n"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-root-creds
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: '-10'
spec:
  template:
    metadata:
      generateName: minio-root-creds
    spec:
      serviceAccountName: secret-sync
      restartPolicy: Never
      containers:
      - name: kubectl
        image: docker.io/bitnamilegacy/kubectl:1.31
        command:
        - /bin/bash
        - -c
        args:
        - "kubectl get secrets -n adhar-system root-creds\nif [ $? -eq 0 ]; then\n\
          \  exit 0\nfi\n\nset -e\n\nNAME=$(openssl rand -base64 24)\nPASS=$(openssl\
          \ rand -base64 36)\n\necho \\\n\"apiVersion: v1\nkind: Secret\nmetadata:\n\
          \  name: root-creds\n  namespace: adhar-system\ntype: Opaque\nstringData:\n\
          \  rootUser: \"${NAME}\"\n  rootPassword: \"${PASS}\"\n\" > /tmp/secret.yaml\n\
          \nkubectl apply -f /tmp/secret.yaml\n"
