# OpenSearch Dashboards UI routed through the Cilium Gateway (adhar-gateway).
# TLS terminates at the Gateway (adhar-cert). Replaces any nginx Ingress. The
# dashboard's server.basePath is /opensearch, so the prefix is forwarded as-is
# to the opensearch-dashboards service:5601.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opensearch-dashboards
  namespace: opensearch
  labels:
    app.kubernetes.io/name: opensearch-dashboards
    app.kubernetes.io/instance: opensearch-dashboards
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /opensearch
      backendRefs:
        - name: opensearch-dashboards
          port: 5601
