# Source: airbyte/templates/minio.yaml
apiVersion: apps/v1 #  for k8s versions before 1.9.0 use apps/v1beta2  and before 1.8.0 use extensions/v1beta1
kind: StatefulSet
metadata:
  # This name uniquely identifies the Deployment
  name: airbyte-minio
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-1"
  labels:
    
    helm.sh/chart: airbyte-1.9.2
    app.kubernetes.io/name: airbyte-minio
    app.kubernetes.io/instance: airbyte
    app.kubernetes.io/version: "2.0.2-alpha-c905e75"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      
      app.kubernetes.io/name: airbyte-minio
      app.kubernetes.io/instance: airbyte
  serviceName: airbyte-minio-svc
  volumeClaimTemplates:
      - metadata:
          name: airbyte-minio-pv-claim
        spec:
          accessModes: [ "ReadWriteOnce" ]
          resources:
            requests:
              storage: 500Mi
  template:
    metadata:
      labels:
        # Label is used as selector in the service.
        
        app.kubernetes.io/name: airbyte-minio
        app.kubernetes.io/instance: airbyte
    spec:
      # Refer to the PVC created earlier
      securityContext:
        fsGroup: 1000
      containers:
        - name: airbyte-minio
          image: "minio/minio:RELEASE.2023-11-20T22-40-07Z"
          args:
            - server
            - /storage
          env:
            # Minio access key and secret key. This must match the S3_ACCESS_KEY_ID and S3_SECRET_ACCESS_KEY declared in /dev/.env.
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: airbyte-airbyte-secrets
                  key: MINIO_ACCESS_KEY_ID 
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: airbyte-airbyte-secrets
                  key: MINIO_SECRET_ACCESS_KEY
          ports:
            - containerPort: 9000
          resources:
            requests:
              memory: 1Gi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 300m
          # Mount the volume into the pod
          securityContext:
            allowPrivilegeEscalation: false 
            runAsNonRoot: true
            # uid=1000(airbyte)
            runAsUser: 1000
            # gid=1000(airbyte)
            runAsGroup: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - name: airbyte-minio-pv-claim # must match the volume name, above
              mountPath: "/storage"
