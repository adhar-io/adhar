apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: airbyte-db
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-1"
  labels:
    
    helm.sh/chart: airbyte-1.9.2
    app.kubernetes.io/name: airbyte-db
    app.kubernetes.io/instance: airbyte
    app.kubernetes.io/version: "2.0.2-alpha-c905e75"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  serviceName: airbyte-db-svc
  selector:
    matchLabels:
      
      app.kubernetes.io/name: airbyte-db
      app.kubernetes.io/instance: airbyte
  template:
    metadata:
      labels:
        
        app.kubernetes.io/name: airbyte-db
        app.kubernetes.io/instance: airbyte
    spec:
      containers:
        - name: airbyte-db-container
          image: "airbyte/db:2.0.2-alpha-c905e75"
          env:
            - name: POSTGRES_DB
              value: db-airbyte
            - name: POSTGRES_PASSWORD
              value: airbyte
            - name: POSTGRES_USER
              value: airbyte
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            runAsGroup: 70
            runAsNonRoot: true
            runAsUser: 70
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: airbyte-volume-db
              mountPath: /var/lib/postgresql/data
      securityContext:
        fsGroup: 70

  volumeClaimTemplates:
  - metadata:
      name: airbyte-volume-db
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 500Mi
