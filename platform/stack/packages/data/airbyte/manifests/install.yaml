# Source: airbyte/templates/minio.yaml
# This pod creates the state-storage bucket in the minio server,
# which the local cloud deployment requires to store its state.
apiVersion: v1
kind: Pod
metadata:
  name: airbyte-minio-create-bucket
  annotations:
    "helm.sh/hook": post-install, post-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded, before-hook-creation
spec:
  restartPolicy: OnFailure
  securityContext:
    fsGroup: 1000
  containers:
    - name: minio-mc
      image: "minio/minio:RELEASE.2023-11-20T22-40-07Z"
      command: ["/bin/sh", "-c",
        "until (/bin/mc config host add myminio $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY) do echo '...waiting...' && sleep 1; done;
          /bin/mc mb --ignore-existing myminio/state-storage;
          /bin/mc policy set public myminio/state-storage;
          /bin/mc mb --ignore-existing myminio/airbyte-dev-logs;
          /bin/mc policy set public myminio/airbyte-dev-logs;"]
      securityContext:
        allowPrivilegeEscalation: false 
        runAsNonRoot: true
        # uid=1000(airbyte)
        runAsUser: 1000
        # gid=1000(airbyte)
        runAsGroup: 1000
        readOnlyRootFilesystem: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      env:
        # this is for the internally deployed minio
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: airbyte-airbyte-secrets
              key: MINIO_ACCESS_KEY_ID
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: airbyte-airbyte-secrets
              key: MINIO_SECRET_ACCESS_KEY
        - name: MINIO_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: airbyte-airbyte-env
              key: MINIO_ENDPOINT
