# Airbyte web UI routed through the Cilium Gateway (adhar-gateway). TLS
# terminates at the Gateway (adhar-cert). Replaces any nginx Ingress. In Airbyte
# 1.x the web UI is served by the server component; the /airbyte prefix is
# stripped before forwarding to airbyte-airbyte-server-svc:8001.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: airbyte
  namespace: airbyte
  labels:
    app.kubernetes.io/name: airbyte
    app.kubernetes.io/instance: airbyte
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /airbyte
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: airbyte-airbyte-server-svc
          port: 8001
