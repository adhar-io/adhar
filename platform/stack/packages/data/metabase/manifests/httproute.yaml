# Metabase UI routed through the Cilium Gateway (adhar-gateway). TLS terminates
# at the Gateway (adhar-cert). Replaces any nginx Ingress. The /metabase prefix
# is forwarded as-is (MB_SITE_URL carries the /metabase sub-path) to the
# metabase service:80.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: metabase
  namespace: metabase
  labels:
    app.kubernetes.io/name: metabase
    app.kubernetes.io/instance: metabase
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /metabase
      backendRefs:
        - name: metabase
          port: 80
