# Dagster webserver (Dagit) UI routed through the Cilium Gateway
# (adhar-gateway). TLS terminates at the Gateway (adhar-cert). Replaces any
# nginx Ingress. The /dagster prefix is stripped before forwarding to
# dagster-dagster-webserver:80. (Set dagsterWebserver.pathPrefix in values if
# Dagit needs to serve under the sub-path.)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dagster
  namespace: dagster
  labels:
    app.kubernetes.io/name: dagster
    app.kubernetes.io/instance: dagster
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - dagster.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dagster-dagster-webserver
          port: 80
