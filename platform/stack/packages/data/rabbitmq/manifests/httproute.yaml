# RabbitMQ management UI routed through the Cilium Gateway (adhar-gateway). TLS
# terminates at the Gateway (adhar-cert). Replaces any nginx Ingress. The
# management plugin serves from the root; the /rabbitmq prefix is stripped
# before forwarding to the rabbitmq service:15672 (HTTP management port).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rabbitmq
  namespace: rabbitmq
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/instance: rabbitmq
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - rabbitmq.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rabbitmq
          port: 15672
