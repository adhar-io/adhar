# Tekton Dashboard through the shared platform Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tekton-dashboard
  namespace: adhar-system
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames: ["tekton.adhar.localtest.me"]
  rules:
    - backendRefs:
        - name: tekton-dashboard
          port: 9097
