# Devtron routed through the Cilium Gateway (adhar-gateway). TLS terminates at the
# Gateway (adhar-cert), replacing the chart's Ingress (disabled in values.yaml).
# Requests to /dashboard (Devtron's native UI base path) are forwarded to the
# devtron-service on port 80, which proxies to the dashboard and orchestrator.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: devtron
  namespace: adhar-system
  labels:
    app.kubernetes.io/name: devtron
    app.kubernetes.io/instance: devtron
    app.kubernetes.io/part-of: devtron
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - devtron.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /dashboard
        - path:
            type: PathPrefix
            value: /orchestrator
      backendRefs:
        - name: devtron-service
          port: 80
