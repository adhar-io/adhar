    meta.helm.sh/release-namespace: devtroncd
data:
  01-init-userdb.sh: "#!/bin/sh\ncreate_user()\n{\npsql -v ON_ERROR_STOP=1 --username\
    \ \"$POSTGRES_USER\" -v USERDBNAME=\"$POSTGRES_DB\" -v USERDBUSER=\"$USERDB_USER\"\
    \ -v USERDBPASSWORD=\"'$USERDB_PASSWORD'\" <<-EOSQL\n  CREATE USER :USERDBUSER\
    \ WITH PASSWORD :USERDBPASSWORD;\n  GRANT ALL PRIVILEGES ON DATABASE :USERDBNAME\
    \ TO :USERDBUSER;\nEOSQL\n}\nset -e\nif [ ! -z \"$POSTGRES_DB\" ] && [ ! -z \"\
    $USERDB_USER\" ] && [ ! -z \"$USERDB_PASSWORD\" ]; then\n  create_user\nfi\n"
  init.sh: "#!/bin/sh\necho \"Start initialization\"\necho \"Copy init-userdb script\"\
    \ncp /initscripts/01-init-userdb.sh /scripts\nif [ -d /extrascripts ]; then\n\
    \  echo \"Copy extra scripts\"\n  cp /extrascripts/* /scripts\nfi\nif [ -d /customscripts\
    \ ]; then\n  echo \"Copy custom scripts\"\n  cp /customscripts/* /scripts\nfi\n\
    if [ -d /customconfig ]; then\n  echo \"Create postgres config\"\n  cat /customconfig/*\
    \ >>/configs/postgresql.conf\nfi\nif [ -d /extraconfigs ]; then\n  echo \"Add\
    \ extra configs to postgres config\"\n  cat /extraconfigs/* >>/configs/postgresql.conf\n\
    fi\necho \"Initialization done.\"\n"
