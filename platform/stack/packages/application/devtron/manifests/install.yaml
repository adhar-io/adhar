apiVersion: batch/v1beta1
kind: Job
metadata:
  name: postgresql-migrate-devtron-pn5lx
  annotations: {}
  labels:
    job: postgresql-migrate-devtron
spec:
  template:
    spec:
      serviceAccountName: devtron-default-sa
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      initContainers:
      - env:
        - name: DB_TYPE
          value: postgres
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: devtron-cm
              key: PG_PORT
        envFrom:
        - secretRef:
            name: devtron-secret
        - configMapRef:
            name: devtron-cm
        - configMapRef:
            name: devtron-custom-cm
        - configMapRef:
            name: devtron-common-cm
        image: quay.io/devtron/devtron-utils:dup-chart-repo-v1.1.0
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
        name: clean-duplicate-chart
      - command:
        - /bin/sh
        - -c
        - cp -r /scripts/. /shared/
        image: quay.io/devtron/hyperion:1188d0b9-280-38819
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
        name: init-devtron
        envFrom:
        - configMapRef:
            name: devtron-common-cm
        volumeMounts:
        - mountPath: /shared
          name: shared-volume
      containers:
      - command:
        - /bin/sh
        - -c
        - 'if [ $(MIGRATE_TO_VERSION) -eq "0" ]; then migrate -path $(SCRIPT_LOCATION)
          -database postgres://$(PG_USER):$(DB_PASSWORD)@$(PG_ADDR):$(PG_PORT)/$(PG_DATABASE)?sslmode=disable
          up;  else   echo $(MIGRATE_TO_VERSION); migrate -path $(SCRIPT_LOCATION)  -database
          postgres://$(PG_USER):$(DB_PASSWORD)@$(PG_ADDR):$(PG_PORT)/$(PG_DATABASE)?sslmode=disable
          goto $(MIGRATE_TO_VERSION);    fi '
        env:
        - name: SCRIPT_LOCATION
          value: /shared/sql/
        - name: DB_TYPE
          value: postgres
        - name: MIGRATE_TO_VERSION
          value: '0'
        envFrom:
        - secretRef:
            name: postgresql-migrator
        - configMapRef:
            name: devtron-cm
        - configMapRef:
            name: devtron-custom-cm
        - configMapRef:
            name: devtron-common-cm
        image: quay.io/devtron/migrator:v4.16.2
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
        name: postgresql-migrate-devtron
        volumeMounts:
        - mountPath: /shared
          name: shared-volume
      restartPolicy: OnFailure
      volumes:
      - emptyDir: {}
        name: shared-volume
  backoffLimit: 20
  activeDeadlineSeconds: 1500
