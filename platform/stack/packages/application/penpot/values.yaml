# Penpot values for Adhar. Ingress disabled -- routing is handled by the Cilium
# Gateway API (adhar-gateway) via manifests/httproute.yaml. Penpot is served
# under the /penpot sub-path on adhar.localtest.me.
#
# The 1.x Penpot chart does NOT bundle PostgreSQL/Valkey, so this package ships a
# minimal in-namespace Postgres + Valkey (manifests/dependencies.yaml) that the
# config below points at.
config:
  publicUri: "https://adhar.localtest.me:8443/penpot"
  flags: "enable-registration enable-login-with-password disable-email-verification disable-secure-session-cookies"
  postgresql:
    host: "penpot-postgresql.penpot.svc.cluster.local"
    port: 5432
    username: "penpot"
    password: "penpot"
    database: "penpot"
  redis:
    host: "penpot-valkey.penpot.svc.cluster.local"
    port: 6379
    database: "0"

ingress:
  enabled: false

# Penpot MCP integration pulls an extra image; keep the core install lean.
backend:
  service:
    type: ClusterIP
frontend:
  service:
    type: ClusterIP
