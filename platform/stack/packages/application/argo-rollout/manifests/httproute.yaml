# Argo Rollouts dashboard routed through the Cilium Gateway (adhar-gateway).
# TLS terminates at the Gateway (adhar-cert), replacing any nginx Ingress. The
# /argo-rollouts prefix is stripped before forwarding to the dashboard service
# (argo-rollouts-dashboard:3100).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-rollouts-dashboard
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/name: argo-rollouts
    app.kubernetes.io/component: rollouts-dashboard
    app.kubernetes.io/part-of: argo-rollouts
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - argo-rollout.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /argo-rollouts
      backendRefs:
        - name: argo-rollouts-dashboard
          port: 3100
