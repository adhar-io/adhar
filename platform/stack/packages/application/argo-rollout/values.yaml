# Argo Rollouts Helm Chart Values
#
# Gateway API only -- NO nginx Ingress. We enable the Rollouts dashboard but keep
# its chart Ingress disabled; external access is routed through the Cilium Gateway
# via manifests/httproute.yaml (backend argo-rollouts-dashboard:3100).

dashboard:
  enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP

controller:
  ingress:
    enabled: false
