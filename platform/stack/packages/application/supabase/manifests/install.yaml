      app.kubernetes.io/instance: supabase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: supabase-functions
        app.kubernetes.io/instance: supabase
    spec:
      serviceAccountName: supabase-supabase-functions
      securityContext:
        null
      containers:
        - args:
            - start
            - --main-service
            - /home/deno/functions/main
          name: supabase-functions
          securityContext:
            {}
          image: "supabase/edge-runtime:v1.71.2"
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_DRIVER
              value: "postgresql"
            - name: DB_SSL
              value: "disable"
            - name: DB_USERNAME
              value: "postgres"
            - name: VERIFY_JWT
              value: "false"
            - name: SUPABASE_URL
              value: http://supabase-supabase-kong:8000
            - name: DB_HOSTNAME
              value: "supabase-supabase-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-db
                  key: password
            - name: DB_PASSWORD_ENC
              valueFrom:
                secretKeyRef:
                  name: supabase-db
                  key: password_encoded
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: supabase-db
                  key: database
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-jwt
                  key: secret
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-jwt
                  key: anonKey
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-jwt
                  key: serviceKey
            - name: SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-apikey
                  key: publishableKey
            - name: SUPABASE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-apikey
                  key: secretKey
            - name: SUPABASE_PUBLISHABLE_KEYS
              value: '{"default":"$(SUPABASE_PUBLISHABLE_KEY)"}'
            - name: SUPABASE_SECRET_KEYS
              value: '{"default":"$(SUPABASE_SECRET_KEY)"}'
            - name: SUPABASE_DB_URL
              value: $(DB_DRIVER)://$(DB_USERNAME):$(DB_PASSWORD_ENC)@$(DB_HOSTNAME):$(DB_PORT)/$(DB_DATABASE)?search_path=auth&sslmode=$(DB_SSL)
          volumeMounts:
            - name: functions-storage
              mountPath: /home/deno/functions
            - name: deno-cache
              mountPath: /root/.cache/deno
            - mountPath: /home/deno/functions/main/index.ts
              name: functions-main
              subPath: index.ts
      volumes:
        - name: functions-storage
          persistentVolumeClaim:
            claimName: supabase-functions
        - name: deno-cache
          persistentVolumeClaim:
            claimName: supabase-deno
        - name: functions-main
          configMap:
            name: supabase-supabase-functions-main
