# Supabase routed through the Cilium Gateway (adhar-gateway). TLS terminates at
# the Gateway (adhar-cert), replacing the chart's Ingress (disabled in
# values.yaml). Requests to /supabase are forwarded to the Kong API gateway
# (supabase-supabase-kong:8000), which fronts Studio, REST, Auth, Storage and
# Realtime.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: supabase
  namespace: supabase
  labels:
    app.kubernetes.io/name: supabase
    app.kubernetes.io/instance: supabase
    app.kubernetes.io/part-of: supabase
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - supabase.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: supabase-supabase-kong
          port: 8000
