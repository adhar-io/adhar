# Baserow routed through the Cilium Gateway (adhar-gateway). TLS terminates at the
# Gateway (adhar-cert), replacing the chart's Ingress (disabled in values.yaml).
# Baserow splits its UI (baserow-frontend:3000) from its API (baserow-wsgi:8000);
# the /baserow/api, /baserow/ws and /baserow/media prefixes go to the backend and
# everything else under /baserow goes to the frontend. publicBackendUrl /
# publicFrontendUrl are set to the external /baserow URL in values.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: baserow
  namespace: baserow
  labels:
    app.kubernetes.io/name: baserow
    app.kubernetes.io/instance: baserow
    app.kubernetes.io/part-of: baserow
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /baserow/api
        - path:
            type: PathPrefix
            value: /baserow/ws
        - path:
            type: PathPrefix
            value: /baserow/media
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: baserow-wsgi
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /baserow
      backendRefs:
        - name: baserow-frontend
          port: 3000
