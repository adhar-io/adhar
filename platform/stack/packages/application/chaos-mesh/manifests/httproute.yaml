# Chaos Mesh dashboard routed through the Cilium Gateway (adhar-gateway). TLS
# terminates at the Gateway (adhar-cert), replacing any nginx Ingress. The
# /chaos-mesh prefix is stripped before forwarding to the dashboard service
# (chaos-dashboard:2333).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chaos-dashboard
  namespace: adhar-system
  labels:
    app.kubernetes.io/name: chaos-mesh
    app.kubernetes.io/component: chaos-dashboard
    app.kubernetes.io/part-of: chaos-mesh
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - chaos-mesh.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: chaos-dashboard
          port: 2333
