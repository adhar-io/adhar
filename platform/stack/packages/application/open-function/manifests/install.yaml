                                    type: string
                                  key:
                                    description: Key inside the object
                                    type: string
                                  name:
                                    description: Name of the object
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              secretValue:
                                description: The secret value of the parameter
                                properties:
                                  format:
                                    description: An optional format to add pre- or
