apiVersion: batch/v1
kind: Job
metadata:
  name: contour-contour-certgen
  namespace: adhar-system
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: '1'
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    app.kubernetes.io/name: contour
    helm.sh/chart: contour-10.2.2
    app.kubernetes.io/instance: openfunction
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: contour-certgen
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: contour
        helm.sh/chart: contour-10.2.2
        app.kubernetes.io/instance: openfunction
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: contour-certgen
    spec:
      securityContext:
        fsGroup: 1001
      containers:
      - name: contour
        image: docker.io/bitnamilegacy/contour:1.23.3-debian-11-r0
        imagePullPolicy: IfNotPresent
        command:
        - contour
        args:
        - certgen
        - --kube
        - --incluster
        - --overwrite
        - --secrets-format=compact
        - --namespace=$(CONTOUR_NAMESPACE)
        - --certificate-lifetime=365
        env:
        - name: CONTOUR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
        resources:
          limits: {}
          requests: {}
      restartPolicy: Never
      serviceAccountName: contour-contour-certgen
  parallelism: 1
  completions: 1
  backoffLimit: 1
---
