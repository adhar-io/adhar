                  \ of port and protocol are considered Core and MUST be supported:\
                  \ \n 1. Port: 80, Protocol: HTTP 2. Port: 443, Protocol: HTTPS \n\
                  \ Within the TLS Conformance Profile, the below combinations of\
                  \ port and protocol are considered Core and MUST be supported: \n\
                  \ 1. Port: 443, Protocol: TLS \n Port and protocol combinations\
                  \ not listed above are considered Extended. \n An implementation\
                  \ MAY group Listeners by Port and then collapse each group of Listeners\
                  \ into a single Listener if the implementation determines that the\
                  \ Listeners in the group are \"compatible\". An implementation MAY\
                  \ also group together and collapse compatible Listeners belonging\
                  \ to different Gateways. \n For example, an implementation might\
                  \ consider Listeners to be compatible with each other if all of\
                  \ the following conditions are met: \n 1. Either each Listener within\
                  \ the group specifies the \"HTTP\" Protocol or each Listener within\
                  \ the group specifies either the \"HTTPS\" or \"TLS\" Protocol.\
                  \ \n 2. Each Listener within the group specifies a Hostname that\
                  \ is unique within the group. \n 3. As a special case, one Listener\
                  \ within a group may omit Hostname, in which case this Listener\
                  \ matches when no other Listener matches. \n If the implementation\
                  \ does collapse compatible Listeners, the hostname provided in the\
                  \ incoming client request MUST be matched to a Listener to find\
                  \ the correct set of Routes. The incoming hostname MUST be matched\
