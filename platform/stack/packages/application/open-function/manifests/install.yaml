apiVersion: shipwright.io/v1alpha1
kind: ClusterBuildStrategy
metadata:
  name: buildah
spec:
  buildSteps:
  - name: build-and-push
    image: $(params.BUILDER_IMAGE)
    workingDir: $(params.shp-source-root)
    securityContext:
      privileged: true
    command:
    - /bin/bash
    args:
    - -c
    - "set -euo pipefail\n\n# Parse parameters\ncontext=\ndockerfile=\nimage=\nbuildArgs=()\n\
      inBuildArgs=false\nregistriesBlock=\"\"\ninRegistriesBlock=false\nregistriesInsecure=\"\
      \"\ninRegistriesInsecure=false\nregistriesSearch=\"\"\ninRegistriesSearch=false\n\
      tlsVerify=true\nwhile [[ $# -gt 0 ]]; do\n  arg=\"$1\"\n  shift\n\n  if [ \"\
      ${arg}\" == \"--context\" ]; then\n    inBuildArgs=false\n    inRegistriesBlock=false\n\
      \    inRegistriesInsecure=false\n    inRegistriesSearch=false\n    context=\"\
      $1\"\n    shift\n  elif [ \"${arg}\" == \"--dockerfile\" ]; then\n    inBuildArgs=false\n\
      \    inRegistriesBlock=false\n    inRegistriesInsecure=false\n    inRegistriesSearch=false\n\
      \    dockerfile=\"$1\"\n    shift\n  elif [ \"${arg}\" == \"--image\" ]; then\n\
      \    inBuildArgs=false\n    inRegistriesBlock=false\n    inRegistriesInsecure=false\n\
      \    inRegistriesSearch=false\n    image=\"$1\"\n    shift\n  elif [ \"${arg}\"\
      \ == \"--build-args\" ]; then\n    inBuildArgs=true\n    inRegistriesBlock=false\n\
      \    inRegistriesInsecure=false\n    inRegistriesSearch=false\n  elif [ \"${arg}\"\
      \ == \"--registries-block\" ]; then\n    inRegistriesBlock=true\n    inBuildArgs=false\n\
      \    inRegistriesInsecure=false\n    inRegistriesSearch=false\n  elif [ \"${arg}\"\
      \ == \"--registries-insecure\" ]; then\n    inRegistriesInsecure=true\n    inBuildArgs=false\n\
      \    inRegistriesBlock=false\n    inRegistriesSearch=false\n  elif [ \"${arg}\"\
      \ == \"--registries-search\" ]; then\n    inRegistriesSearch=true\n    inBuildArgs=false\n\
      \    inRegistriesBlock=false\n    inRegistriesInsecure=false\n  elif [ \"${inBuildArgs}\"\
      \ == \"true\" ]; then\n    buildArgs+=(\"--build-arg\" \"${arg}\")\n  elif [\
      \ \"${inRegistriesBlock}\" == \"true\" ]; then\n    registriesBlock=\"${registriesBlock}'${arg}',\
      \ \"\n  elif [ \"${inRegistriesInsecure}\" == \"true\" ]; then\n    registriesInsecure=\"\
      ${registriesInsecure}'${arg}', \"\n\n    # This assumes that the image is passed\
      \ before the insecure registries which is fair in this context\n    if [[ ${image}\
      \ == ${arg}/* ]]; then\n      tlsVerify=false\n    fi\n  elif [ \"${inRegistriesSearch}\"\
      \ == \"true\" ]; then\n    registriesSearch=\"${registriesSearch}'${arg}', \"\
      \n  else\n    echo \"Invalid usage\"\n    exit 1\n  fi\ndone\n\n# Verify the\
      \ existence of the context directory\nif [ ! -d \"${context}\" ]; then\n  echo\
      \ -e \"The context directory '${context}' does not exist.\"\n  echo -n \"ContextDirNotFound\"\
      \ > '$(results.shp-error-reason.path)'\n  echo -n \"The context directory '${context}'\
      \ does not exist.\" > '$(results.shp-error-message.path)'\n  exit 1\nfi\ncd\
      \ \"${context}\"\n\n# Verify the existence of the Dockerfile\nif [ ! -f \"${dockerfile}\"\
      \ ]; then\n  echo -e \"The Dockerfile '${dockerfile}' does not exist.\"\n  echo\
      \ -n \"DockerfileNotFound\" > '$(results.shp-error-reason.path)'\n  echo -n\
      \ \"The Dockerfile '${dockerfile}' does not exist.\" > '$(results.shp-error-message.path)'\n\
      \  exit 1\nfi\n\necho \"[INFO] Creating registries config file...\"\nif [ \"\
      ${registriesSearch}\" != \"\" ]; then\n  cat <<EOF >>/tmp/registries.conf\n\
      [registries.search]\nregistries = [${registriesSearch::-2}]\n\nEOF\nfi\nif [\
      \ \"${registriesInsecure}\" != \"\" ]; then\n  cat <<EOF >>/tmp/registries.conf\n\
      [registries.insecure]\nregistries = [${registriesInsecure::-2}]\n\nEOF\nfi\n\
      if [ \"${registriesBlock}\" != \"\" ]; then\n  cat <<EOF >>/tmp/registries.conf\n\
      [registries.block]\nregistries = [${registriesBlock::-2}]\n\nEOF\nfi\n\n# Building\
      \ the image\necho \"[INFO] Building image ${image}\"\nbuildah bud \"${buildArgs[@]}\"\
      \ \\\n  --registries-conf=/tmp/registries.conf \\\n  --tag=\"${image}\" \\\n\
      \  --file=\"${dockerfile}\" \\\n  .\n\n# Push the image\necho \"[INFO] Pushing\
      \ image ${image}\"\nbuildah push \\\n  --digestfile='$(results.shp-image-digest.path)'\
      \ \\\n  --tls-verify=\"${tlsVerify}\" \\\n  \"${image}\" \\\n  \"docker://${image}\"\
      \n"
    - --
    - --context
    - $(params.shp-source-context)
    - --dockerfile
    - $(build.dockerfile)
    - --image
    - $(params.shp-output-image)
    - --build-args
    - $(params.build-args[*])
    - --registries-block
    - $(params.registries-block[*])
    - --registries-insecure
    - $(params.registries-insecure[*])
    - --registries-search
    - $(params.registries-search[*])
    resources:
      limits:
        cpu: '1'
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 65Mi
  parameters:
  - name: build-args
    description: The values for the args in the Dockerfile. Values must be in the
      format KEY=VALUE.
    type: array
    defaults: []
  - name: registries-block
    description: The registries that need to block pull access.
    type: array
    defaults: []
  - name: registries-insecure
    description: The fully-qualified name of insecure registries. An insecure registry
      is one that does not have a valid SSL certificate or only supports HTTP.
    type: array
    defaults: []
  - name: registries-search
    description: The registries for searching short name images such as `golang:latest`.
    type: array
    defaults:
    - docker.io
    - quay.io
---
apiVersion: shipwright.io/v1alpha1
kind: ClusterBuildStrategy
metadata:
  name: kaniko
spec:
  volumes:
  - name: layout
    emptyDir: {}
  buildSteps:
  - name: build-and-push
    image: $(params.BUILDER_IMAGE)
    workingDir: $(params.shp-source-root)
    securityContext:
      runAsUser: 0
      capabilities:
        add:
        - CHOWN
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
        - SETFCAP
        - KILL
    env:
    - name: HOME
      value: /tekton/home
    - name: DOCKER_CONFIG
      value: /tekton/home/.docker
    - name: AWS_ACCESS_KEY_ID
      value: NOT_SET
    - name: AWS_SECRET_KEY
      value: NOT_SET
    command:
    - /kaniko/executor
    args:
    - --skip-tls-verify=true
    - --dockerfile=$(build.dockerfile)
    - --context=$(params.shp-source-context)
    - --destination=$(params.shp-output-image)
    - --oci-layout-path=/kaniko/oci-image-layout
    - --snapshotMode=redo
    - --push-retry=3
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 65Mi
    volumeMounts:
    - name: layout
      mountPath: /kaniko/oci-image-layout
  - name: results
    image: registry.access.redhat.com/ubi8/ubi-minimal
    command:
    - /bin/bash
    args:
    - -c
    - 'set -euo pipefail


      # Store the image digest

      grep digest /kaniko/oci-image-layout/index.json | sed -E ''s/.*sha256([^"]*).*/sha256\1/''
      | tr -d ''\n'' > "$(results.shp-image-digest.path)"


      # Store the image size

      du -b -c /kaniko/oci-image-layout/blobs/sha256/* | tail -1 | sed ''s/\s*total//''
      | tr -d ''\n'' > "$(results.shp-image-size.path)"

      '
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
    volumeMounts:
    - name: layout
      mountPath: /kaniko/oci-image-layout
---
apiVersion: shipwright.io/v1alpha1
kind: ClusterBuildStrategy
metadata:
  name: ko
spec:
  parameters:
  - name: go-flags
    description: Value for the GOFLAGS environment variable.
    default: ''
  - name: go-version
    description: Version of Go, must match a tag from https://hub.docker.com/_/golang?tab=tags
    default: '1.18'
  - name: ko-version
    description: Version of ko, must be either 'latest', or a release name from https://github.com/google/ko/releases
    default: latest
  - name: package-directory
    description: The directory inside the context directory containing the main package.
    default: .
  - name: target-platform
    description: 'Target platform to be built. For example: ''linux/arm64''. Multiple
      platforms can be provided separated by comma, for example: ''linux/arm64,linux/amd64''.
      The value ''all'' will build all platforms supported by the base image. The
      value ''current'' will build the platform on which the build runs.'
    default: current
  volumes:
  - name: gocache
    description: Volume to contain the GOCACHE. Can be set to a persistent volume
      to optimize compilation performance for rebuilds.
    overridable: true
    emptyDir: {}
  buildSteps:
  - name: prepare
    image: $(params.BUILDER_IMAGE)
    imagePullPolicy: Always
    securityContext:
      runAsUser: 0
      capabilities:
        add:
        - CHOWN
    command:
    - chown
    args:
    - -R
    - 1000:1000
    - /tekton/home
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
  - name: build-and-push
    image: golang:$(params.go-version)
    imagePullPolicy: Always
    workingDir: $(params.shp-source-root)
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    volumeMounts:
    - mountPath: /gocache
      name: gocache
      readOnly: false
    env:
    - name: DOCKER_CONFIG
      value: /tekton/home/.docker
    - name: HOME
      value: /tekton/home
    - name: GOFLAGS
      value: $(params.go-flags)
    - name: GOCACHE
      value: /gocache
    - name: PARAM_OUTPUT_IMAGE
      value: $(params.shp-output-image)
    - name: PARAM_SOURCE_CONTEXT
      value: $(params.shp-source-context)
    - name: PARAM_TARGET_PLATFORM
      value: $(params.target-platform)
    - name: PARAM_PACKAGE_DIRECTORY
      value: $(params.package-directory)
    - name: PARAM_KO_VERSION
      value: $(params.ko-version)
    command:
    - /bin/bash
    args:
    - -c
    - "set -euo pipefail\n\n# Parse image URL to extract repository and tag, must\
      \ work with\n# - a URL without a tag and a port: registry/image\n# - a URL without\
      \ a tag but a port: registry:port/image\n# - a URL with a tag but without a\
      \ port: registry/image:tag\n# - a URL with both a tag and a port: registry:port/image:tag\n\
      \nREPO=\nTAG=\n\nIFS=':' read -ra PARTS <<< \"${PARAM_OUTPUT_IMAGE}\"\nfor PART\
      \ in \"${PARTS[@]}\"; do\n  if [ \"${REPO}\" == \"\" ]; then\n    REPO=\"${PART}\"\
      \n\telif [[ \"${PART}\" == *\"/\"* ]]; then\n    REPO=\"${REPO}:${PART}\"\n\
      \  elif [ \"${TAG}\" == \"\" ]; then\n    TAG=\"${PART}\"\n  else\n    REPO=\"\
      ${REPO}:${TAG}\"\n    TAG=\"${PART}\"\n  fi\ndone\n\n# Determine the ko version\n\
      KO_VERSION=\"${PARAM_KO_VERSION}\"\nif [ \"${KO_VERSION}\" == \"latest\" ];\
      \ then\n  KO_VERSION=$(curl --silent -L \"https://api.github.com/repos/google/ko/releases/latest\"\
      \ | grep '\"tag_name\":' | sed -E 's/.*\"([^\"]+)\".*/\\1/')\nfi\n\n# Create\
      \ one variable with v-suffix and one without as we need both for the download\
      \ URL\nif [[ ${KO_VERSION} = v* ]]; then\n  KO_VERSION_WITH_V=${KO_VERSION}\n\
      \  KO_VERSION_WITHOUT_V=${KO_VERSION:1}\nelse\n  KO_VERSION_WITH_V=v${KO_VERSION}\n\
      \  KO_VERSION_WITHOUT_V=${KO_VERSION}\nfi\n\n# Download ko to the temp directory\n\
      curl -f -s -L \"https://github.com/google/ko/releases/download/${KO_VERSION_WITH_V}/ko_${KO_VERSION_WITHOUT_V}_$(uname)_$(uname\
      \ -m | sed 's/aarch64/arm64/').tar.gz\" | tar xzf - -C /tmp ko\n\n# Determine\
      \ the platform\nPLATFORM=\"${PARAM_TARGET_PLATFORM}\"\nif [ \"${PLATFORM}\"\
      \ == \"current\" ]; then\n  PLATFORM=\"$(uname | tr '[:upper:]' '[:lower:]')/$(uname\
      \ -m | sed -e 's/x86_64/amd64/' -e 's/aarch64/arm64/')\"\nfi\n\n# Print version\
      \ information\ngo version\necho \"ko version $(/tmp/ko version)\"\n\n# Run ko\n\
      \nexport GOROOT=\"$(go env GOROOT)\"\nexport KO_DOCKER_REPO=\"${REPO}\"\n\n\
      pushd \"${PARAM_SOURCE_CONTEXT}\" > /dev/null\n  if [ \"${TAG}\" == \"\" ];\
      \ then\n    /tmp/ko publish \"${PARAM_PACKAGE_DIRECTORY}\" --bare --oci-layout-path=/tmp/layout\
      \ --platform=\"${PLATFORM}\"\n  else\n    /tmp/ko publish \"${PARAM_PACKAGE_DIRECTORY}\"\
      \ --bare --oci-layout-path=/tmp/layout --platform=\"${PLATFORM}\" --tags=\"\
      ${TAG}\"\n  fi\npopd > /dev/null\n\n# Store the image digest\ngrep digest /tmp/layout/index.json\
      \ | sed -E 's/.*sha256([^\"]*).*/sha256\\1/' | tr -d '\\n' > '$(results.shp-image-digest.path)'\n\
      \n# Store the image size\ndu -b -c /tmp/layout/blobs/sha256/* | tail -1 | sed\
      \ 's/\\s*total//' | tr -d '\\n' > '$(results.shp-image-size.path)'\n"
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 65Mi
---
apiVersion: shipwright.io/v1alpha1
kind: ClusterBuildStrategy
metadata:
  name: openfunction
  labels:
    helm.sh/chart: openfunction-0.7.0
    app.kubernetes.io/name: openfunction
    app.kubernetes.io/instance: openfunction
    app.kubernetes.io/version: v1.2.0
    app.kubernetes.io/managed-by: Helm
spec:
  volumes:
  - emptyDir: {}
    name: cache
  - emptyDir: {}
    name: layers-dir
  - emptyDir: {}
    name: $(params.PLATFORM_DIR)
  buildSteps:
  - args:
    - -c
    - "#!/usr/bin/env bash\nset -e\n\nfor path in \"/cache\" \"/tekton/home\" \"/layers\"\
      \ \"/workspace/source\"; do\n  echo \"> Setting permissions on '$path'...\"\n\
      \  chown -R \"$(params.USER_ID):$(params.GROUP_ID)\" \"$path\"\ndone\n\necho\
      \ \"> Processing any environment variables...\"\nENV_DIR=\"/platform/env\"\n\
      \necho \"--> Creating 'env' directory: $ENV_DIR\"\nmkdir -p \"$ENV_DIR\"\n\n\
      envs=(`echo $(params.ENV_VARS) | tr '#' ' '`)\n\nfor env in \"${envs[@]}\";\
      \ do\n    IFS='=' read -r key value string <<< \"$env\"\n    if [[ \"$key\"\
      \ != \"\" && \"$value\" != \"\" ]]; then\n        path=\"${ENV_DIR}/${key}\"\
      \n        echo \"--> Writing ${path}...\"\n        echo -n \"$value\" > \"$path\"\
      \n    fi\ndone\n"
    command:
    - /usr/local/bin/bash
    image: $(params.BASH_IMAGE)
    name: prepare
    securityContext:
      privileged: true
    volumeMounts:
    - mountPath: /cache
      name: cache
    - mountPath: /layers
      name: layers-dir
    - mountPath: /platform
      name: $(params.PLATFORM_DIR)
  - args:
    - -app=/workspace/source/$(params.CONTEXT_DIR)
    - -cache-dir=/cache
    - -cache-image=$(params.CACHE_IMAGE)
    - -uid=$(params.USER_ID)
    - -gid=$(params.GROUP_ID)
    - -layers=/layers
    - -platform=/platform
    - -report=/layers/report.toml
    - -process-type=$(params.PROCESS_TYPE)
    - -skip-restore=$(params.SKIP_RESTORE)
    - -previous-image=$(params.shp-output-image)
    - -run-image=$(params.RUN_IMAGE)
    - $(params.shp-output-image)
    command:
    - /cnb/lifecycle/creator
    image: $(params.BUILDER_IMAGE)
    imagePullPolicy: Always
    name: create
    securityContext:
      runAsGroup: 1000
      runAsUser: 1000
    volumeMounts:
    - mountPath: /cache
      name: cache
    - mountPath: /layers
      name: layers-dir
    - mountPath: /platform
      name: $(params.PLATFORM_DIR)
  - args:
    - -c
    - '#!/usr/bin/env bash

      set -e

      cat /layers/report.toml | grep "digest" | cut -d''"'' -f2 | cut -d''"'' -f2
      | tr -d ''\n'' | tee $(results.shp-image-digest.path)

      '
    command:
    - /bin/sh
    image: $(params.BASH_IMAGE)
    name: results
    volumeMounts:
    - mountPath: /layers
      name: layers-dir
  parameters:
  - default: web
    description: The default process type to set on the image.
    name: PROCESS_TYPE
  - default: ''
    description: Reference to a run image to use.
    name: RUN_IMAGE
  - default: ''
    description: The name of the persistent app cache image (if no cache workspace
      is provided).
    name: CACHE_IMAGE
  - default: 'false'
    description: Do not write layer metadata or restore cached layers.
    name: SKIP_RESTORE
  - default: '1000'
    description: The user ID of the builder image user.
    name: USER_ID
  - default: '1000'
    description: The group ID of the builder image user.
    name: GROUP_ID
  - default: empty-dir
    description: The name of the platform directory.
    name: PLATFORM_DIR
  - default: ''
    description: Environment variables to set during _build-time_. The formate is
      `key1=value1,key2=value2`.
    name: ENV_VARS
  - default: docker.io/library/bash:5.1.4
    description: The bash image.
    name: BASH_IMAGE
---
apiVersion: shipwright.io/v1alpha1
kind: ClusterBuildStrategy
metadata:
  name: wasmedge
spec:
  buildSteps:
  - args:
    - -c
    - "set -euo pipefail\n\n# Parse parameters\ncontext=\ndockerfile=\nimage=\nbuildArgs=()\n\
      inBuildArgs=false\nregistriesBlock=\"\"\ninRegistriesBlock=false\nregistriesInsecure=\"\
      \"\ninRegistriesInsecure=false\nregistriesSearch=\"\"\ninRegistriesSearch=false\n\
      tlsVerify=true\nwhile [[ $# -gt 0 ]]; do\n  arg=\"$1\"\n  shift\n\n  if [ \"\
      ${arg}\" == \"--context\" ]; then\n    inBuildArgs=false\n    inRegistriesBlock=false\n\
      \    inRegistriesInsecure=false\n    inRegistriesSearch=false\n    context=\"\
      $1\"\n    shift\n  elif [ \"${arg}\" == \"--dockerfile\" ]; then\n    inBuildArgs=false\n\
      \    inRegistriesBlock=false\n    inRegistriesInsecure=false\n    inRegistriesSearch=false\n\
      \    dockerfile=\"$1\"\n    shift\n  elif [ \"${arg}\" == \"--image\" ]; then\n\
      \    inBuildArgs=false\n    inRegistriesBlock=false\n    inRegistriesInsecure=false\n\
      \    inRegistriesSearch=false\n    image=\"$1\"\n    shift\n  elif [ \"${arg}\"\
      \ == \"--build-args\" ]; then\n    inBuildArgs=true\n    inRegistriesBlock=false\n\
      \    inRegistriesInsecure=false\n    inRegistriesSearch=false\n  elif [ \"${arg}\"\
      \ == \"--registries-block\" ]; then\n    inRegistriesBlock=true\n    inBuildArgs=false\n\
      \    inRegistriesInsecure=false\n    inRegistriesSearch=false\n  elif [ \"${arg}\"\
      \ == \"--registries-insecure\" ]; then\n    inRegistriesInsecure=true\n    inBuildArgs=false\n\
      \    inRegistriesBlock=false\n    inRegistriesSearch=false\n  elif [ \"${arg}\"\
      \ == \"--registries-search\" ]; then\n    inRegistriesSearch=true\n    inBuildArgs=false\n\
      \    inRegistriesBlock=false\n    inRegistriesInsecure=false\n  elif [ \"${inBuildArgs}\"\
      \ == \"true\" ]; then\n    buildArgs+=(\"--build-arg\" \"${arg}\")\n  elif [\
      \ \"${inRegistriesBlock}\" == \"true\" ]; then\n    registriesBlock=\"${registriesBlock}'${arg}',\
      \ \"\n  elif [ \"${inRegistriesInsecure}\" == \"true\" ]; then\n    registriesInsecure=\"\
      ${registriesInsecure}'${arg}', \"\n\n    # This assumes that the image is passed\
      \ before the insecure registries which is fair in this context\n    if [[ ${image}\
      \ == ${arg}/* ]]; then\n      tlsVerify=false\n    fi\n  elif [ \"${inRegistriesSearch}\"\
      \ == \"true\" ]; then\n    registriesSearch=\"${registriesSearch}'${arg}', \"\
      \n  else\n    echo \"Invalid usage\"\n    exit 1\n  fi\ndone\n\n# Verify the\
      \ existence of the context directory\nif [ ! -d \"${context}\" ]; then\n  echo\
      \ -e \"The context directory '${context}' does not exist.\"\n  echo -n \"ContextDirNotFound\"\
      \ > '$(results.shp-error-reason.path)'\n  echo -n \"The context directory '${context}'\
      \ does not exist.\" > '$(results.shp-error-message.path)'\n  exit 1\nfi\ncd\
      \ \"${context}\"\n\n# Verify the existence of the Dockerfile\nif [ ! -f \"${dockerfile}\"\
      \ ]; then\n  echo -e \"The Dockerfile '${dockerfile}' does not exist.\"\n  echo\
      \ -n \"DockerfileNotFound\" > '$(results.shp-error-reason.path)'\n  echo -n\
      \ \"The Dockerfile '${dockerfile}' does not exist.\" > '$(results.shp-error-message.path)'\n\
      \  exit 1\nfi\n\necho \"[INFO] Creating registries config file...\"\nif [ \"\
      ${registriesSearch}\" != \"\" ]; then\n  cat <<EOF >>/tmp/registries.conf\n\
      [registries.search]\nregistries = [${registriesSearch::-2}]\n\nEOF\nfi\nif [\
      \ \"${registriesInsecure}\" != \"\" ]; then\n  cat <<EOF >>/tmp/registries.conf\n\
      [registries.insecure]\nregistries = [${registriesInsecure::-2}]\n\nEOF\nfi\n\
      if [ \"${registriesBlock}\" != \"\" ]; then\n  cat <<EOF >>/tmp/registries.conf\n\
      [registries.block]\nregistries = [${registriesBlock::-2}]\n\nEOF\nfi\n\n# Building\
      \ the image\necho \"[INFO] Building image ${image}\"\nbuildah bud \"${buildArgs[@]}\"\
      \ \\\n  --registries-conf=/tmp/registries.conf \\\n  --tag=\"${image}\" \\\n\
      \  --file=\"${dockerfile}\" \\\n  .\n\n# Push the image\necho \"[INFO] Pushing\
      \ image ${image}\"\nbuildah push \\\n  --digestfile='$(results.shp-image-digest.path)'\
      \ \\\n  --tls-verify=\"${tlsVerify}\" \\\n  \"${image}\" \\\n  \"docker://${image}\"\
      \n"
    - --
    - --context
    - $(params.shp-source-context)
    - --dockerfile
    - $(build.dockerfile)
    - --image
    - $(params.shp-output-image)
    - --build-args
    - $(params.build-args[*])
    - --registries-block
    - $(params.registries-block[*])
    - --registries-insecure
    - $(params.registries-insecure[*])
    - --registries-search
    - $(params.registries-search[*])
    command:
    - /bin/bash
    image: quay.io/containers/buildah:v1.28.0
    name: build-and-push
    resources:
      limits:
        cpu: '1'
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 65Mi
    securityContext:
      privileged: true
    workingDir: $(params.shp-source-root)
  parameters:
  - defaults:
    - annotation=module.wasm.image/variant=compat-smart
    description: The values for the args in the Dockerfile. Values must be in the
      format KEY=VALUE.
    name: build-args
    type: array
  - defaults: []
    description: The registries that need to block pull access.
    name: registries-block
    type: array
  - defaults: []
    description: The fully-qualified name of insecure registries. An insecure registry
      is one that does not have a valid SSL certificate or only supports HTTP.
    name: registries-insecure
    type: array
  - defaults:
    - docker.io
    - quay.io
    description: The registries for searching short name images such as `golang:latest`.
    name: registries-search
    type: array
  - default: ''
    description: Environment variables to set during _build-time_. The formate is
      `key1=value1,key2=value2`.
    name: ENV_VARS
---
