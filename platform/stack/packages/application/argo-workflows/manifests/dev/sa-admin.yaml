# Argo Workflows SSO RBAC.
#
# With sso.rbac.enabled, argo-server maps the logged-in user to a Kubernetes
# ServiceAccount whose `workflows.argoproj.io/rbac-rule` matches the user's OIDC
# `groups` claim (highest precedence wins) and uses that SA's token for the user's
# API calls. If NO rule matches, the user is authenticated but has no permissions
# and every action returns "forbidden".
#
# The platform's realm groups are platform-admin / platform-developer /
# platform-viewer (emitted in the `groups` claim by the Keycloak group mapper), so
# the rules must match those — NOT a bare "admin".
---
# platform-admin -> full access (cluster-admin).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin
  namespace: argo
  annotations:
    workflows.argoproj.io/rbac-rule: "'platform-admin' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "10"
---
apiVersion: v1
kind: Secret
metadata:
  name: admin.service-account-token
  namespace: argo
  annotations:
    kubernetes.io/service-account.name: admin
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: admin
    namespace: argo
---
# platform-developer -> create/run/manage workflows in the argo namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer
  namespace: argo
  annotations:
    workflows.argoproj.io/rbac-rule: "'platform-developer' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: developer.service-account-token
  namespace: argo
  annotations:
    kubernetes.io/service-account.name: developer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-sso-developer
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources:
      - workflows
      - workflows/finalizers
      - workflowtemplates
      - cronworkflows
      - workfloweventbindings
      - workflowtasksets
      - workflowtaskresults
      - workflowartifactgctasks
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-sso-developer
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-sso-developer
subjects:
  - kind: ServiceAccount
    name: developer
    namespace: argo
---
# platform-viewer -> read-only in the argo namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: viewer
  namespace: argo
  annotations:
    workflows.argoproj.io/rbac-rule: "'platform-viewer' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "1"
---
apiVersion: v1
kind: Secret
metadata:
  name: viewer.service-account-token
  namespace: argo
  annotations:
    kubernetes.io/service-account.name: viewer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-sso-viewer
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources:
      - workflows
      - workflowtemplates
      - cronworkflows
      - workfloweventbindings
      - workflowtaskresults
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-sso-viewer
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-sso-viewer
subjects:
  - kind: ServiceAccount
    name: viewer
    namespace: argo
