# Argo Workflows server routed through the Cilium Gateway (adhar-gateway). TLS
# terminates at the Gateway (adhar-cert). The old nginx Ingress used
# rewrite-target: /$2 with use-regex on path /argo-workflows(/|$)(.*), i.e. it
# stripped the /argo-workflows prefix; we replicate that with a URLRewrite
# ReplacePrefixMatch to /. The argo-server Service "web" port is 2746.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-workflows
  namespace: adhar-system
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - argo-workflows.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argo-server
          port: 2746
