# Harbor Helm Chart Values
#
# Gateway API only -- NO nginx Ingress. We expose Harbor as a ClusterIP service
# and route external traffic through the Cilium Gateway via manifests/httproute.yaml.
# Setting expose.type to "clusterIP" prevents the chart from rendering any Ingress.

expose:
  type: clusterIP
  tls:
    enabled: false
  clusterIP:
    name: harbor
    ports:
      httpPort: 80
      httpsPort: 443

# External URL Harbor advertises (must match the Gateway host + path).
externalURL: "https://adhar.localtest.me/harbor"

# Use the chart's bundled (internal) database and redis.
database:
  type: "internal"

redis:
  type: "internal"
