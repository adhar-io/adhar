# Harbor routed through the Cilium Gateway (adhar-gateway) on its OWN hostname,
# harbor.adhar.localtest.me. TLS terminates at the Gateway (adhar-cert, whose
# *.adhar.localtest.me wildcard SAN covers this subdomain). Harbor is given a
# dedicated host because it serves its registry/core APIs at root prefixes
# (/api, /v2, /service, /c, /chartrepo) — under the shared adhar.localtest.me host
# those would hijack other apps' paths. On a dedicated host Harbor safely owns "/".
#
# All traffic is sent to the chart's internal reverse proxy, the "harbor" Service
# (component: nginx), which fans out "/" to the portal and /api,/v2,/service,/c,
# /chartrepo to core exactly as Harbor expects — more robust than splitting those
# prefixes at the Gateway. No path rewrite; externalURL (values.yaml) matches this
# host+port so absolute links resolve.
# NOTE: large image-layer pushes may need Envoy request-body-size tuning at the
# Gateway/GatewayClass level (Gateway API has no direct proxy-body-size equivalent).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: adhar-system
  labels:
    app.kubernetes.io/instance: harbor
    app.kubernetes.io/name: harbor
    app.kubernetes.io/part-of: harbor
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - harbor.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: harbor
          port: 80
