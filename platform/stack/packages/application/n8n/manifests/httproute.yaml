# n8n routed through the Cilium Gateway (adhar-gateway). TLS terminates at the
# Gateway (adhar-cert), replacing the chart's Ingress (disabled in values.yaml).
# Requests to /n8n are forwarded to the n8n service on port 80. n8n is configured
# (N8N_PATH / WEBHOOK_URL) to serve under the /n8n sub-path.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: n8n
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: n8n
    app.kubernetes.io/part-of: n8n
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /n8n
      backendRefs:
        - name: n8n
          port: 80
