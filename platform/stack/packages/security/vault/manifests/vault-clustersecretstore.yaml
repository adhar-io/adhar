# ClusterSecretStore wiring external-secrets to the in-cluster HashiCorp Vault.
#
# This store lives in the *vault* package (not external-secrets) on purpose: its
# readiness depends entirely on Vault being initialized/unsealed and configured
# with the "external-secrets" kubernetes-auth role. Keeping it here means the
# external-secrets Application stays Healthy as soon as its controllers are up
# (it no longer reports Degraded while Vault bootstraps), and the store's
# transient not-ready window is attributed to the Vault app that actually owns it.
#
# Sync-wave "3" runs it just after the Vault bootstrap Job (wave "2"), which
# enables KV v2, kubernetes auth and the "external-secrets" role — so the store's
# first connectivity/auth check succeeds almost immediately and it goes Ready
# without a long Degraded window. The external-secrets CRDs it needs are already
# registered (external-secrets is a core, fast-installing package).
#
# Auth: the external-secrets controller ServiceAccount (external-secrets /
# external-secrets ns) logs in via Vault's kubernetes auth (mount "kubernetes",
# role "external-secrets") and gets the read-only "external-secrets" policy.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/component: secret-store
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  provider:
    vault:
      server: "http://vault.adhar-system.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "adhar-system"
