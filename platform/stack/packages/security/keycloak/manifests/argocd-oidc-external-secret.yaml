# Delivers the Keycloak `argocd` client secret into the chart-managed `argocd-secret`
# so that `$oidc.keycloak.clientSecret` (referenced by oidc.config in argocd-cm) resolves.
# creationPolicy: Merge keeps the rest of argocd-secret owned by the Argo CD chart and
# only patches in the single OIDC key.
# Source: the `keycloak-clients` Secret (keycloak ns) read via the pre-existing
# kubernetes-backed `keycloak` ClusterSecretStore (see secret-gen.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: adhar-system
  annotations:
    # Wave 40: consumes keycloak-clients, which the realm job writes at wave 20.
    # Applying it earlier fails with "could not get secret data from provider"
    # and deadlocks the whole keycloak sync.
    argocd.argoproj.io/sync-wave: "40"
spec:
  secretStoreRef:
    name: keycloak
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: oidc.keycloak.clientSecret
      remoteRef:
        key: keycloak-clients
        property: ARGOCD_CLIENT_SECRET
