# Delivers the Keycloak `gitea` client credentials into the `gitea-oauth` secret in the
# adhar-system namespace (where the Gitea bootstrap StatefulSet runs), keys `key`
# (client id) and `secret` (client secret). The actual Gitea OAuth2 login source is
# registered by the gitea-oauth-config Job (see gitea-oauth-config.yaml), which reads
# the same client id/secret from keycloak-clients and runs `gitea admin auth ...` inside
# the Gitea pod. This Secret is kept so the credentials are also available in
# adhar-system for any future declarative wiring.
# Source: the `keycloak-clients` Secret (keycloak ns) read via the pre-existing
# kubernetes-backed `keycloak` ClusterSecretStore (see secret-gen.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-oauth
  namespace: adhar-system
  annotations:
    # Wave 40: consumes keycloak-clients (written by the realm job at wave 20).
    argocd.argoproj.io/sync-wave: "40"
spec:
  secretStoreRef:
    name: keycloak
    kind: ClusterSecretStore
  target:
    name: gitea-oauth
  data:
    - secretKey: key
      remoteRef:
        key: keycloak-clients
        property: GITEA_CLIENT_ID
    - secretKey: secret
      remoteRef:
        key: keycloak-clients
        property: GITEA_CLIENT_SECRET
