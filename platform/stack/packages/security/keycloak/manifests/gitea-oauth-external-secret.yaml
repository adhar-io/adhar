# Delivers the Keycloak `gitea` client credentials into the `gitea-oauth` secret in the
# adhar-system namespace (where the Gitea bootstrap deployment runs). The Gitea OAuth2
# source configured in hack/gitea/values.yaml reads keys `key` (client id) and `secret`
# (client secret) from this secret via GITEA_OAUTH_KEY_0 / GITEA_OAUTH_SECRET_0.
# Source: the `keycloak-clients` Secret (keycloak ns) read via the pre-existing
# kubernetes-backed `keycloak` ClusterSecretStore (see secret-gen.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-oauth
  namespace: adhar-system
spec:
  secretStoreRef:
    name: keycloak
    kind: ClusterSecretStore
  target:
    name: gitea-oauth
  data:
    - secretKey: key
      remoteRef:
        key: keycloak-clients
        property: GITEA_CLIENT_ID
    - secretKey: secret
      remoteRef:
        key: keycloak-clients
        property: GITEA_CLIENT_SECRET
