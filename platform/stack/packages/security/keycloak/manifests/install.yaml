---
apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: keycloak
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: keycloak
  name: keycloak
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - args:
            - start-dev
          env:
            - name: KEYCLOAK_ADMIN
              value: adhar-admin
            - name: KEYCLOAK_LOGLEVEL
              value: ALL
            - name: QUARKUS_TRANSACTION_MANAGER_ENABLE_RECOVERY
              value: 'true'
          envFrom:
            - secretRef:
                name: keycloak-config
          image: quay.io/keycloak/keycloak:22.0.3
          name: keycloak
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
          volumeMounts:
            - mountPath: /opt/keycloak/conf
              name: keycloak-config
              readOnly: true
      volumes:
        - configMap:
            name: keycloak-config
          name: keycloak-config
---
apiVersion: v1
data:
  keycloak.conf: |
    # Database
    # The database vendor.
    db=postgres
    
    # The username of the database user.
    db-url=jdbc:postgresql://keycloak-db-rw.adhar-system.svc.cluster.local:5432/keycloak

    # The proxy address forwarding mode if the server is behind a reverse proxy.
    proxy=edge
    
    # hostname configuration — Keycloak has its own subdomain, served at root
    # (no http-relative-path). Issuer: https://keycloak.adhar.localtest.me:8443/realms/adhar
    hostname=keycloak.adhar.localtest.me
    hostname-port=8443

    # the admin url requires its own configuration to reflect correct url
    hostname-admin=keycloak.adhar.localtest.me:8443
    
    hostname-debug=true
    
    # this should only be allowed in development. NEVER in production.
    hostname-strict=false
    hostname-strict-backchannel=false
    

kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: adhar-system
---
# Keycloak's database is provisioned by CloudNativePG (the platform's CNPG
# operator) instead of a hand-rolled single-pod postgres StatefulSet. CNPG gives
# managed lifecycle, health, backups and (when instances>1) failover. The owner
# role + password come from the keycloak-config Secret (username/password keys),
# so Keycloak and the database share one ESO-generated credential.
# CNPG creates the read-write Service "keycloak-db-rw" automatically.
# sync-wave 5: after secret-gen (wave 0, provides keycloak-config) and before
# the Keycloak Deployment (wave 10), which then waits for the DB to be Ready.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instances: 1
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      secret:
        name: keycloak-config
