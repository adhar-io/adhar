apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: keycloak
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: keycloak
  name: keycloak
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/sync-wave: '10'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - args:
        - start-dev
        env:
        - name: KEYCLOAK_ADMIN
          value: adhar-admin
        - name: KEYCLOAK_LOGLEVEL
          value: ALL
        - name: QUARKUS_TRANSACTION_MANAGER_ENABLE_RECOVERY
          value: 'true'
        envFrom:
        - secretRef:
            name: keycloak-config
        image: quay.io/keycloak/keycloak:22.0.3
        name: keycloak
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /realms/master
            port: 8080
        volumeMounts:
        - mountPath: /opt/keycloak/conf
          name: keycloak-config
          readOnly: true
      volumes:
      - configMap:
          name: keycloak-config
        name: keycloak-config
---
apiVersion: v1
data:
  keycloak.conf: "# Database\n# The database vendor.\ndb=postgres\n\n# The username\
    \ of the database user.\ndb-url=jdbc:postgresql://keycloak-db-rw.adhar-system.svc.cluster.local:5432/keycloak\n\
    \n# The proxy address forwarding mode if the server is behind a reverse proxy.\n\
    proxy=edge\n\n# hostname configuration \u2014 Keycloak has its own subdomain,\
    \ served at root\n# (no http-relative-path). Issuer: https://keycloak.adhar.localtest.me:8443/realms/adhar\n\
    hostname=keycloak.adhar.localtest.me\nhostname-port=8443\n\n# the admin url requires\
    \ its own configuration to reflect correct url\nhostname-admin=keycloak.adhar.localtest.me:8443\n\
    \nhostname-debug=true\n\n# this should only be allowed in development. NEVER in\
    \ production.\nhostname-strict=false\nhostname-strict-backchannel=false\n"
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: adhar-system
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  instances: 1
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      secret:
        name: keycloak-config
