# Registers the Keycloak `keycloak` OAuth2 login source inside Gitea.
#
# Background: Gitea is a BOOTSTRAP component (installed before Keycloak), so it cannot
# depend on a Keycloak client secret at startup. The gitea-oauth ExternalSecret only
# *delivers* the client id/secret into the adhar-system namespace; nothing consumes it.
# Without an actual OAuth2 auth source registered in Gitea, no "Sign in with Keycloak"
# button appears and SSO does not work. This PostSync Job runs once Keycloak has created
# the `gitea` client + keycloak-clients Secret and registers (or updates) the source by
# exec-ing `gitea admin auth ...` inside the running Gitea pod. The local `gitea_admin`
# account remains as break-glass.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-oauth-config
  namespace: keycloak
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-oauth-config
  namespace: adhar-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-oauth-config
  namespace: adhar-system
subjects:
  - kind: ServiceAccount
    name: gitea-oauth-config
    namespace: keycloak
roleRef:
  kind: Role
  name: gitea-oauth-config
  apiGroup: rbac.authorization.k8s.io
---
# Read access to keycloak-clients in the keycloak namespace. Without this the
# Job's `kubectl get secret keycloak-clients` returns Forbidden and the Job
# loops forever "waiting for keycloak-clients", which (as a wave-30 Sync hook)
# stalls the Keycloak sync so the HTTPRoute (later wave) never applies — i.e.
# Keycloak returns 503 at the gateway even though the server is healthy.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-oauth-config
  namespace: keycloak
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-oauth-config
  namespace: keycloak
subjects:
  - kind: ServiceAccount
    name: gitea-oauth-config
    namespace: keycloak
roleRef:
  kind: Role
  name: gitea-oauth-config
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-oauth-config
  namespace: keycloak
  annotations:
    # Sync wave 30: after the realm 'config' job (wave 20) has written
    # keycloak-clients (this job reads the gitea client secret from it).
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "30"
spec:
  template:
    metadata:
      generateName: gitea-oauth-config
    spec:
      serviceAccountName: gitea-oauth-config
      restartPolicy: Never
      containers:
        - name: kubectl
          image: docker.io/library/ubuntu:22.04
          command: ["/bin/bash", "-c"]
          args:
            - |
              #! /bin/bash
              set -ex -o pipefail
              apt -qq update && apt -qq install curl -y
              # Match the cluster architecture. The old hardcoded
              # "v1.28.3//bin/linux/amd64" URL (double slash + amd64) downloaded
              # an XML error page on arm64, so `./kubectl get secret` always
              # failed and this job looped forever "waiting for keycloak-clients"
              # even though it existed — stalling the keycloak sync at this wave
              # so the HTTPRoute (later wave) never applied (Keycloak 503).
              KVER="$(curl -sSL https://dl.k8s.io/release/stable.txt)"
              ARCH="$(uname -m)"
              case "${ARCH}" in
                x86_64) ARCH="amd64" ;;
                aarch64|arm64) ARCH="arm64" ;;
              esac
              curl -sS -LO "https://dl.k8s.io/release/${KVER}/bin/linux/${ARCH}/kubectl"
              chmod +x kubectl
              KUBECTL=./kubectl
              # Wait until Keycloak has published the gitea client secret.
              set +e
              for i in $(seq 1 60); do
                $KUBECTL -n keycloak get secret keycloak-clients &> /dev/null && break
                echo "waiting for keycloak-clients secret ($i)"
                sleep 10
              done
              set -e
              CLIENT_ID=$($KUBECTL -n keycloak get secret keycloak-clients -o go-template='{{index .data "GITEA_CLIENT_ID" | base64decode}}')
              CLIENT_SECRET=$($KUBECTL -n keycloak get secret keycloak-clients -o go-template='{{index .data "GITEA_CLIENT_SECRET" | base64decode}}')
              # Locate the running Gitea pod in adhar-system.
              GITEA_POD=$($KUBECTL -n adhar-system get pods -l app=gitea -o jsonpath='{.items[0].metadata.name}')
              ISSUER="https://adhar.localtest.me:8443/keycloak/realms/adhar"
              AUTH_NAME="keycloak"
              # Gitea performs server-side OIDC discovery against the issuer URL,
              # which is served by the gateway with the platform's self-signed
              # cert. Unlike ArgoCD/Grafana, `gitea admin auth add-oauth` has no
              # skip-TLS flag, so it fails with "x509: certificate signed by
              # unknown authority". Fix: build a CA bundle = the image's system
              # CAs + the adhar self-signed cert and point Gitea at it via
              # SSL_CERT_FILE (honoured by Go's TLS stack). The single-line base64
              # value is decoded inside the pod, so there is no PEM-escaping pain.
              ADHAR_CA_B64=$($KUBECTL -n adhar-system get secret adhar-cert -o go-template='{{index .data "tls.crt"}}' 2>/dev/null || true)
              CA_SETUP=""
              if [ -n "${ADHAR_CA_B64}" ]; then
                CA_SETUP="cp /etc/ssl/certs/ca-certificates.crt /tmp/ca-bundle.crt 2>/dev/null || touch /tmp/ca-bundle.crt; echo '${ADHAR_CA_B64}' | base64 -d >> /tmp/ca-bundle.crt; export SSL_CERT_FILE=/tmp/ca-bundle.crt; "
              fi
              # Idempotent: update the source if it already exists, otherwise add it.
              # Provider name "keycloak" matches the registered redirect URI
              # .../gitea/user/oauth2/keycloak/callback. Non-fatal (|| true): a
              # transient OIDC hiccup must not fail this Sync hook and wedge the
              # whole keycloak app — Gitea local login always works as break-glass.
              EXISTING_ID=$($KUBECTL -n adhar-system exec "${GITEA_POD}" -- sh -c \
                "gitea admin auth list 2>/dev/null | awk -v n=\"${AUTH_NAME}\" '\$2==n {print \$1}'" || true)
              if [ -n "${EXISTING_ID}" ]; then
                $KUBECTL -n adhar-system exec "${GITEA_POD}" -- sh -c \
                  "${CA_SETUP}gitea admin auth update-oauth --id ${EXISTING_ID} \
                    --provider openidConnect \
                    --key '${CLIENT_ID}' \
                    --secret '${CLIENT_SECRET}' \
                    --auto-discover-url '${ISSUER}/.well-known/openid-configuration' \
                    --scopes 'openid profile email groups'" || echo "WARN: gitea update-oauth failed (gitea local login still works)"
              else
                $KUBECTL -n adhar-system exec "${GITEA_POD}" -- sh -c \
                  "${CA_SETUP}gitea admin auth add-oauth \
                    --name '${AUTH_NAME}' \
                    --provider openidConnect \
                    --key '${CLIENT_ID}' \
                    --secret '${CLIENT_SECRET}' \
                    --auto-discover-url '${ISSUER}/.well-known/openid-configuration' \
                    --scopes 'openid profile email groups' \
                    --skip-local-2fa" || echo "WARN: gitea add-oauth failed (gitea local login still works)"
              fi
              echo "Gitea Keycloak OAuth source configuration step complete."
