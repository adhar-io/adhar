apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-oauth-config
  namespace: adhar-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-oauth-config
  namespace: adhar-system
rules:
- apiGroups:
  - ''
  resources:
  - pods
  verbs:
  - get
  - list
- apiGroups:
  - ''
  resources:
  - pods/exec
  verbs:
  - create
- apiGroups:
  - ''
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-oauth-config
  namespace: adhar-system
subjects:
- kind: ServiceAccount
  name: gitea-oauth-config
  namespace: adhar-system
roleRef:
  kind: Role
  name: gitea-oauth-config
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-oauth-config
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: '30'
spec:
  template:
    metadata:
      generateName: gitea-oauth-config
    spec:
      serviceAccountName: gitea-oauth-config
      restartPolicy: Never
      containers:
      - name: kubectl
        image: docker.io/library/ubuntu:22.04
        command:
        - /bin/bash
        - -c
        args:
        - "#! /bin/bash\nset -ex -o pipefail\napt -qq update && apt -qq install curl\
          \ -y\n# Match the cluster architecture. The old hardcoded\n# \"v1.28.3//bin/linux/amd64\"\
          \ URL (double slash + amd64) downloaded\n# an XML error page on arm64, so\
          \ `./kubectl get secret` always\n# failed and this job looped forever \"\
          waiting for keycloak-clients\"\n# even though it existed \u2014 stalling\
          \ the keycloak sync at this wave\n# so the HTTPRoute (later wave) never\
          \ applied (Keycloak 503).\nKVER=\"$(curl -sSL https://dl.k8s.io/release/stable.txt)\"\
          \nARCH=\"$(uname -m)\"\ncase \"${ARCH}\" in\n  x86_64) ARCH=\"amd64\" ;;\n\
          \  aarch64|arm64) ARCH=\"arm64\" ;;\nesac\ncurl -sS -LO \"https://dl.k8s.io/release/${KVER}/bin/linux/${ARCH}/kubectl\"\
          \nchmod +x kubectl\nKUBECTL=./kubectl\n# Wait until Keycloak has published\
          \ the gitea client secret.\nset +e\nfor i in $(seq 1 60); do\n  $KUBECTL\
          \ -n adhar-system get secret keycloak-clients &> /dev/null && break\n  echo\
          \ \"waiting for keycloak-clients secret ($i)\"\n  sleep 10\ndone\nset -e\n\
          CLIENT_ID=$($KUBECTL -n adhar-system get secret keycloak-clients -o go-template='{{index\
          \ .data \"GITEA_CLIENT_ID\" | base64decode}}')\nCLIENT_SECRET=$($KUBECTL\
          \ -n adhar-system get secret keycloak-clients -o go-template='{{index .data\
          \ \"GITEA_CLIENT_SECRET\" | base64decode}}')\n# Locate the running Gitea\
          \ pod in adhar-system.\nGITEA_POD=$($KUBECTL -n adhar-system get pods -l\
          \ app=gitea -o jsonpath='{.items[0].metadata.name}')\nISSUER=\"https://keycloak.adhar.localtest.me:8443/realms/adhar\"\
          \nAUTH_NAME=\"keycloak\"\n# Gitea performs server-side OIDC discovery against\
          \ the issuer URL,\n# which is served by the gateway with the platform's\
          \ self-signed\n# cert. Unlike ArgoCD/Grafana, `gitea admin auth add-oauth`\
          \ has no\n# skip-TLS flag, so it fails with \"x509: certificate signed by\n\
          # unknown authority\". Fix: build a CA bundle = the image's system\n# CAs\
          \ + the adhar self-signed cert and point Gitea at it via\n# SSL_CERT_FILE\
          \ (honoured by Go's TLS stack). The single-line base64\n# value is decoded\
          \ inside the pod, so there is no PEM-escaping pain.\nADHAR_CA_B64=$($KUBECTL\
          \ -n adhar-system get secret adhar-cert -o go-template='{{index .data \"\
          tls.crt\"}}' 2>/dev/null || true)\nCA_SETUP=\"\"\nif [ -n \"${ADHAR_CA_B64}\"\
          \ ]; then\n  CA_SETUP=\"cp /etc/ssl/certs/ca-certificates.crt /tmp/ca-bundle.crt\
          \ 2>/dev/null || touch /tmp/ca-bundle.crt; echo '${ADHAR_CA_B64}' | base64\
          \ -d >> /tmp/ca-bundle.crt; export SSL_CERT_FILE=/tmp/ca-bundle.crt; \"\n\
          fi\n# Idempotent: update the source if it already exists, otherwise add\
          \ it.\n# Provider name \"keycloak\" matches the registered redirect URI\n\
          # .../gitea/user/oauth2/keycloak/callback. Non-fatal (|| true): a\n# transient\
          \ OIDC hiccup must not fail this Sync hook and wedge the\n# whole keycloak\
          \ app \u2014 Gitea local login always works as break-glass.\nEXISTING_ID=$($KUBECTL\
          \ -n adhar-system exec \"${GITEA_POD}\" -- sh -c \\\n  \"gitea admin auth\
          \ list 2>/dev/null | awk -v n=\\\"${AUTH_NAME}\\\" '\\$2==n {print \\$1}'\"\
          \ || true)\nif [ -n \"${EXISTING_ID}\" ]; then\n  $KUBECTL -n adhar-system\
          \ exec \"${GITEA_POD}\" -- sh -c \\\n    \"${CA_SETUP}gitea admin auth update-oauth\
          \ --id ${EXISTING_ID} \\\n      --provider openidConnect \\\n      --key\
          \ '${CLIENT_ID}' \\\n      --secret '${CLIENT_SECRET}' \\\n      --auto-discover-url\
          \ '${ISSUER}/.well-known/openid-configuration' \\\n      --scopes 'openid\
          \ profile email groups' \\\n      --group-claim-name groups \\\n      --admin-group\
          \ platform-admin\" || echo \"WARN: gitea update-oauth failed (gitea local\
          \ login still works)\"\nelse\n  $KUBECTL -n adhar-system exec \"${GITEA_POD}\"\
          \ -- sh -c \\\n    \"${CA_SETUP}gitea admin auth add-oauth \\\n      --name\
          \ '${AUTH_NAME}' \\\n      --provider openidConnect \\\n      --key '${CLIENT_ID}'\
          \ \\\n      --secret '${CLIENT_SECRET}' \\\n      --auto-discover-url '${ISSUER}/.well-known/openid-configuration'\
          \ \\\n      --scopes 'openid profile email groups' \\\n      --group-claim-name\
          \ groups \\\n      --admin-group platform-admin \\\n      --skip-local-2fa\"\
          \ || echo \"WARN: gitea add-oauth failed (gitea local login still works)\"\
          \nfi\necho \"Gitea Keycloak OAuth source configuration step complete.\"\n"
