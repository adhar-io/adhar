# Delivers the Keycloak `grafana` client id/secret into the `grafana-oidc` Secret
# that Grafana mounts via envFromSecrets (optional) to enable generic_oauth SSO.
# Lives in the keycloak package (alongside argocd-oidc / gitea-oauth) so the
# kube-prometheus Application's health is not gated on Keycloak: kube-prometheus
# stays a pure-monitoring app, and this secret's readiness is owned by keycloak.
# Source: the `keycloak-clients` Secret (keycloak ns) via the kubernetes-backed
# `keycloak` ClusterSecretStore (see secret-gen.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  # Target Secret is created here, in the namespace where the Grafana pod runs
  # (adhar-system), so grafana's `envFromSecrets: grafana-oidc` can mount it.
  namespace: adhar-system
  annotations:
    # Wave 40: consumes keycloak-clients, which the realm job writes at wave 20.
    # Applying earlier fails with "could not get secret data from provider".
    argocd.argoproj.io/sync-wave: "40"
spec:
  secretStoreRef:
    name: keycloak
    kind: ClusterSecretStore
  target:
    name: grafana-oidc
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      remoteRef:
        key: keycloak-clients
        property: GRAFANA_CLIENT_ID
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: keycloak-clients
        property: GRAFANA_CLIENT_SECRET