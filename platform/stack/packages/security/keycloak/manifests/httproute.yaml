# Keycloak routed through the Cilium Gateway (adhar-gateway). TLS terminates at
# the Gateway, replacing the old nginx Ingress. Keycloak is served under the
# external /keycloak sub-path, so the prefix is forwarded unchanged (no rewrite).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    # Wave 15: right after the Keycloak Deployment (wave 10), BEFORE the OIDC
    # integration jobs (realm wave 20, gitea-oauth wave 30). The route only
    # needs the server; gating it behind those jobs meant a single failing job
    # (e.g. gitea OAuth registration hitting the self-signed cert) left Keycloak
    # with no HTTPRoute — so Backstage's "/" catch-all route shadowed /keycloak.
    argocd.argoproj.io/sync-wave: "15"
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - localhost
    - adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /keycloak
      backendRefs:
        - name: keycloak
          port: 8080
