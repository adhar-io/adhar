# Keycloak routed through the Cilium Gateway (adhar-gateway) on its own hostname,
# keycloak.adhar.localtest.me (wildcard cert *.adhar.localtest.me covers it). It
# serves at root (no http-relative-path), so "/" forwards unchanged to :8080.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    # Wave 15: right after the Keycloak Deployment (wave 10), BEFORE the OIDC
    # integration jobs (realm wave 20, gitea-oauth wave 30). The route only
    # needs the server; gating it behind those jobs meant a single failing job
    # (e.g. gitea OAuth registration hitting the self-signed cert) left Keycloak
    # with no HTTPRoute — so Backstage's "/" catch-all route shadowed /keycloak.
    argocd.argoproj.io/sync-wave: "15"
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - keycloak.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keycloak
          port: 8080
