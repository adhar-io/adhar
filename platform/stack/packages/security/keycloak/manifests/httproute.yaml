# Keycloak routed through the Cilium Gateway (adhar-gateway). TLS terminates at
# the Gateway, replacing the old nginx Ingress. Keycloak is served under the
# external /keycloak sub-path, so the prefix is forwarded unchanged (no rewrite).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - localhost
    - adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /keycloak
      backendRefs:
        - name: keycloak
          port: 8080
