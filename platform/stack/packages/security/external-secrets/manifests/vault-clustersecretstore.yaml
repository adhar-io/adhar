# ClusterSecretStore wiring external-secrets to the in-cluster HashiCorp Vault.
#
# Applied after the external-secrets controllers (chart objects = sync-wave 0)
# AND after the Vault bootstrap Job (which enables KV v2, kubernetes auth and
# the "external-secrets" role). A high sync-wave keeps this last so the store's
# initial connectivity check can succeed.
#
# Auth: the external-secrets controller ServiceAccount (external-secrets /
# external-secrets ns) logs in via Vault's kubernetes auth (mount "kubernetes",
# role "external-secrets") and gets the read-only "external-secrets" policy.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/component: secret-store
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
