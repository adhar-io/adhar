# ArgoCD runs in adhar-system (Adhar's bootstrap), so the store that reads its
# secrets (argocd-initial-admin-secret) must target adhar-system. The backing
# ServiceAccount is named eso-store-argocd to avoid colliding with the eso-store
# SA the keycloak package already creates in adhar-system.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-store-argocd
  namespace: adhar-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-store-argocd
  namespace: adhar-system
rules:
  - apiGroups: [""]
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - authorization.k8s.io
    resources:
      - selfsubjectrulesreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-store-argocd
  namespace: adhar-system
subjects:
  - kind: ServiceAccount
    name: eso-store-argocd
    namespace: adhar-system
roleRef:
  kind: Role
  name: eso-store-argocd
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: argocd
spec:
  provider:
    kubernetes:
      remoteNamespace: adhar-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: adhar-system
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-store-argocd
          namespace: adhar-system
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-credentials
  namespace: backstage
spec:
  secretStoreRef:
    name: argocd
    kind: ClusterSecretStore
  refreshInterval: "0"
  target:
    name: argocd-credentials
  data:
    - secretKey: ARGOCD_ADMIN_PASSWORD
      remoteRef:
        key: argocd-initial-admin-secret
        property: password