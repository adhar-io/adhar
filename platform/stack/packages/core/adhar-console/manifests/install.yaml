apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: adhar-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-argo-worfklows
rules:
- apiGroups:
  - argoproj.io
  resources:
  - workflows
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: read-all
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-argo-worfklows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-argo-worfklows
subjects:
- kind: ServiceAccount
  name: backstage
  namespace: adhar-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-read-all
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: read-all
subjects:
- kind: ServiceAccount
  name: backstage
  namespace: adhar-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-config
  namespace: adhar-system
data:
  app-config.yaml: "app:\n  title: Adhar Console\n  baseUrl: https://console.adhar.localtest.me:8443\n\
    organization:\n  name: Adhar\nbackend:\n  # Used for enabling authentication,\
    \ secret is shared by all backend plugins\n  # See https://backstage.io/docs/tutorials/backend-to-backend-auth\
    \ for\n  # information on the format\n  # auth:\n  #   keys:\n  #     - secret:\
    \ ${BACKEND_SECRET}\n  baseUrl: https://console.adhar.localtest.me:8443\n  listen:\n\
    \    port: 7007\n    # Uncomment the following host directive to bind to specific\
    \ interfaces\n    # host: 127.0.0.1\n  csp:\n    connect-src: [\"'self'\", 'http:',\
    \ 'https:']\n    # Content-Security-Policy directives follow the Helmet format:\
    \ https://helmetjs.github.io/#reference\n    # Default Helmet Content-Security-Policy\
    \ values can be removed by setting the key to false\n  cors:\n    origin: https://console.adhar.localtest.me:8443\n\
    \    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]\n    credentials: true\n \
    \ database:\n    client: pg\n    connection:\n      host: ${POSTGRES_HOST}\n \
    \     port: ${POSTGRES_PORT}\n      user: ${POSTGRES_USER}\n      password: ${POSTGRES_PASSWORD}\n\
    \  cache:\n    store: memory\n  # workingDirectory: /tmp # Use this to configure\
    \ a working directory for the scaffolder, defaults to the OS temp-dir\n\nintegrations:\n\
    \  gitea:\n    - baseUrl: https://gitea.adhar.localtest.me:8443\n      host: gitea.adhar.localtest.me:8443\n\
    \      username: ${GITEA_USERNAME}\n      password: ${GITEA_PASSWORD}\n    - baseUrl:\
    \ https://gitea.adhar.localtest.me:8443\n      host: gitea.adhar.localtest.me:8443\n\
    \      username: ${GITEA_USERNAME}\n      password: ${GITEA_PASSWORD}\n#  github:\n\
    #    - host: github.com\n#      apps:\n#        - $include: github-integration.yaml\n\
    #    - host: github.com\n#      # This is a Personal Access Token or PAT from\
    \ GitHub. You can find out how to generate this token, and more information\n\
    #      # about setting up the GitHub integration here: https://backstage.io/docs/getting-started/configuration#setting-up-a-github-integration\n\
    #      token: ${GITHUB_TOKEN}\n    ### Example for how to add your GitHub Enterprise\
    \ instance using the API:\n    # - host: ghe.example.net\n    #   apiBaseUrl:\
    \ https://ghe.example.net/api/v3\n    #   token: ${GHE_TOKEN}\n\nproxy:\n  endpoints:\n\
    \    '/coder':\n      # Replace with your Coder deployment access URL (add a trailing\
    \ slash)\n      target: 'https://coder.example.com/'\n\n      changeOrigin: true\n\
    \      allowedMethods: ['GET'] # Additional methods will be supported soon!\n\
    \      allowedHeaders: ['Authorization', 'Coder-Session-Token']\n      headers:\n\
    \        X-Custom-Source: backstage\n\n# Reference documentation http://backstage.io/docs/features/techdocs/configuration\n\
    # Note: After experimenting with basic setup, use CI/CD to generate docs\n# and\
    \ an external cloud storage when deploying TechDocs for production use-case.\n\
    # https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach\n\
    techdocs:\n  builder: 'local' # Alternatives - 'external'\n  generator:\n    runIn:\
    \ 'local'\n  publisher:\n    type: 'local' # Alternatives - 'googleGcs' or 'awsS3'.\
    \ Read documentation for using alternatives.\n\nauth:\n  environment: development\n\
    \  session:\n    secret: MW2sV-sIPngEl26vAzatV-6VqfsgAx4bPIz7PuE_2Lk=\n  providers:\n\
    \    keycloak-oidc:\n      development:\n        metadataUrl: ${KEYCLOAK_NAME_METADATA}\n\
    \        clientId: backstage\n        clientSecret: ${KEYCLOAK_CLIENT_SECRET}\n\
    \        prompt: auto\n  \nscaffolder:\n  # see https://backstage.io/docs/features/software-templates/configuration\
    \ for software template options\n    defaultAuthor:\n      name: backstage-scaffolder\n\
    \      email: noreply\n    defaultCommitMessage: \"backstage scaffolder\"\ncatalog:\n\
    \  import:\n    entityFilename: catalog-info.yaml\n    pullRequestBranchName:\
    \ backstage-integration\n  rules:\n    - allow: [Component, System, API, Resource,\
    \ Location, Template]\n  locations:\n    # Examples from a public GitHub repository.\n\
    \    - type: url\n      target: https://gitea.adhar.localtest.me:8443/giteaAdmin/adhar-adhar-backstage-templates-adhar-templates/raw/branch/main/catalog-info.yaml\n\
    \      rules:\n        - allow: [Component, System, API, Resource, Location, Template,\
    \ User, Group]\nkubernetes:\n  serviceLocatorMethod:\n    type: 'multiTenant'\n\
    \  clusterLocatorMethods:\n    - $include: k8s-config.yaml\nargocd:\n  username:\
    \ admin\n  password: ${ARGOCD_ADMIN_PASSWORD}\n  appLocatorMethods:\n    - type:\
    \ 'config'\n      instances:\n        - name: in-cluster\n          url: https://argocd.adhar.localtest.me:8443\n\
    \          username: admin\n          password: ${ARGOCD_ADMIN_PASSWORD}\nargoWorkflows:\n\
    \    baseUrl: ${ARGO_WORKFLOWS_URL}\n"
---
apiVersion: v1
kind: Secret
metadata:
  name: k8s-config
  namespace: adhar-system
stringData:
  k8s-config.yaml: "type: 'config'\nclusters:\n  - url: https://kubernetes.default.svc.cluster.local\n\
    \    name: local\n    authProvider: 'serviceAccount'\n    skipTLSVerify: true\n\
    \    skipMetricsLookup: true\n    serviceAccountToken: \n      $file: /var/run/secrets/kubernetes.io/serviceaccount/token\n\
    \    caData: \n      $file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt\n"
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: adhar-system
spec:
  ports:
  - name: http
    port: 7007
    targetPort: http
  selector:
    app: backstage
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: backstage-db
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  instances: 1
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: backstage
      owner: backstage
      secret:
        name: backstage-env-vars
      postInitApplicationSQL:
      - ALTER ROLE backstage CREATEDB
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adhar-console
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/sync-wave: '20'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      containers:
      - command:
        - node
        - packages/backend
        - --config
        - config/app-config.yaml
        env:
        - name: LOG_LEVEL
          value: debug
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: '0'
        envFrom:
        - secretRef:
            name: backstage-env-vars
        - secretRef:
            name: gitea-credentials
        - secretRef:
            name: argocd-credentials
        image: ghcr.io/adhar-io/adhar-console:latest
        name: adhar-console
        ports:
        - containerPort: 7007
          name: http
        volumeMounts:
        - mountPath: /app/config
          name: backstage-config
          readOnly: true
      serviceAccountName: backstage
      volumes:
      - name: backstage-config
        projected:
          sources:
          - configMap:
              items:
              - key: app-config.yaml
                path: app-config.yaml
              name: backstage-config
          - secret:
              items:
              - key: k8s-config.yaml
                path: k8s-config.yaml
              name: k8s-config
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: backstage
  namespace: adhar-system
spec:
  length: 36
  digits: 5
  symbols: 5
  symbolCharacters: /-+
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backstage-oidc
  namespace: adhar-system
spec:
  secretStoreRef:
    name: keycloak
    kind: ClusterSecretStore
  refreshInterval: '0'
  target:
    name: backstage-env-vars
    template:
      engineVersion: v2
      data:
        BACKSTAGE_FRONTEND_URL: https://console.adhar.localtest.me:8443
        POSTGRES_HOST: backstage-db-rw.adhar-system.svc.cluster.local
        POSTGRES_PORT: '5432'
        POSTGRES_DB: backstage
        POSTGRES_USER: backstage
        POSTGRES_PASSWORD: '{{.POSTGRES_PASSWORD}}'
        username: backstage
        password: '{{.POSTGRES_PASSWORD}}'
        ARGO_WORKFLOWS_URL: https://argo-workflows.adhar.localtest.me:8443
        KEYCLOAK_NAME_METADATA: https://keycloak.adhar.localtest.me:8443/realms/adhar/.well-known/openid-configuration
        KEYCLOAK_CLIENT_SECRET: '{{.BACKSTAGE_CLIENT_SECRET}}'
        ARGOCD_AUTH_TOKEN: argocd.token={{.ARGOCD_SESSION_TOKEN}}
        ARGO_CD_URL: http://argo-cd-argocd-server.adhar-system.svc.cluster.local/api/v1/
  data:
  - secretKey: ARGOCD_SESSION_TOKEN
    remoteRef:
      key: keycloak-clients
      property: ARGOCD_SESSION_TOKEN
  - secretKey: BACKSTAGE_CLIENT_SECRET
    remoteRef:
      key: keycloak-clients
      property: BACKSTAGE_CLIENT_SECRET
  dataFrom:
  - sourceRef:
      generatorRef:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        name: backstage
    rewrite:
    - transform:
        template: POSTGRES_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-credentials
  namespace: adhar-system
spec:
  secretStoreRef:
    name: gitea
    kind: ClusterSecretStore
  refreshInterval: '0'
  target:
    name: gitea-credentials
  data:
  - secretKey: GITEA_USERNAME
    remoteRef:
      key: gitea-credential
      property: username
  - secretKey: GITEA_PASSWORD
    remoteRef:
      key: gitea-credential
      property: password
