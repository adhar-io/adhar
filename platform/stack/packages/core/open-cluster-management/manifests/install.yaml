apiVersion: operator.open-cluster-management.io/v1
kind: ClusterManager
metadata:
  name: cluster-manager
spec:
  registrationImagePullSpec: "quay.io/open-cluster-management/registration:v1.3.1"
  workImagePullSpec: "quay.io/open-cluster-management/work:v1.3.1"
  placementImagePullSpec: "quay.io/open-cluster-management/placement:v1.3.1"
  addOnManagerImagePullSpec: "quay.io/open-cluster-management/addon-manager:v1.3.1"
  deployOption:
    mode: Default
  resourceRequirement:
    type: Default
  registrationConfiguration:
    featureGates:
      - feature: DefaultClusterSet
        mode: Enable
    registrationDrivers:
      - authType: csr
  workConfiguration:
    workDriver: kube
  placementConfiguration:
    featureGates:
    - feature: PlacementDebugServer
      mode: Enable
