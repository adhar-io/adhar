# Adhar overrides for grafana/alloy, deployed as a Grafana Faro collector.
#
# Faro is Grafana's frontend (browser) Real User Monitoring SDK; it has no
# Helm chart of its own. Browsers POST RUM data to Alloy's faro.receiver, which
# forwards logs to Loki and traces to Tempo. The receiver listens on port 12347
# and is exposed externally through the Cilium Gateway API HTTPRoute in
# manifests/httproute.yaml (browsers need a public endpoint).
alloy:
  configMap:
    create: true
    content: |
      faro.receiver "default" {
        server {
          listen_address = "0.0.0.0"
          listen_port    = 12347
          cors_allowed_origins = ["*"]
        }
        output {
          logs   = [loki.write.default.receiver]
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }

  # Expose the Faro receiver port on the Alloy Service so the HTTPRoute can
  # target it.
  extraPorts:
    - name: faro
      port: 12347
      targetPort: 12347
      protocol: TCP

# Faro is a stateless ingest endpoint; a single replica controller is fine.
controller:
  type: deployment
  replicas: 1
