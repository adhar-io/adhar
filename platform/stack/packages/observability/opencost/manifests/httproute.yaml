# OpenCost UI routed through the Cilium Gateway (adhar-gateway). TLS terminates
# at the Gateway. The old nginx rewrite-target (/opencost/$2 with use-regex)
# preserved the /opencost prefix when forwarding to the backend, so no URLRewrite
# filter is needed here.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opencost
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /opencost
      backendRefs:
        - name: opencost
          port: 9090
