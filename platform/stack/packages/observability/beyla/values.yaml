# Adhar overrides for grafana/beyla.
# Beyla is an eBPF auto-instrumentation agent deployed as a DaemonSet. It has no
# web UI, so no Gateway API HTTPRoute is required. Telemetry is exported to the
# in-cluster Alloy OTLP endpoint.
config:
  create: true
  data:
    discovery:
      services:
        - k8s_namespace: .
    attributes:
      kubernetes:
        enable: true
    otel_metrics_export:
      endpoint: http://alloy.adhar-system.svc.cluster.local:4318
    otel_traces_export:
      endpoint: http://alloy.adhar-system.svc.cluster.local:4318
