# Hubble UI routed through the Cilium Gateway (adhar-gateway). TLS terminates at
# the Gateway. The old nginx rewrite-target (/$2 with use-regex) stripped the
# /hubble prefix before forwarding to hubble-ui:80, so a URLRewrite filter
# replaces that prefix with /. The nginx proxy-*-timeout and upstream-vhost
# annotations have no direct Gateway API equivalent and are dropped.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui
  namespace: adhar-system
  annotations:
    argocd.argoproj.io/sync-wave: "100"
  labels:
    app.kubernetes.io/name: hubble-ui
    app.kubernetes.io/part-of: cilium
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - hubble.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hubble-ui
          port: 80
