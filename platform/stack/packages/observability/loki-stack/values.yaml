loki:
  enabled: true
  isDefault: true
  url: http://{{(include "loki.serviceName" .)}}:{{ .Values.loki.service.port }}
  readinessProbe:
    httpGet:
      path: /ready
      port: http-metrics
    initialDelaySeconds: 45
  livenessProbe:
    httpGet:
      path: /ready
      port: http-metrics
    initialDelaySeconds: 45
  datasource:
    jsonData: "{}"
    uid: ""
fluent-bit:
  enabled: true
  resources:
    limits:
      # 100Mi default OOM-kills under platform log volume
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
