# Keycloak SSO in front of the Prometheus UI.
#
# Prometheus has no native OIDC, so an oauth2-proxy sits in front of it and does
# the OpenID Connect handshake with Keycloak. Prometheus is given its OWN host
# (prometheus.adhar.localtest.me) rather than a sub-path so it can keep serving at
# root — that keeps Grafana's in-cluster datasource (http://prometheus…:9090/) and
# the operator/scrapes working unchanged. The platform wildcard cert
# (*.adhar.localtest.me) already covers this subdomain and the Gateway listeners
# are hostname-agnostic.
#
# Flow: browser -> Gateway (prometheus.adhar.localtest.me) -> oauth2-proxy ->
#   (unauthenticated) 302 to Keycloak /auth -> login -> /oauth2/callback ->
#   cookie set -> reverse-proxy to the Prometheus Service.
---
# Cookie encryption secret for oauth2-proxy sessions (must be 16/24/32 bytes;
# 32 alphanumeric chars = 32 bytes for AES-256). Generated once by ESO.
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: prometheus-oauth2-cookie
  namespace: adhar-system
spec:
  length: 32
  digits: 8
  symbols: 0
  noUpper: false
  allowRepeat: true
---
# Assembles the oauth2-proxy env Secret: the Keycloak client secret (pulled from
# keycloak-clients) + the generated cookie secret. Keys are the OAUTH2_PROXY_*
# env names the Deployment consumes via envFrom.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prometheus-oauth2-proxy
  namespace: adhar-system
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: keycloak
    kind: ClusterSecretStore
  target:
    name: prometheus-oauth2-proxy
    template:
      engineVersion: v2
      data:
        OAUTH2_PROXY_CLIENT_SECRET: "{{ .PROMETHEUS_CLIENT_SECRET }}"
        OAUTH2_PROXY_COOKIE_SECRET: "{{ .COOKIE_SECRET }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: prometheus-oauth2-cookie
      rewrite:
        - transform:
            template: "COOKIE_SECRET"
  data:
    - secretKey: PROMETHEUS_CLIENT_SECRET
      remoteRef:
        key: keycloak-clients
        property: PROMETHEUS_CLIENT_SECRET
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-oauth2-proxy
  namespace: adhar-system
  labels:
    app.kubernetes.io/name: prometheus-oauth2-proxy
    app.kubernetes.io/part-of: kube-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-oauth2-proxy
  template:
    metadata:
      labels:
        app: prometheus-oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --http-address=0.0.0.0:4180
            - --provider=oidc
            - --oidc-issuer-url=https://keycloak.adhar.localtest.me:8443/realms/adhar
            # Keycloak is served over the self-signed platform cert (adhar-cert);
            # skip verification for the server-side OIDC discovery/token calls.
            - --ssl-insecure-skip-verify=true
            - --client-id=prometheus
            - --redirect-url=https://prometheus.adhar.localtest.me:8443/oauth2/callback
            - --upstream=http://prometheus-kube-prometheus-prometheus.adhar-system:9090
            - --email-domain=*
            - --scope=openid profile email groups
            - --cookie-secure=true
            - --skip-provider-button=true
            - --reverse-proxy=true
          envFrom:
            - secretRef:
                name: prometheus-oauth2-proxy
          ports:
            - name: http
              containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: http
          livenessProbe:
            httpGet:
              path: /ping
              port: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-oauth2-proxy
  namespace: adhar-system
  labels:
    app.kubernetes.io/name: prometheus-oauth2-proxy
    app.kubernetes.io/part-of: kube-prometheus
spec:
  selector:
    app: prometheus-oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: http
---
# Dedicated host for Prometheus, routed through the Cilium Gateway to oauth2-proxy.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: adhar-system
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: kube-prometheus
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - prometheus.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: prometheus-oauth2-proxy
          port: 4180
