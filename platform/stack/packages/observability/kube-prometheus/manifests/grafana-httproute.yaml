# Grafana UI routed through the Cilium Gateway (adhar-gateway). TLS terminates at
# the Gateway. The old nginx rewrite-target (/grafana/$2 with use-regex)
# preserved the /grafana prefix when forwarding to prometheus-grafana:80, so no
# URLRewrite filter is needed. backend-protocol HTTP is the default for plain
# HTTP backendRefs.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  # Must live where the Grafana Service actually is: the kube-prometheus
  # manifests hardcode prometheus-grafana into adhar-system, so a route in
  # "monitoring" resolves its backendRef to a non-existent monitoring/
  # prometheus-grafana (ResolvedRefs=False) and the gateway returns HTTP 500.
  namespace: adhar-system
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - adhar.localtest.me
    - localhost
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: prometheus-grafana
          port: 80
