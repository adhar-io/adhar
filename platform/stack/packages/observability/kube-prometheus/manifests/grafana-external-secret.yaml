apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-oidc
  # Must live in the namespace where the Grafana pod runs (adhar-system) so that the
  # grafana deployment's `envFrom: grafana-oidc` can mount the OIDC client id/secret.
  namespace: adhar-system
spec:
  secretStoreRef:
    name: keycloak
    kind: ClusterSecretStore
  target:
    name: grafana-oidc
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      remoteRef:
        key: keycloak-clients
        property: GRAFANA_CLIENT_ID
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: keycloak-clients
        property: GRAFANA_CLIENT_SECRET