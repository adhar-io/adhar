          value: '8222'
        - name: HEALTH_PATH
          value: ''
        - name: PROTOCOL
          value: http
        image: gcr.io/pixie-oss/pixie-dev-public/curl:1.0
        name: nats-wait
      serviceAccountName: cloud-conn-service-account
      volumes:
      - name: certs
        secret:
          secretName: service-tls-certs
