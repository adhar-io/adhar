# Headlamp UI on its own host (headlamp.adhar.localtest.me). The whole host
# forwards to the oauth2-proxy (Keycloak SSO gate), which reverse-proxies to
# Headlamp once the user is authenticated. See manifests/headlamp-oauth2-proxy.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: adhar-system
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - headlamp.adhar.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: headlamp-oauth2-proxy
          port: 4180
