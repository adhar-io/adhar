# OnCall routed through the Cilium Gateway (adhar-gateway). TLS terminates at the
# Gateway, replacing the chart's bundled cert-manager/nginx Ingress (which also
# shipped its own ingress-nginx IngressClass, now removed). The original Ingress
# used the placeholder host "example.com"; it is preserved here unchanged.
# No rewrite annotations were present, so paths are forwarded as-is. Gateway API
# matches the most specific PathPrefix first, so /grafana takes precedence over /.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oncall
  namespace: adhar-system
  labels:
    app.kubernetes.io/name: oncall
    app.kubernetes.io/instance: oncall
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: adhar-gateway
      namespace: adhar-system
  hostnames:
    - example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: oncall-grafana
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: oncall-engine
          port: 8080
