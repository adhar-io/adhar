            enabled: "true"
            namespace: "knative-operator"
            category: "application"
            manifestPath: "application/knative/manifests"
          - name: "hubble"
            enabled: "true"
            namespace: "adhar-system"
            category: "observability"
            manifestPath: "observability/hubble/manifests"
          - name: "falco"
            enabled: "true"
            namespace: "falco"
            category: "security"
            manifestPath: "security/falco/manifests"
          - name: "trivy"
            enabled: "true"
            namespace: "trivy-system"
            category: "security"
            manifestPath: "security/trivy/manifests"
          - name: "vault"
            enabled: "true"
            namespace: "vault"
            category: "security"
            manifestPath: "security/vault/manifests"
          - name: "cosign"
            enabled: "true"
            namespace: "cosign-system"
            category: "security"
            manifestPath: "security/cosign/manifests"
          - name: "kubescape"
            enabled: "true"
