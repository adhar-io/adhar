apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-charts-gitops
  namespace: adhar-system
spec:
  # Cloud/enterprise ApplicationSet: the full platform stack is enabled (a
  # multi-node cloud cluster has the capacity). The generator `selector` still
  # honours each package's `enabled` flag, so individual packages can be turned
  # off per environment. Generated from adhar-appset-local.yaml (all enabled).
  generators:
    - list:
        elements:
          - name: "external-secrets"
            enabled: "true"
            namespace: "external-secrets"
            category: "security"
            manifestPath: "security/external-secrets/manifests"
