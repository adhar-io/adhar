            namespace: "beyla"
            category: "observability"
            manifestPath: "observability/beyla/manifests"
          - name: "faro"
            enabled: "true"
            namespace: "faro"
            category: "observability"
            manifestPath: "observability/faro/manifests"
          - name: "pixie"
            enabled: "true"
            namespace: "pl"
            category: "observability"
            manifestPath: "observability/pixie/manifests"
          - name: "victoria-metrics"
            enabled: "true"
            namespace: "victoria-metrics"
            category: "observability"
            manifestPath: "observability/victoria-metrics/manifests"
          - name: "trino"
            enabled: "true"
            namespace: "trino"
            category: "data"
            manifestPath: "data/trino/manifests"
          - name: "metabase"
            enabled: "true"
            namespace: "metabase"
