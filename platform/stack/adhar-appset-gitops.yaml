            manifestPath: "security/keycloak/manifests"
          - name: "argo-workflows"
            enabled: "true"
            namespace: "argo"
            category: "application"
            manifestPath: "application/argo-workflows/manifests/dev"
          - name: "adhar-console"
            enabled: "true"
            namespace: "backstage"
            category: "core"
            manifestPath: "core/adhar-console/manifests"
          - name: "harbor"
            enabled: "true"
            namespace: "harbor"
            category: "application"
            manifestPath: "application/harbor/manifests"
          - name: "kargo"
            enabled: "true"
            namespace: "argocd"
            category: "application"
