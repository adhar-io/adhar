# Crossplane Provider packages required by the Kubernetes-native compositions
# (provider-kubernetes serves namespaced Objects under kubernetes.m.crossplane.io;
# provider-helm serves namespaced Releases under helm.m.crossplane.io). These are
# the only providers needed for local/in-cluster compositions; cloud provider
# packages live under providers/cloud/ and are installed only in cloud mode.
#
# Versions are kept in sync with the dependsOn block in ../crossplane.yaml.
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-kubernetes
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v1.2.1
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-helm
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-helm:v1.2.0
