# Cloud Crossplane Provider packages. Applied best-effort by the controller and
# only meaningful in cloud mode (they are heavy and unnecessary on a local Kind
# node). Versions are kept in sync with ../../crossplane.yaml dependsOn.
# AWS (Upbound, modular)
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-eks
spec:
  package: xpkg.upbound.io/upbound/provider-aws-eks:v2.0.0
---
