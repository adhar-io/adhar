---
# Helm Provider - cluster-scoped config consumed by namespaced
# helm.m.crossplane.io/v1beta1 Release managed resources.
# Namespaced MRs reference this via providerConfigRef.kind: ClusterProviderConfig.
apiVersion: helm.m.crossplane.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: helm-provider
spec:
  # Deploy charts into the local (in-cluster) Kubernetes API by default.
  credentials:
    source: InjectedIdentity
---
# Alternative: deploy charts to an external cluster via a kubeconfig secret.
apiVersion: helm.m.crossplane.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: helm-external
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: helm-credentials
      key: kubeconfig
