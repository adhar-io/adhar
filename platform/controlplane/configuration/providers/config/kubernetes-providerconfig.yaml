---
# Kubernetes Provider - cluster-scoped config consumed by namespaced
# kubernetes.m.crossplane.io/v1alpha1 Object managed resources.
# Namespaced MRs reference this via providerConfigRef.kind: ClusterProviderConfig.
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: ClusterProviderConfig
metadata:
  name: kubernetes-provider
spec:
  # Manage the local (in-cluster) Kubernetes API by default.
  credentials:
    source: InjectedIdentity
---
# Alternative: manage an external Kubernetes cluster via a kubeconfig secret.
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: ClusterProviderConfig
metadata:
  name: kubernetes-external
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: kubernetes-credentials
      key: kubeconfig
