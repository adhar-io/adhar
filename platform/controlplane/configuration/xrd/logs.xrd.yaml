---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: compositeloggings.platform.adhar.io
spec:
  group: platform.adhar.io
  scope: Namespaced
  names:
    kind: CompositeLogging
    plural: compositeloggings
  defaultCompositionRef:
    name: compositelogging-loki
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              parameters:
                type: object
                properties:
                  stack:
                    type: string
                    enum: [loki, elasticsearch]
                    default: loki
                  namespace:
                    type: string
                    default: observability
                  retentionDays:
                    type: integer
                    default: 7
                  storageSize:
                    type: string
                    default: 10Gi
                  replicas:
                    type: integer
                    default: 1
                default: {}
            default: {}
          status:
            type: object
            properties:
              phase:
                type: string
              message:
                type: string
              ready:
                type: boolean
              endpoint:
                type: string
