---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: compositeenvironments.platform.adhar.io
spec:
  group: platform.adhar.io
  scope: Namespaced
  names:
    kind: CompositeEnvironment
    plural: compositeenvironments
  defaultCompositionRef:
    name: compositeenvironment-kubernetes
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              parameters:
                type: object
                properties:
                  name:
                    type: string
                  tier:
                    type: string
                    enum: [dev, test, staging, prod]
                    default: dev
                  cpuQuota:
                    type: string
                    default: "4"
                  memoryQuota:
                    type: string
                    default: 8Gi
                  podQuota:
                    type: integer
                    default: 20
                  enableNetworkPolicy:
                    type: boolean
                    default: true
                  labels:
                    type: object
                    additionalProperties:
                      type: string
                required: [name]
            required: [parameters]
          status:
            type: object
            properties:
              phase:
                type: string
              message:
                type: string
              ready:
                type: boolean
              namespace:
                type: string
