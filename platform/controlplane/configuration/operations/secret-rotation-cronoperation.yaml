---
# Weekly secret rotation nudge (day-2 Operation).
#
# Runs every Sunday at 03:00 and forces an external-secrets ExternalSecret to
# re-pull from its backing store by stamping the standard
# force-sync annotation (force-sync: <unix-ts>). external-secrets watches this
# annotation and immediately reconciles the target Secret, demonstrating a
# rotation/refresh cadence without changing the ExternalSecret's desired spec.
#
# The function emits a partial ExternalSecret (apiVersion/kind/name/namespace +
# the annotation); Crossplane force-applies it server-side, patching only the
# annotation onto the existing object.
#
# Requires the core --enable-operations flag (see hack/crossplane/values*.yaml).
apiVersion: ops.crossplane.io/v1alpha1
kind: CronOperation
metadata:
  name: adhar-weekly-secret-rotation
  labels:
    feature: secrets
    provider: kubernetes
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  successfulHistoryLimit: 5
  failedHistoryLimit: 3
  startingDeadlineSeconds: 900
  operationTemplate:
    metadata:
      labels:
        feature: secrets
    spec:
      mode: Pipeline
      pipeline:
        - step: touch-external-secret
          functionRef:
            name: function-python
          input:
            apiVersion: python.fn.crossplane.io/v1beta1
            kind: Script
            script: |
              import time

              from crossplane.function.proto.v1 import run_function_pb2 as fnv1

              # The ExternalSecret to refresh. Adjust to target the platform
              # secret whose backing credentials rotate weekly.
              ES_NAME = "adhar-platform-secrets"
              ES_NAMESPACE = "adhar-system"


              def operate(req: fnv1.RunFunctionRequest,
                          rsp: fnv1.RunFunctionResponse):
                  """Stamp force-sync on an ExternalSecret to trigger a refresh."""
                  stamp = str(int(time.time()))

                  rsp.desired.resources["external-secret"].resource.update({
                      "apiVersion": "external-secrets.io/v1",
                      "kind": "ExternalSecret",
                      "metadata": {
                          "name": ES_NAME,
                          "namespace": ES_NAMESPACE,
                          "annotations": {
                              # Recognised by external-secrets to force a sync.
                              "force-sync": stamp,
                              "adhar.io/last-rotation": stamp,
                          },
                      },
                  })

                  rsp.output["externalSecret"] = f"{ES_NAMESPACE}/{ES_NAME}"
                  rsp.output["forceSync"] = stamp
                  rsp.output["message"] = (
                      f"Forced refresh of ExternalSecret {ES_NAMESPACE}/{ES_NAME}"
                  )
