apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: compositesecretrotation-aws
  labels:
    feature: secretrotation
    provider: kubernetes
spec:
  compositeTypeRef:
    apiVersion: platform.adhar.io/v1alpha1
    kind: CompositeSecretRotation
  mode: Pipeline
  pipeline:
    - step: render-rotation
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLRun
        spec:
          source: |
            oxr = option("params").oxr
            ocds = option("params").ocds

            params = oxr.spec.parameters
            metadata = oxr.metadata
            xrNamespace = metadata.namespace or "default"

            # Rotation configuration
            secretType = params.secretType
            rotationSchedule = params.rotationSchedule or ""
            rotationPeriodDays = params.rotationPeriodDays or 30
            automaticRotation = params.automaticRotation
            if automaticRotation == Undefined:
                automaticRotation = True

            # ExternalSecret refresh interval. external-secrets re-reads the
            # backing secret store on this cadence, which is how rotated secret
            # values get pulled into the cluster. Prefer an explicit cron-style
            # rotationSchedule; otherwise derive an hourly interval from the
            # rotation period in days (N days -> N*24h).
            _refreshInterval = "{}h".format(rotationPeriodDays * 24)
            if not automaticRotation:
                # Disable periodic refresh when automatic rotation is off.
                _refreshInterval = "0"
            if rotationSchedule:
                _refreshCron = rotationSchedule

            # Secrets to rotate and the cluster SecretStore to read them from.
            secretReferences = params.secretReferences or []
            targetServices = params.targetServices or []

            # provider -> external-secrets ClusterSecretStore name.
            _storeByProvider = {
                "aws-secrets-manager" = "aws-secrets-manager"
                "azure-keyvault" = "azure-keyvault"
                "gcp-secret-manager" = "gcp-secret-manager"
                "vault" = "vault"
                "external-secrets" = "external-secrets"
            }
            secretStoreName = _storeByProvider[params.provider] or "aws-secrets-manager"

            tags = params.tags or {}

            # Encryption / decoding hints surfaced as ExternalSecret metadata.
            encryption = params.encryption or {}
            enableEncryption = encryption.enabled
            if enableEncryption == Undefined:
                enableEncryption = True

            # Build per-secret data entries. Each secretReference maps a remote
            # secret (by name) into a key on the synced Kubernetes Secret.
            _dataEntries = [
                {
                    secretKey: ref.name
                    remoteRef: {
                        key: ref.name
                        if ref.versionStages and len(ref.versionStages) > 0:
                            version: ref.versionStages[0]
                    }
                } for ref in secretReferences
            ]

            # Target Kubernetes Secret name: prefer a named target, else derive
            # from the XR name.
            targetSecretName = "${metadata.name}-rotated"

            _externalSecretSpec = {
                refreshInterval: _refreshInterval
                secretStoreRef: {
                    name: secretStoreName
                    kind: "ClusterSecretStore"
                }
                target: {
                    name: targetSecretName
                    creationPolicy: "Owner"
                    deletionPolicy: "Retain"
                    template: {
                        type: "Opaque"
                        metadata: {
                            labels: {
                                "app.kubernetes.io/managed-by": "adhar"
                                "adhar.io/secret-type": secretType
                            }
                            if tags:
                                annotations: tags
                        }
                    }
                }
                if len(_dataEntries) > 0:
                    data: _dataEntries
                if len(_dataEntries) == 0:
                    # No explicit references: pull every key from the store.
                    dataFrom: [{
                        find: {
                            tags: tags
                        }
                    }]
            }

            _externalSecret = {
                apiVersion: "external-secrets.io/v1"
                kind: "ExternalSecret"
                metadata: {
                    name: metadata.name
                    namespace: xrNamespace
                    labels: {
                        "app.kubernetes.io/name": "secret-rotation"
                        "app.kubernetes.io/managed-by": "adhar"
                        "adhar.io/provider": params.provider
                    }
                    if rotationSchedule:
                        annotations: {
                            "adhar.io/rotation-schedule": rotationSchedule
                        }
                }
                spec: _externalSecretSpec
            }

            _items = [
                {
                    apiVersion: "kubernetes.m.crossplane.io/v1alpha1"
                    kind: "Object"
                    metadata.name: "external-secret"
                    metadata.labels: {
                        feature: "secretrotation"
                        provider: "kubernetes"
                    }
                    spec: {
                        forProvider: {
                            manifest: _externalSecret
                        }
                        providerConfigRef.name: "kubernetes-provider"
                        providerConfigRef.kind: "ClusterProviderConfig"
                    }
                }
            ]

            # Optionally restart consuming workloads after a secret refresh.
            for idx, service in targetServices:
                _restart = service.restartOnRotation
                if _restart == Undefined:
                    _restart = True
                if _restart:
                    _serviceNs = service.namespace or xrNamespace
                    _items += [{
                        apiVersion: "kubernetes.m.crossplane.io/v1alpha1"
                        kind: "Object"
                        metadata.name: "restart-{}-{}".format(service.name, idx)
                        metadata.labels: {
                            feature: "secretrotation"
                            provider: "kubernetes"
                            component: "restart"
                        }
                        spec: {
                            forProvider: {
                                manifest: {
                                    apiVersion: "batch/v1"
                                    kind: "Job"
                                    metadata: {
                                        name: "restart-{}".format(service.name)
                                        namespace: _serviceNs
                                        labels: {
                                            "app.kubernetes.io/managed-by": "adhar"
                                        }
                                    }
                                    spec: {
                                        backoffLimit: 2
                                        template: {
                                            spec: {
                                                serviceAccountName: "secret-rotation"
                                                containers: [{
                                                    name: "kubectl"
                                                    image: "bitnami/kubectl:latest"
                                                    command: [
                                                        "kubectl"
                                                        "rollout"
                                                        "restart"
                                                        "deployment/{}".format(service.name)
                                                        "-n"
                                                        _serviceNs
                                                    ]
                                                }]
                                                restartPolicy: "Never"
                                            }
                                        }
                                    }
                                }
                            }
                            providerConfigRef.name: "kubernetes-provider"
                            providerConfigRef.kind: "ClusterProviderConfig"
                        }
                    }]

            # Derive status from the external-secret Object's readiness.
            _observedResources = ocds or {}
            _esObserved = _observedResources.get("external-secret", {}).get("resource", {})
            _esConditions = _esObserved.get("status", {}).get("conditions", [])

            _phase = "Pending"
            _message = "Secret rotation policy created"
            _ready = False

            _objReady = False
            for _c in _esConditions:
                if _c.get("type", "") == "Ready" and _c.get("status", "") == "True":
                    _objReady = True

            if _objReady:
                if automaticRotation:
                    _phase = "Active"
                    _message = "Secret rotation is active (refreshInterval={})".format(_refreshInterval)
                else:
                    _phase = "Paused"
                    _message = "Automatic rotation is disabled"
                _ready = True
            elif len(_esConditions) > 0:
                _phase = "Rotating"
                _message = "External secret is syncing"

            items = _items + [{
                apiVersion: "platform.adhar.io/v1alpha1"
                kind: "CompositeSecretRotation"
                metadata: oxr.metadata
                status: {
                    phase: _phase
                    message: _message
                    ready: _ready
                }
            }]
    - step: ready
      functionRef:
        name: function-auto-ready
