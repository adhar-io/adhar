---
# Kind and On-Premises Kubernetes Cluster Composition
# Manages existing Kubernetes clusters (Kind, on-prem) via provider-kubernetes /
# provider-helm. Reads from spec.parameters.* per the CompositeCluster XRD schema,
# and targets the shared kubernetes-provider / helm-provider ClusterProviderConfigs.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: kind-kubernetes
  labels:
    feature: cluster
    provider: kind
    cluster.adhar.io/managed: "false" # existing clusters
    cluster.adhar.io/type: development
spec:
  compositeTypeRef:
    apiVersion: platform.adhar.io/v1alpha1
    kind: CompositeCluster

  mode: Pipeline
  pipeline:
    - step: render-templates
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $name := $xr.metadata.name -}}
            {{- $params := dig "spec" "parameters" dict $xr -}}
            {{- $type := dig "environmentType" "development" $params -}}
            {{- $addons := dig "addons" (list) $params -}}
            {{- $k8sProvider := dig "spec" "providerConfigRef" "name" "kubernetes-provider" $xr -}}
            {{- $helmProvider := dig "spec" "helmProviderConfigRef" "name" "helm-provider" $xr -}}
            ---
            # Namespace for cluster resources (native object, managed by Crossplane v2)
            apiVersion: v1
            kind: Namespace
            metadata:
              name: {{ $name }}
              labels:
                cluster.adhar.io/name: {{ $name }}
                cluster.adhar.io/provider: kind
            ---
            # ConfigMap recording cluster metadata
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: {{ $name }}-info
              namespace: {{ $name }}
            data:
              clusterName: {{ $name }}
              provider: kind
              type: {{ $type }}
              region: local
            ---
            # Object to verify cluster connectivity via the shared kubernetes ClusterProviderConfig
            apiVersion: kubernetes.m.crossplane.io/v1alpha1
            kind: Object
            metadata:
              name: {{ $name }}-healthcheck
            spec:
              providerConfigRef:
                name: {{ $k8sProvider }}
                kind: ClusterProviderConfig
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ConfigMap
                  metadata:
                    name: cluster-healthcheck
                    namespace: kube-system
                    labels:
                      managed-by: adhar
                  data:
                    status: healthy
            {{ if has "cilium" $addons }}
            ---
            apiVersion: helm.m.crossplane.io/v1beta1
            kind: Release
            metadata:
              name: {{ $name }}-cilium
            spec:
              providerConfigRef:
                name: {{ $helmProvider }}
                kind: ClusterProviderConfig
              forProvider:
                chart:
                  name: cilium
                  repository: https://helm.cilium.io/
                  version: "1.15.0"
                namespace: kube-system
                values:
                  operator:
                    replicas: 1
                  hubble:
                    enabled: true
                    relay:
                      enabled: true
                    ui:
                      enabled: true
            {{ end }}
            {{ if has "metrics-server" $addons }}
            ---
            apiVersion: helm.m.crossplane.io/v1beta1
            kind: Release
            metadata:
              name: {{ $name }}-metrics-server
            spec:
              providerConfigRef:
                name: {{ $helmProvider }}
                kind: ClusterProviderConfig
              forProvider:
                chart:
                  name: metrics-server
                  repository: https://kubernetes-sigs.github.io/metrics-server/
                  version: "3.11.0"
                namespace: kube-system
                values:
                  args:
                    - --kubelet-insecure-tls
                    - --kubelet-preferred-address-types=InternalIP
            {{ end }}

    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: function-auto-ready
