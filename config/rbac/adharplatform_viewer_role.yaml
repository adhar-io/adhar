# This rule is not used by the project adhar itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to platform.adhar.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: adhar
    app.kubernetes.io/managed-by: kustomize
  name: adharplatform-viewer-role
rules:
- apiGroups:
  - platform.adhar.io
  resources:
  - adharplatforms
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - platform.adhar.io
  resources:
  - adharplatforms/status
  verbs:
  - get
