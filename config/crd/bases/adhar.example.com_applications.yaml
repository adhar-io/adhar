---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: applications.adhar.example.com
spec:
  group: adhar.example.com
  names:
    kind: Application
    listKind: ApplicationList
    plural: applications
    singular: application
  scope: Namespaced // Applications are namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.destination.environment
      name: Environment
      type: string
    - jsonPath: .status.syncStatus
      name: SyncStatus
      type: string
    - jsonPath: .status.healthStatus
      name: HealthStatus
      type: string
    - jsonPath: .status.revision
      name: Revision
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Application is the Schema for the applications API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ApplicationSpec defines the desired state of Application
            properties:
              destination:
                description: Destination defines the target environment and namespace
                  for deployment.
                properties:
                  environment:
                    description: |-
                      Environment is the name of the Adhar Environment CR where this application should be deployed.
                      The controller uses this to find the target cluster's API server and namespace.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace is the target namespace within the environment's cluster.
                      If omitted, it defaults to the Application's namespace.
                    type: string
                required:
                - environment
                type: object
              ignoreDifferences:
                description: IgnoreDifferences defines resources/fields Argo CD should
                  ignore during diffing.
                items:
                  description: IgnoreDifference specifies resource fields that should
                    be ignored during comparison.
                  properties:
                    group:
                      type: string
                    jqPathExpressions:
                      items:
                        type: string
                      type: array
                    jsonPointers:
                      items:
                        type: string
                      type: array
                    kind:
                      type: string
                    managedFieldsManagers:
                      items:
                        type: string
                      type: array
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - kind
                  type: object
                type: array
              source:
                description: Source defines the repository and path where the application
                  manifests are located.
                properties:
                  chart:
                    description: |-
                      Chart specifies Helm chart parameters if the source is a Helm chart.
                      Cannot be used simultaneously with Path.
                    properties:
                      name:
                        description: Name is the name of the Helm chart.
                        type: string
                      repository:
                        description: Repository is the URL of the Helm repository.
                        type: string
                      version:
                        description: Version is the version of the Helm chart.
                        type: string
                    required:
                    - name
                    - repository
                    - version
                    type: object
                  helm:
                    description: Helm specific options.
                    properties:
                      releaseName:
                        description: ReleaseName is the Helm release name to use.
                          If omitted, it will use the Application name.
                        type: string
                      valueFiles:
                        description: ValueFiles is a list of Helm value files to use.
                        items:
                          type: string
                        type: array
                      values:
                        description: Values is Helm values, defined as a raw string.
                        type: string
                        x-kubernetes-preserve-unknown-fields: true
                      version:
                        description: Version is the Helm chart version. Required if
                          Source.Chart is not used.
                        type: string
                    type: object
                  kustomize:
                    description: Kustomize specific options.
                    properties:
                      commonLabels:
                        additionalProperties:
                          type: string
                        description: CommonLabels is a list of additional labels to
                          add to rendered manifests
                        type: object
                      images:
                        description: Images is a list of Kustomize image overrides
                        items:
                          type: string
                        type: array
                      namePrefix:
                        description: NamePrefix is a prefix appended to resources
                          for Kustomize apps
                        type: string
                    type: object
                  path:
                    description: |-
                      Path is the path within the repository where the manifests are located.
                      Defaults to ".".
                    type: string
                  repoURL:
                    description: RepoURL is the URL of the Git repository.
                    pattern: ^https?://.*
                    type: string
                  targetRevision:
                    description: |-
                      TargetRevision is the Git revision (branch, tag, or commit SHA) to sync to.
                      Defaults to "HEAD".
                    type: string
                required:
                - repoURL
                type: object
              syncPolicy:
                description: SyncPolicy defines how the application should be synchronized.
                properties:
                  automated:
                    description: Automated controls automated synchronization settings.
                    properties:
                      allowEmpty:
                        description: AllowEmpty specifies if sync is allowed to delete
                          all resources. Defaults to false.
                        type: boolean
                      prune:
                        description: Prune specifies if resources should be pruned
                          during sync. Defaults to false.
                        type: boolean
                      selfHeal:
                        description: SelfHeal specifies if sync should automatically
                          correct drift. Defaults to false.
                        type: boolean
                    type: object
                  syncOptions:
                    description: |-
                      SyncOptions define common sync parameters.
                      Example: CreateNamespace=true
                    items:
                      type: string
                    type: array
                type: object
            required:
            - destination
            - source
            type: object
          status:
            description: ApplicationStatus defines the observed state of Application
            properties:
              argoCDApplicationRef:
                description: ArgoCDApplicationRef is the name of the Argo CD Application
                  resource created.
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of an object's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              healthStatus:
                description: HealthStatus reflects the health state from Argo CD.
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the generation of the Application
                  Spec that was last processed.
                format: int64
                type: integer
              revision:
                description: Revision reflects the deployed revision (e.g., Git commit
                  SHA).
                type: string
              syncStatus:
                description: SyncStatus reflects the synchronization state from Argo
                  CD.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
