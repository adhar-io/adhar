---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: databases.adhar.example.com
spec:
  group: adhar.example.com
  names:
    kind: Database
    listKind: DatabaseList
    plural: databases
    singular: database
  scope: Namespaced // Databases are namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.environment
      name: Environment
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.size
      name: Size
      type: string
    - jsonPath: .status.provisioningStatus
      name: Status
      type: string
    - jsonPath: .status.connectionSecretRef.name
      name: SecretName
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Database is the Schema for the databases API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatabaseSpec defines the desired state of Database
            properties:
              environment:
                description: |-
                  Environment specifies the target Adhar Environment where the database infrastructure should be provisioned.
                  The controller uses this to determine the provider and region for selecting the appropriate Crossplane Composition.
                minLength: 1
                type: string
              parameters:
                description: |-
                  Parameters allows specifying provider-specific parameters for the database claim.
                  These are passed directly to the underlying Crossplane Claim.
                x-kubernetes-preserve-unknown-fields: true
              publishConnectionSecretTo:
                description: |-
                  PublishConnectionSecretTo defines the name and namespace of the secret where connection details should be published.
                  If Namespace is omitted, it defaults to the Database CR's namespace.
                properties:
                  name:
                    description: Name is the name of the secret.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace is the namespace where the secret should be created.
                      Defaults to the namespace of the Database resource if not specified.
                    type: string
                required:
                - name
                type: object
              size:
                description: |-
                  Size provides a hint for resource allocation (e.g., small, medium, large).
                  Interpreted by the underlying Crossplane Composition.
                enum:
                - small
                - medium
                - large
                - x-large
                type: string
              type:
                description: |-
                  Type specifies the database engine (e.g., postgresql, mysql).
                  This influences the selected Crossplane Composition.
                enum:
                - postgresql
                - mysql
                - redis
                - mongodb
                type: string
              version:
                description: Version specifies the desired engine version (e.g., "15",
                  "8.0").
                type: string
            required:
            - environment
            - publishConnectionSecretTo
            - size
            - type
            type: object
          status:
            description: DatabaseStatus defines the observed state of Database
            properties:
              claimRef:
                description: ClaimRef references the underlying Crossplane Claim resource
                  created.
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
              conditions:
                description: Conditions represent the latest available observations
                  of an object's state, typically reflecting the underlying Crossplane
                  Claim status.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              connectionSecretRef:
                description: ConnectionSecretRef points to the generated connection
                  secret, once available.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                - namespace
                type: object
              observedGeneration:
                description: ObservedGeneration reflects the generation of the Database
                  Spec that was last processed.
                format: int64
                type: integer
              provisioningStatus:
                description: |-
                  ProvisioningStatus reflects the overall status reported by the Crossplane Claim.
                  Examples: "Available", "Provisioning", "Deleting", "Failed".
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
