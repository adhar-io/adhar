version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    revive:
      rules:
        - name: comment-spacings
  exclusions:
    rules:
      - path: "api/*"
        linters:
          - lll
      - path: "platform/*"
        linters:
          - dupl
          - lll

formatters:
  enable:
    - gofmt
    - goimports

issues:
  # Lint ratchet: the v0.1.x codebase carries a pre-existing backlog (~340
  # findings). Only issues introduced relative to main are reported, so CI
  # stays green while the backlog is burned down; remove this once clean.
  new-from-rev: origin/main
