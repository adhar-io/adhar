name: Lint

on:
  push:
    branches: ['**'] # not tags: tag commits are linted on their branch already
  pull_request:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          # Full history so the lint ratchet's new-from-rev origin/main baseline
          # always exists (a shallow checkout resurfaces the whole backlog).
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # golangci-lint is built from source (see Makefile) so its Go language
      # version always matches the module's go directive; the prebuilt binaries
      # from golangci-lint-action can lag behind new Go releases.
      - name: Run linter
        run: make lint
