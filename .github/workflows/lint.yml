name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # golangci-lint is built from source (see Makefile) so its Go language
      # version always matches the module's go directive; the prebuilt binaries
      # from golangci-lint-action can lag behind new Go releases.
      - name: Run linter
        run: make lint
