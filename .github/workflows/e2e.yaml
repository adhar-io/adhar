name: E2E

on:
  push:
    branches: ['**'] # not tags
  workflow_dispatch:

# E2E bootstraps a full platform (~15 min); cancel superseded runs on the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Full bootstrap sequence
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Runs tests/e2e/bootstrap: adhar up → Ready condition → foundation →
      # Gitea repos → ArgoCD API → package health → CLI status → adhar down
      - name: Run e2e tests
        run: make e2e
