name: release

on:
  push:
    tags:
      # Stable releases (v0.1.0) and prereleases (v0.2.0-rc.1, v0.2.0-beta.1)
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.1.0 or v0.2.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write # create tags, releases and upload assets
  packages: write # push container images to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      # Manual releases from the Actions UI: validate the version, create the
      # tag and push it, then release it in this same run (tags pushed with
      # GITHUB_TOKEN do not trigger a new workflow run).
      - name: Create and push tag (manual release)
        if: github.event_name == 'workflow_dispatch'
        run: |
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid version '$version' — expected e.g. v0.1.0 or v0.2.0-rc.1"
            exit 1
          fi
          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "Tag $version already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$version" -m "Release $version"
          git push origin "$version"
          echo "RELEASE_TAG=$version" >> "$GITHUB_ENV"

      - name: Resolve release tag (tag push)
        if: github.event_name == 'push'
        run: echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Ensure generated code and manifests build cleanly before releasing
      - name: Verify build
        run: OUT_FILE=/tmp/adhar make build

      - name: Set up QEMU (multi-arch container builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optional: mint a short-lived token for the Homebrew tap repo. Requires
      # the ADHAR_HOMEBREW_APP_ID repo variable and ADHAR_HOMEBREW_PRIVATE_KEY
      # secret; when absent, the Homebrew formula update is skipped.
      - name: Generate Homebrew tap token
        id: generate-token
        if: vars.ADHAR_HOMEBREW_APP_ID != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.ADHAR_HOMEBREW_APP_ID }}
          private-key: ${{ secrets.ADHAR_HOMEBREW_PRIVATE_KEY }}
          repositories: |
            homebrew-tap

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --timeout 60m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TOKEN: ${{ steps.generate-token.outputs.token || '' }}
          GORELEASER_CURRENT_TAG: ${{ env.RELEASE_TAG }}
