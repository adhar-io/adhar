apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: compositeapplications.platform.adhar.io
spec:
  group: platform.adhar.io
  names:
    kind: CompositeApplication
    plural: compositeapplications
  claimNames:
    kind: Application
    plural: applications
  connectionSecretKeys:
    - applicationName
    - project
    - destination
  defaultCompositionRef:
    name: compositeapplication-argocd
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - compositionSelector
                - parameters
              properties:
                compositionSelector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                  default:
                    matchLabels:
                      feature: apps
                providerConfigRef:
                  type: object
                  properties:
                    name:
                      type: string
                parameters:
                  type: object
                  required:
                    - source
                    - destination
                    - project
                  properties:
                    displayName:
                      type: string
                    project:
                      type: string
                    description:
                      type: string
                    source:
                      type: object
                      required:
                        - repoURL
                      properties:
                        repoURL:
                          type: string
                        path:
                          type: string
                        chart:
                          type: string
                        targetRevision:
                          type: string
                        helm:
                          type: object
                          properties:
                            releaseName:
                              type: string
                            valueFiles:
                              type: array
                              items:
                                type: string
                            values:
                              type: string
                        directory:
                          type: object
                          properties:
                            recurse:
                              type: boolean
                        kustomize:
                          type: object
                          properties:
                            images:
                              type: array
                              items:
                                type: string
                    destination:
                      type: object
                      properties:
                        server:
                          type: string
                        namespace:
                          type: string
                        clusterRef:
                          type: object
                          properties:
                            name:
                              type: string
                        clusterSelector:
                          type: object
                          properties:
                            matchLabels:
                              type: object
                              additionalProperties:
                                type: string
                    syncPolicy:
                      type: object
                      properties:
                        automated:
                          type: object
                          properties:
                            prune:
                              type: boolean
                            selfHeal:
                              type: boolean
                            allowEmpty:
                              type: boolean
                        retry:
                          type: object
                          properties:
                            limit:
                              type: integer
                        syncOptions:
                          type: array
                          items:
                            type: string
                    ignoreDifferences:
                      type: array
                      items:
                        type: object
                        properties:
                          kind:
                            type: string
                          name:
                            type: string
                          jsonPointers:
                            type: array
                            items:
                              type: string
                writeConnectionSecretToRef:
                  type: object
                  properties:
                    namespace:
                      type: string
                      default: crossplane-system
                    name:
                      type: string
            status:
              type: object
              properties:
                healthStatus:
                  type: string
                syncStatus:
                  type: string
                lastSynced:
                  type: string
                  format: date-time
