# --- Database CR for Alpha User Service in DEV (Namespaced: alpha-dev-apps) ---
apiVersion: platform.adhar.io/v1alpha1
kind: Database
metadata:
  name: "db-alpha-userservice-dev"
  namespace: "alpha-dev-apps" # Resides in the target environment's app namespace
  labels:
    platform.adhar.io/applicationBlueprint: "appbp-alpha-userservice" # For easier linking
    platform.adhar.io/environment: "env-alpha-dev"
spec:
  displayName: "User Service DB (Alpha-Dev)"
  type: "postgresql" # SQL example
  version: "14.5"
  environmentRef:
    name: "env-alpha-dev"
  teamRef: # Team responsible for this database instance
    name: "team-alpha-phoenix"
    namespace: "alpha-corp-admin"
  provisioner: # New field to specify provisioner type
    type: "CloudNativePG" # Example for on-prem CloudNativePG
    # type: "Crossplane" # Alternative for cloud DBs
    # type: "DBaaSProvider" # Direct integration with a DBaaS API
  # applicationRef: # Optional: if this DB is exclusively for one Application (Instance)
  #   name: "app-alpha-user-service" # The Application (Instance) CR name
  #   namespace: "alpha-dev-apps"

  # --- CloudNativePG Specific Configuration (example) ---
  cloudNativePGConfig: # Only relevant if provisioner.type is CloudNativePG
    clusterNameOverride: "alpha-dev-pg-usersvc" # Optional override for CNPG cluster name
    instances: 3
    primaryUpdateStrategy: "unsupervised" # CNPG strategy
    storage:
      size: "20Gi"
      storageClass: "local-path-fast-ssd" # On-prem storage class
    walStorage: # Specific WAL configuration for CNPG
      size: "5Gi"
      storageClass: "local-path-wal"
    resources: # Pod resources for CNPG instances
      requests:
        memory: "2Gi"
        cpu: "1"
      limits:
        memory: "4Gi"
        cpu: "2"
    # Other CNPG specific parameters can be added here,
    # e.g., postgresql.parameters, backup configurations specific to CNPG barman setup.

  # --- Crossplane Specific Configuration (example) ---
  crossplaneConfig: # Only relevant if provisioner.type is Crossplane
    compositionRef:
      name: "composite-postgresql-aws-rds" # Name of the Crossplane Composition
      # namespace: "crossplane-system" # Optional namespace for composition
    claimSpec: # Parameters to pass to the Composite Resource Claim
      parameters: # These are specific to the chosen Composition
        storageGB: 20 # Matches storageSize approximately
        engineVersion: "14.5" # Matches version
        instanceClass: "db.t3.medium" # Matches instanceClass
        region: "us-east-1" # Could be derived from EnvironmentRef.labels
        deletionPolicy: "Orphan" # Or "Delete"
        # Other parameters like VPC, subnet IDs, security groups etc.
      # writeConnectionSecretToRef: # Crossplane manages the connection secret
      #   name: "alpha-userservice-dev-db-creds-cp" # Will be reconciled with connectionInfoSecretName
      #   namespace: "alpha-dev-apps" # Usually same namespace as the claim

  # --- DBaaS Provider Specific Configuration (example, if not using Crossplane) ---
  # dbaasProviderConfig:
  #   providerName: "AWS_RDS" # or "GCP_CloudSQL", "AzureDB"
  #   instanceClass: "db.t3.medium"
  #   storageSize: "20Gi" # Redundant if top-level storageSize is used
  #   # Other provider-specific parameters

  # --- Generic/Abstracted Configuration (used by all provisioners where applicable) ---
  instanceClass: "db.t3.medium" # Generic sizing hint, mapped by provisioner
  storageSize: "20Gi" # Generic storage request
  highAvailability:
    enabled: false # Typically false for dev
  backupPolicy:
    schedule: "0 1 * * *" # Daily at 1 AM
    retentionDays: 7
  connectionInfoSecretNameOverride: "alpha-userservice-dev-db-creds" # Custom name for the K8s secret

  # --- Schema Management (New Section) ---
  schemaManagement:
    enabled: true
    tool: "Flyway" # Options: Flyway, Liquibase, DeclarativeSQL, JSONSchema (for NoSQL)
    source:
      gitRepositoryRef: # Reference to a Repository CR containing schema/migrations
        name: "repo-alpha-user-service-db-schemas"
        namespace: "alpha-corp-admin"
      path: "migrations/postgresql" # Path within the repo
      branch: "dev" # Branch for dev environment schemas
    credentialsSecretRef: # If schema repo is private
      name: "github-db-schemas-key"
      namespace: "alpha-corp-secrets"
    targetVersion: "latest" # Or a specific version like "2.5.1"
    # autoApply: true # Whether to automatically apply migrations on change
    # serviceAccountName: "db-migrator-sa" # SA for running migration jobs
status:
  phase: "Ready"
  message: "Database instance is provisioned and ready for connections."
  endpoint: "alpha-userservice-dev-db.c1xyz2abc3.us-east-1.rds.amazonaws.com" # Example cloud DB endpoint
  port: 5432
  connectionInfoSecretName: "alpha-userservice-dev-db-creds" # Actual name of the k8s secret
  storageAllocated: "20Gi"
  currentSchemaVersion: "2.5.0" # Status field for schema management
  conditions:
    - type: "InstanceReady"
      status: "True"
      lastTransitionTime: "2025-01-21T08:00:00Z"
      reason: "DBInstanceAvailable"
      message: "Database instance is provisioned and available."
    - type: "SchemaApplied"
      status: "True"
      lastTransitionTime: "2025-01-21T08:30:00Z"
      reason: "MigrationsSuccessful"
      message: "Schema version 2.5.0 successfully applied."