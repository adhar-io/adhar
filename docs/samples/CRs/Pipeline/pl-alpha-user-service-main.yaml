# --- Pipeline CR for Alpha User Service (Namespaced: alpha-corp-admin) ---
apiVersion: platform.adhar.io/v1alpha1
kind: Pipeline
metadata:
  name: "pl-alpha-user-service-main"
  namespace: "alpha-corp-admin" # Or a dedicated CI/CD namespace for Alpha Corp
  labels:
    platform.adhar.io/applicationBlueprint: "appbp-alpha-userservice"
    platform.adhar.io/branch: "main"
spec:
  applicationBlueprintRef: # Correctly references the ApplicationBlueprint
    name: "appbp-alpha-userservice"
    namespace: "alpha-corp-admin"
  repositoryRef: # Which repository triggers this pipeline
    name: "repo-alpha-user-service"
    namespace: "alpha-corp-admin"
  trigger:
    type: "Webhook" # Could also be Manual, Scheduled
    branch: "main" # Triggers on pushes to the main branch
  builder: # Defines how the pipeline is executed
    type: "ArgoWorkflows" # Explicitly using Argo Workflows
    # Option 1: Using taskRef to point to a pre-defined Argo WorkflowTemplate
    # taskRef: "build-publish-app-workflow-template"
    # Option 2: Defining the Argo Workflow source if the controller supports generating it from stages
    # argoWorkflow:
    #   generateFromStages: true # Custom flag for controller to interpret 'stages' as Argo Workflow steps
    # Option 3: Point to a Git repo containing the Argo Workflow definition (preferred for complex workflows)
    argoWorkflow:
      source:
        type: "Git"
        gitSource:
          repoURL: "https://github.com/AlphaCorpInternalOrg/ci-workflows.git"
          path: "argo/workflows/alpha-user-service-build.yaml" # Path to the Workflow/WorkflowTemplate definition
          revision: "main"
          # credentialsSecretRef: { name: "ci-workflows-git-creds", namespace: "alpha-corp-secrets" }
      parameters: # Parameters specific to this Argo Workflow invocation (can override those in the YAML)
        - name: "dockerfilePath"
          value: "Dockerfile.adhar"
        - name: "imageOutputName" # This would be used by the Argo Workflow to tag the image
          value: "{{ spec.output.registryRef.name }}/{{ spec.output.imageRepositoryName }}"
        - name: "gitCommitSha" # This would typically be injected by the trigger mechanism into Argo params
          valueFrom:
            eventPayload: "head_commit.id" # Example: if platform can extract from webhook payload
  stages: # High-level definition of pipeline stages; controller translates to builder specifics or uses for status
    - name: "Clone"
      description: "Clone source code repository."
      steps:
        - name: "git-clone"
          image: "alpine/git:latest" # Example image
          script: |
            git clone $REPO_URL .
            git checkout $COMMIT_SHA
            echo "Cloned repository at commit $COMMIT_SHA"
          # envFrom:
          #   - secretRef: { name: "git-credentials" }
          # inputs:
          #   parameters: [{name: "REPO_URL"}, {name: "COMMIT_SHA"}]
    - name: "Build & Unit Test"
      description: "Compile code and run unit tests using Maven."
      steps:
        - name: "maven-build"
          image: "maven:3.8-openjdk-17"
          workingDir: "/workspace/source" # Assuming clone step puts code here
          command: ["mvn"]
          args: ["clean", "package", "-DskipTests=false"] # Example Maven command
          # outputs:
          #   artifacts: [{name: "jar-file", path: "/workspace/source/target/*.jar"}]
    - name: "Security Scan"
      description: "Perform static analysis and vulnerability scanning."
      steps:
        - name: "snyk-scan"
          image: "snyk/snyk:stable"
          script: |
            snyk auth $SNYK_TOKEN
            snyk code test --sarif-file-output=snyk-code.sarif || true # Don't fail pipeline on code issues yet
            snyk test --all-projects --json-file-output=snyk-open-source.json || true
            snyk container test {{ spec.output.registryRef.name }}/{{ spec.output.imageRepositoryName }}:temp-build-tag --file=Dockerfile.adhar --json > snyk-container.json || true
          # envFrom:
          #   - secretRef: { name: "snyk-token-secret" }
          # inputs:
          #   artifacts: [{name: "jar-file"}] # If scan needs compiled code
    - name: "Integration Test"
      description: "Run integration tests against a test database."
      steps:
        - name: "maven-integration-test"
          image: "maven:3.8-openjdk-17"
          workingDir: "/workspace/source"
          command: ["mvn"]
          args: ["verify", "-Pintegration-tests"]
          # env:
          #   - name: "TEST_DB_URL"
          #     valueFrom: { secretRef: { name: "test-db-credentials", key: "url" } }
    - name: "Publish Artifact"
      description: "Build and push Docker image. Publish other artifacts if any."
      steps:
        - name: "docker-build-push"
          image: "gcr.io/kaniko-project/executor:latest" # Example: Kaniko for Docker build
          args: [
            "--dockerfile=Dockerfile.adhar",
            "--context=dir:///workspace/source", # Assuming code is in /workspace/source
            "--destination={{ spec.output.registryRef.name }}/{{ spec.output.imageRepositoryName }}:{{ pipeline.run.id | shortSha }}", # Example tag generation
            "--build-arg=VERSION={{ pipeline.run.id | shortSha }}"
          ]
          # envFrom:
          #   - secretRef: { name: "harbor-push-credentials" }
          # outputs:
          #   images: [{name: "applicationImage", imageUri: "..."}]
    - name: "Attestation"
      description: "Generate build attestation (e.g., SLSA provenance)."
      steps:
        - name: "generate-provenance"
          image: "gcr.io/ अधار-platform-tools/provenance-generator:latest"
          script: |
            generate-slsa-provenance \
              --artifact-uri {{ steps.docker-build-push.outputs.images.applicationImage.imageUri }} \
              --source-commit {{ pipeline.trigger.commitSha }} \
              --builder-id "adhar-pipeline-{{ pipeline.name }}" \
              --output-file /workspace/attestation/provenance.json
          # outputs:
          #   artifacts: [{name: "provenance", path: "/workspace/attestation/provenance.json"}]
  parameters: # Generic pipeline parameters, which can also be consumed by the Argo Workflow or mapped to stage/step inputs
    - name: "SONARQUBE_PROJECT_KEY"
      value: "alphacorp_user-service"
  output:
    registryRef: # Where to push the built image
      name: "reg-global-harbor" # Cluster-scoped Registry CR
    imageRepositoryName: "alpha-corp/user-service" # e.g., harbor.adhar-platform.com/alpha-corp/user-service
    # The tag will be generated by the pipeline (e.g., git commit SHA, semantic version)
  notifications:
    - type: "Slack"
      recipient: "#alpha-phoenix-builds" # Slack channel ID or name
      onStatus: ["Succeeded", "Failed"]
    - type: "Email"
      recipient: "phoenix.lead@alphacorp.com"
      onStatus: ["Failed"]
status:
  observedGeneration: 2 # Incremented due to spec change
  lastRun:
    id: "argo-workflow-run-def-789" # Example ID for an Argo Workflow run
    status: "Succeeded"
    startTime: "2025-05-18T12:35:00Z"
    completionTime: "2025-05-18T12:50:00Z"
    triggeredBy: "Webhook (commit: a1b2c3d4e5f6)"
    imagePushed: "harbor.adhar-platform.com/alpha-corp/user-service:main-a1b2c3d-run789"
    # attestations: # Example of how attestation info could be surfaced
    #   - type: "SLSA_PROVENANCE_L2"
    #     artifactDigest: "sha256:abcdef123..." # Digest of the pushed image
    #     location: "gs://adhar-attestations/alpha-corp/user-service/main-a1b2c3d-run789/provenance.json"
  nextScheduledRun: null # Not a scheduled pipeline
  conditions:
    - type: "Ready"
      status: "True"
      lastTransitionTime: "2025-01-20T11:00:00Z"
      reason: "PipelineConfigured"
      message: "Pipeline is configured and ready for triggers with Argo Workflows and defined stages."