# --- Sample DataPipeline CR for Alpha Corp Product Recommendation Model Training (Namespaced: alpha-corp-admin) ---
apiVersion: platform.adhar.io/v1alpha1
kind: DataPipeline
metadata:
  name: "dpipe-alpha-product-recommendation-training"
  namespace: "alpha-corp-admin"
spec:
  displayName: "Alpha Product Recommendation Model Training Pipeline"
  description: "Daily pipeline to train and update the product recommendation model."
  applicationRef: { name: "app-alpha-recommendation-engine" } # Contextual link
  schedule: "0 3 * * *" # Daily at 3 AM UTC
  engine: "ArgoWorkflows" # This pipeline will be an Argo Workflow
  definition: # Points to the Argo Workflow definition in Git
    type: "Git"
    gitSource:
      repoURL: "https://github.com/AlphaCorpInternalOrg/data-pipelines.git"
      path: "product-recommendation/training-workflow.yaml"
      revision: "main"
      credentialsSecretRef: { name: "git-data-pipelines-key", namespace: "alpha-corp-secrets" }
  parameters: # Parameters to pass to the Argo Workflow
    - name: "trainingDataStartDate"
      value: "{{ date.addDays(-7) | date('YYYY-MM-DD') }}" # Example dynamic parameter: 7 days ago
    - name: "modelOutputBucket"
      value: "s3://alphacorp-ml-models/product-recommendations/"
  inputArtifacts:
    - name: "salesData"
      source: { type: "DatabaseQuery", databaseRef: { name: "db-alpha-sales-dw", namespace: "alpha-data-warehouse" }, query: "SELECT * FROM daily_sales WHERE event_date >= '{{ parameters.trainingDataStartDate }}';" }
  outputArtifacts:
    - name: "trainedModel"
      destination: { type: "S3", path: "{{ parameters.modelOutputBucket }}{{ workflow.name }}/model.tar.gz" }
  platformConfigRefs:
    - configRef: { name: "pconf-ml-training-common", namespace: "alpha-corp-admin" }
      version: "v1.2"
status:
  phase: "Scheduled"
  lastRun: { id: "product-rec-train-wf-abc", status: "Succeeded", startTime: "2025-05-18T03:00:00Z", completionTime: "2025-05-18T04:30:00Z" }
  nextScheduledRun: "2025-05-19T03:00:00Z"