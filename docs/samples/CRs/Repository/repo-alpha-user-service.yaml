# --- Repository CR for Alpha User Service (Namespaced: alpha-corp-admin) ---
# (This is referenced by ApplicationBlueprint and Application CRs)
apiVersion: platform.adhar.io/v1alpha1
kind: Repository
metadata:
  name: "repo-alpha-user-service"
  namespace: "alpha-corp-admin" # Or a dedicated CI/CD namespace for Alpha Corp
  labels:
    platform.adhar.io/organizationId: "alpha-001"
    platform.adhar.io/teamId: "alpha-phoenix-001"
spec:
  applicationBlueprintRef: # Link to the conceptual application it belongs to
    name: "appbp-alpha-userservice" # This ApplicationBlueprint would also exist in alpha-corp-admin
    namespace: "alpha-corp-admin"
  type: "git"
  url: "git@github.com:AlphaCorpInternalOrg/user-service.git" # Actual Git URL
  defaultBranch: "main"
  credentialsSecretRef: # Secret for accessing the repository (e.g., deploy key)
    name: "github-alphacorp-userservice-deploykey"
    namespace: "alpha-corp-secrets" # Org-specific secrets namespace
  webhook:
    enabled: true
    secretRef: # Secret for validating webhook payloads
      name: "webhook-userservice-secret"
      namespace: "alpha-corp-secrets"
status:
  observedGeneration: 1
  lastCommitId: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
  lastSyncTimestamp: "2025-05-18T09:30:00Z"
  webhookStatus: "Active"
  message: "Webhook successfully configured with Git provider."
  conditions:
    - type: "Ready"
      status: "True"
      lastTransitionTime: "2025-01-20T10:00:00Z"
      reason: "RepositoryAccessible"
      message: "Repository is accessible and webhook is active."