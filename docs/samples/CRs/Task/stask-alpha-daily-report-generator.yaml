# --- Sample ScheduledTask CR for Alpha Corp Report Generation (Namespaced: alpha-corp-admin) ---
apiVersion: platform.adhar.com/v1alpha1
kind: ScheduledTask
metadata:
  name: "stask-alpha-daily-report-generator"
  namespace: "alpha-corp-admin" # Where the task definition lives
spec:
  displayName: "Alpha Corp Daily Sales Report Generator"
  description: "Generates daily sales reports and uploads them to secure storage."
  applicationRef: { name: "app-alpha-reporting-service" } # Contextual link to a conceptual reporting app
  schedule: "0 1 * * *" # Daily at 1 AM UTC
  concurrencyPolicy: "Forbid"
  jobTemplate:
    spec:
      containers:
      - name: "report-generator"
        image: "harbor.adhar-platform.com/alpha-corp/reporting-job:v1.2.0"
        args: ["--date=$(date -I)", "--output-path=/mnt/reports/sales-$(date -I).pdf"]
        env:
          - name: "REPORT_DB_USER"
            valueFrom: { secretKeyRef: { name: "reporting-db-creds", key: "username" } } # Assumes PlatformSecret created this K8s secret
          - name: "REPORT_DB_PASSWORD"
            valueFrom: { secretKeyRef: { name: "reporting-db-creds", key: "password" } }
        resources: { requests: { cpu: "500m", memory: "1Gi" }, limits: { cpu: "1", memory: "2Gi" } }
        volumeMounts: [{ name: "reports-volume", mountPath: "/mnt/reports" }]
      volumes: [{ name: "reports-volume", emptyDir: {} }] # Or a PVC for persistent output before upload
      restartPolicy: "OnFailure"
  platformConfigRefs:
    - configRef: { name: "pconf-reporting-service-global", namespace: "alpha-corp-admin" }
      version: "v1.0"
status: { lastScheduleTime: "2025-05-18T01:00:00Z", lastSuccessfulTime: "2025-05-18T01:05:00Z", lastRunStatus: "Succeeded" }
