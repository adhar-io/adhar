# --- Team CR: Alpha Phoenix Team (Namespaced: alpha-corp-admin) ---
apiVersion: platform.adhar.io/v1alpha1
kind: Team
metadata:
  name: "team-alpha-phoenix"
  namespace: "alpha-corp-admin" # Org-specific admin/management namespace
  labels:
    platform.adhar.io/teamId: "alpha-phoenix-001"
    platform.adhar.io/costCenter: "ACME-ALPHA-PHX"
spec:
  displayName: "Alpha Phoenix R&D Team"
  description: "Core R&D team at Alpha Corp, focusing on next-generation platform services and user experience."
  organizationRef:
    name: "org-alpha-corp" # Link to the parent Organization CR
  members:
    - user: "phoenix.lead@alphacorp.com"
      role: "TeamLead"
      permissions: ["admin:ApplicationTemplate", "admin:Pipeline", "approve:Release"] # Updated from ReleasePromotion
    - user: "sdev1.phoenix@alphacorp.com"
      role: "SeniorDeveloper"
      permissions: ["write:Application", "trigger:Pipeline"]
    - user: "devops.phoenix@alphacorp.com"
      role: "DevOpsEngineer"
      permissions: ["manage:Deployment", "manage:ObservabilityConfig"]
    - user: "qa.phoenix@alphacorp.com"
      role: "QAEngineer"
  communicationChannels:
    emailGroup: "phoenix-team@alphacorp.com"
    slackChannel: "#alpha-phoenix-dev"
    msTeamsLink: "https://teams.microsoft.com/l/channel/..."
  resourceAccess: # Defines access to specific resource types or instances for this team
    - kind: "ApplicationTemplate"
      accessLevel: "ReadWrite" # Can create/update templates relevant to them
      scope: "OwnedByTeam" # Or specific instances by name
    - kind: "Database"
      accessLevel: "Admin"
      scope: "OwnedByTeam" # Can manage databases for their applications
    - kind: "PlatformConfig"
      accessLevel: "ReadWrite"
      scope: "OwnedByTeam"
status:
  activeMembersCount: 4
  lastActivityTimestamp: "2025-05-16T14:00:00Z"
  onCallLead: "devops.phoenix@alphacorp.com" # Example status field
  projectsManagedCount: 3 # Example