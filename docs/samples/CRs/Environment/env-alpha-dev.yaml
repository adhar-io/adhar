# --- Environment CRs for Alpha Corp (Cluster-Scoped) ---
apiVersion: platform.adhar.com/v1alpha1
kind: Environment
metadata:
  name: "env-alpha-dev"
  labels:
    platform.adhar.com/region: "us-east-1"
    platform.adhar.com/env-type: "non-prod"
spec:
  displayName: "Alpha Development Environment"
  type: "development"
  description: "Shared development environment for Alpha Corp projects. Rapid iteration and testing."
  organizationRef: { name: "org-alpha-corp" }
  namespaceName: "alpha-dev-apps" # Target Kubernetes namespace for deployments in this env
  clusterAffinity:
    clusterName: "dev-cluster-us-east-1a"
    zone: "us-east-1a"
  configurations: # Environment-specific key-value pairs, e.g., for feature flags or service endpoints
    debugLoggingEnabled: "true"
    mockExternalServices: "true"
    defaultApiGatewayUrl: "http://dev-gateway.internal.alphacorp:8080"
  networkPolicy: # Simplified example; could reference a K8s NetworkPolicy object
    defaultIngress: "allow-from-org-cidr"
    defaultEgress: "allow-to-platform-services"
  resourceQuota: # Quotas to be applied to the environment's namespace
    hard:
      requests.cpu: "50"
      requests.memory: "256Gi"
      limits.cpu: "100"
      limits.memory: "512Gi"
      pods: "200"
  rolloutStrategy: "RollingUpdate" # Default for dev
status:
  phase: "Ready"
  message: "Development environment is operational."
  applicationCount: 2 # Example
  databaseCount: 1 # Example
  lastHealthCheckTimestamp: "2025-05-18T11:00:00Z"
  healthStatus: "Healthy"
  conditions:
    - type: "NamespaceReady"
      status: "True"
      lastTransitionTime: "2025-01-15T10:00:00Z"
      reason: "NamespaceProvisioned"
      message: "Target namespace alpha-dev-apps is ready."