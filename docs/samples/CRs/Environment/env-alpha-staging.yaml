apiVersion: platform.adhar.io/v1alpha1
kind: Environment
metadata:
  name: "env-alpha-staging"
  labels:
    platform.adhar.io/region: "us-east-1"
    platform.adhar.io/env-type: "pre-prod"
spec:
  displayName: "Alpha Staging Environment"
  type: "staging"
  description: "Staging environment for UAT, integration testing, and pre-production validation at Alpha Corp."
  organizationRef: { name: "org-alpha-corp" }
  namespaceName: "alpha-staging-apps"
  clusterAffinity: { clusterName: "staging-cluster-us-east-1b" }
  configurations:
    logLevel: "INFO"
    defaultReplicas: "1" # Usually lower than prod
    maintenanceWindow: "Sat 00:00-02:00 UTC"
  resourceQuota: { hard: { "requests.cpu": "30", "requests.memory": "128Gi", "pods": "100" } }
  rolloutStrategy: "Canary"
status: { phase: "Ready", message: "Staging environment is operational." }
