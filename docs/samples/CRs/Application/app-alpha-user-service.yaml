# --- Application: Alpha User Service (Backend Microservice using Adhar Kit) ---
apiVersion: platform.adhar.io/v1alpha1
kind: Application
metadata:
  name: "app-alpha-user-service"
  namespace: "alpha-corp-admin" # Or a team-specific namespace like 'team-alpha-phoenix-ns'
  labels:
    platform.adhar.io/organization: "org-alpha-corp"
    platform.adhar.io/team: "team-alpha-phoenix"
    platform.adhar.io/app-type: "microservice"
spec:
  displayName: "Alpha User Service"
  description: "Manages user authentication, authorization, and profiles for Alpha Corp applications."
  organizationRef: { name: "org-alpha-corp" }
  teamRef: { name: "team-alpha-phoenix", namespace: "alpha-corp-admin" }
  template:
    templateRef:
      name: "adhar-kit-service-template"
      namespace: "platform-templates" # Where ApplicationTemplates are stored
    values:
      serviceName: "user-service"
      basePackage: "com.alphacorp.userservice"
      adharKitVersion: "2.1.0" # Use a specific Adhar Kit version
      javaVersion: "17"
      springBootVersion: "2.7.15"
      apiContractType: "openapi-rest"
      includeStarters:
        - "adhar-kit-starter-web"
        - "adhar-kit-starter-data-jpa"
        - "adhar-kit-starter-security-oauth2"
        - "adhar-kit-starter-observability"
      databaseType: "postgresql"

  sourceCode:
    # The controller would typically provision a Repository CR based on template output and populate this.
    # Option 1: Reference an existing, managed Repository CR
    repositoryRef:
      name: "repo-alpha-user-service" # Assumes a Repository CR named this exists/will be created
      namespace: "alpha-corp-admin"
    defaultBranch: "main"
    # Option 2: Define repository URL inline. The Application controller might
    # then create/manage an implicit Repository CR or handle it directly.
    # repositoryURL: "git@github.com:AlphaCorpInternal/user-service.git" # Populated by template scaffolding
    # credentialsSecretRef: # Secret for accessing the repo
    #   name: "github-alphacorp-ssh-key"
    #   namespace: "alpha-corp-secrets" # Assuming a central secrets namespace
    # defaultBranch: "main"

  build:
    # Option 1: Reference an existing, managed Pipeline CR
    # The controller would typically provision a Pipeline CR based on template output and populate this.
    pipelineRef:
      name: "pl-alpha-user-service-main" # Assumes a Pipeline CR named this exists/will be created
      namespace: "alpha-corp-admin"
    registryOutput:
      registryRef: { name: "reg-global-harbor" } # Cluster-scoped registry
      imageRepositoryName: "alpha-corp/user-service" # e.g., harbor.adhar-platform.com/alpha-corp/user-service
    # Option 2: Define build inline (if pipelineRef is omitted)
    # builderType: "Tekton" # Example: Use Tekton
    # The Application controller would need to know how to translate this into Tekton TaskRuns/PipelineRuns
    # This might involve a predefined internal Task/Pipeline or more detailed inline steps.
    # For simplicity here, we assume 'Tekton' with 'pipelineScriptPath' implies a known internal process.
    # pipelineScriptPath: ".github/workflows/ci-adhar-kit-service.yaml" # Or a path to a Tekton Task definition in the repo
    # Or, more detailed inline steps if the CRD supported it:
    # steps:
    #   - name: "build"
    #     image: "maven:3.8-openjdk-17"
    #     command: ["mvn", "clean", "install"]
    #   - name: "package-docker"
    #     image: "gcr.io/kaniko-project/executor:latest"
    #     args:
    #       - "--dockerfile=Dockerfile.adhar"
    #       - "--context=dir://."
    #       - "--destination={{ spec.build.registryOutput.registryRef.name }}/{{ spec.build.registryOutput.imageRepositoryName }}:{{ version }}" # Version needs to be available
    # registryOutput:
    #   registryRef: { name: "reg-global-harbor" } # Cluster-scoped registry
    #   imageRepositoryName: "alpha-corp/user-service" # e.g., harbor.adhar-platform.com/alpha-corp/user-service

  deployments: # Defines how this app is deployed across environments
    - environmentRef: { name: "env-alpha-dev" } # Cluster-scoped Environment CR
      version: "latest-dev" # Tracks the latest build from a dev branch or is manually set
      replicas: 1
      rolloutStrategy: "RollingUpdate"
      gitOps: # This app in this env is managed by a GitOpsDeployment CR
        # Option 1: Reference an existing Deployment (GitOps) CR
        deploymentRef:
          name: "dep-alpha-user-service-dev" # Assumes a Deployment CR
          namespace: "alpha-dev-apps" # Namespace where the GitOpsDeployment CR lives (usually env's app ns)
        # Option 2: Define GitOps parameters inline
        # configRepoURL: "git@github.com:AlphaCorpInternal/app-configs.git"
        # path: "manifests/alpha-corp/user-service/dev" # Path to K8s manifests or Helm chart
        # tool: "ArgoCD" # Specify the GitOps tool
        # argoProject: "alpha-dev" # Tool-specific parameter
        # The Application controller would create/manage the ArgoCD Application resource.
        # The 'version' from this deployment entry would be passed as a parameter
        # to the Helm chart or Kustomize overlay in the configRepo.
      env: # Environment variables specific to this deployment
        - name: "LOG_LEVEL"
          value: "DEBUG"
        - name: "DATABASE_URL_SECRET_KEY" # App reads DB URL from this env var
          valueFrom:
            secretKeyRef:
              name: "db-alpha-userservice-dev-conn" # Assumes Database CR creates this secret
              key: "url"
    - environmentRef: { name: "env-alpha-staging" }
      version: "1.2.0-rc1" # Specific version for staging
      replicas: 1
      rolloutStrategy: "Canary"
      gitOps:
        deploymentRef:
          name: "dep-alpha-user-service-staging"
          namespace: "alpha-staging-apps"
    - environmentRef: { name: "env-alpha-prod" }
      version: "1.1.5" # Stable production version
      replicas: 3
      rolloutStrategy: "BlueGreen" # Example
      gitOps:
        deploymentRef:
          name: "dep-alpha-user-service-prod"
          namespace: "alpha-prod-apps"

  release:
    promotionStrategy: "ManualApproval"
    stages: # Defines the promotion path
      - environmentRef: { name: "env-alpha-dev" }
      - environmentRef: { name: "env-alpha-staging" }
      - environmentRef: { name: "env-alpha-prod" }
    # The Application controller could create ReleasePromotion CRs based on this.
    # It would target the 'version' field in the 'deployments[].gitOps' section
    # or the 'version' field of the referenced 'Deployment' (GitOps) CR.

  networking: # How this application is accessed
    - environmentRef: { name: "env-alpha-prod" } # Example for prod
      routes:
        - hostnames: ["api.users.alphacorp.com"]
          paths: [{ value: "/v1/users", type: "Prefix" }]
          port: 8080 # Port on the K8s Service of the application
          protocol: "HTTPS"
          gatewayRef: { name: "gw-alpha-external", namespace: "alpha-gateways" } # Ref to a K8s Gateway
          tls:
            mode: "Terminate"
            certificateRef: { name: "tls-users-alphacorp-com", namespace: "alpha-prod-apps" } # Secret with cert

  observability:
    - environmentRef: { name: "env-alpha-dev" }
      # Inline basic settings
      logging: { loggingConfigRef: { name: "logconf-alpha-default-json", namespace: "alpha-corp-admin" } } # Default
      metrics: { metricsConfigRef: { name: "metconf-alpha-standard-scrape", namespace: "alpha-corp-admin" } }
      tracing: { tracingConfigRef: { name: "traceconf-alpha-opentelemetry", namespace: "alpha-corp-admin" } }
      # Can still use refs for more complex or shared configs if needed:
      # logging: { loggingConfigRef: { name: "logconf-alpha-default-json", namespace: "alpha-corp-admin" } }
    - environmentRef: { name: "env-alpha-prod" }
      logging: # Override for prod, can mix inline and refs
        level: "WARN"
        loggingConfigRef: { name: "logconf-alpha-prod-secure", namespace: "alpha-corp-admin" } # Assumed more secure/filtered config
      metrics: { metricsConfigRef: { name: "metconf-alpha-standard-scrape", namespace: "alpha-corp-admin" } }
      tracing: { tracingConfigRef: { name: "traceconf-alpha-opentelemetry", namespace: "alpha-corp-admin" }, samplingRate: 0.05 } # Reduced sampling in prod

  configuration:
    - environmentRef: { name: "env-alpha-dev" }
      platformConfigRefs:
        - configRef: { name: "pconf-alpha-userservice-base", namespace: "alpha-corp-admin" }
          version: "v1.0.0"
        - configRef: { name: "pconf-global-dev-settings", namespace: "platform-configs" } # Global dev settings
          version: "latest"
    - environmentRef: { name: "env-alpha-prod" }
      platformConfigRefs:
        - configRef: { name: "pconf-alpha-userservice-prod-override", namespace: "alpha-prod-apps" } # Prod specific
          version: "v1.0.1"
        - configRef: { name: "pconf-global-prod-secure", namespace: "platform-configs" }
          version: "v2.3"

status:
  phase: "Ready"
  message: "User service is provisioned and managed across environments."
  environmentStatuses:
    - environmentRef: { name: "env-alpha-dev" }
      version: "latest-dev"
      health: "Healthy"
      syncStatus: "Synced"
      lastDeployedTimestamp: "2025-05-17T10:00:00Z"
      endpoints: ["http://user-service.alpha-dev-apps.svc.cluster.local:8080"]
    - environmentRef: { name: "env-alpha-prod" }
      version: "1.1.5"
      health: "Healthy"
      syncStatus: "Synced"
      lastDeployedTimestamp: "2025-05-16T14:00:00Z"
      endpoints: ["https://api.users.alphacorp.com"]