# --- Application CR: Alpha Customer Portal UI (Standalone React Frontend) ---
apiVersion: platform.adhar.io/v1alpha1
kind: Application
metadata:
  name: "app-alpha-customer-portal-ui"
  namespace: "alpha-corp-admin"
  labels:
    platform.adhar.io/organization: "org-alpha-corp"
    platform.adhar.io/team: "team-alpha-phoenix"
    platform.adhar.io/app-type: "frontend-spa"
spec:
  displayName: "Alpha Customer Portal UI"
  description: "Main customer-facing web portal for Alpha Corp."
  organizationRef: { name: "org-alpha-corp" }
  teamRef: { name: "team-alpha-phoenix", namespace: "alpha-corp-admin" }
  template:
    templateRef:
      name: "react-frontend-template"
      namespace: "platform-templates"
    values:
      applicationName: "customer-portal"
      architecture: "standalone" # Key parameter for this template
      includeTailwindCSS: true
      includeRouter: "react-router-dom"
      stateManagement: "zustand"
      buildTool: "npm"

  sourceCode:
    repositoryRef: { name: "repo-alpha-customer-portal-ui", namespace: "alpha-corp-admin" }

  build:
    pipelineRef: { name: "pl-alpha-customer-portal-ui-main", namespace: "alpha-corp-admin" }
    registryOutput:
      registryRef: { name: "reg-global-harbor" }
      imageRepositoryName: "alpha-corp/customer-portal-ui"

  deployments:
    - environmentRef: { name: "env-alpha-dev" }
      version: "feature-x-build123"
      replicas: 1
      gitOps: { deploymentRef: { name: "dep-alpha-portal-ui-dev", namespace: "alpha-dev-apps" } }
    - environmentRef: { name: "env-alpha-prod" }
      version: "v2.3.1"
      replicas: 2
      gitOps: { deploymentRef: { name: "dep-alpha-portal-ui-prod", namespace: "alpha-prod-apps" } }

  networking:
    - environmentRef: { name: "env-alpha-prod" }
      routes:
        - hostnames: ["portal.alphacorp.com", "www.alphacorp.com"] # Multiple hostnames
          paths: [{ value: "/", type: "Prefix" }]
          port: 80 # Assuming frontend is served on port 80 by Nginx/Caddy in the container
          protocol: "HTTPS"
          gatewayRef: { name: "gw-alpha-external", namespace: "alpha-gateways" }
          tls:
            mode: "Terminate"
            certificateRef: { name: "tls-portal-alphacorp-com", namespace: "alpha-prod-apps" }

  observability: # Frontend might have less server-side observability, more RUM focused (not covered by these CRs)
    - environmentRef: { name: "env-alpha-prod" }
      logging: { level: "INFO" } # Minimal logging for serving container

  configuration: # Example: configuration for feature flags or API endpoints for the SPA
    - environmentRef: { name: "env-alpha-prod" }
      platformConfigRefs:
        - configRef: { name: "pconf-alpha-portal-ui-prod", namespace: "alpha-prod-apps" }
          version: "v1.2"
          mountPath: "/usr/share/nginx/html/config" # SPA might load config.json from here

status:
  phase: "Ready"
  message: "Customer Portal UI is operational."