# --- Application CR 5: Alpha Main API Gateway ---
apiVersion: platform.adhar.io/v1alpha1
kind: Application
metadata:
  name: "app-alpha-main-gateway"
  namespace: "alpha-corp-admin"
  labels:
    platform.adhar.com/organization: "org-alpha-corp"
    platform.adhar.com/team: "team-alpha-phoenix" # Or a dedicated gateway team
    platform.adhar.com/app-type: "api-gateway"
spec:
  displayName: "Alpha Main API Gateway"
  description: "Central API Gateway for Alpha Corp backend services."
  organizationRef: { name: "org-alpha-corp" }
  teamRef: { name: "team-alpha-phoenix", namespace: "alpha-corp-admin" }
  template:
    templateRef:
      name: "spring-cloud-gateway-template"
      namespace: "platform-templates"
    values:
      gatewayName: "main-api-gw"
      javaVersion: "17"
      includeRateLimiting: true
      includeCircuitBreaker: true
      defaultDiscoveryService: "kubernetes" # Uses K8s service discovery
      basePathStrategy: "strip-prefix"

  sourceCode:
    repositoryRef: { name: "repo-alpha-main-gateway", namespace: "alpha-corp-admin" }

  build:
    pipelineRef: { name: "pl-alpha-main-gateway-main", namespace: "alpha-corp-admin" }
    registryOutput:
      registryRef: { name: "reg-global-harbor" }
      imageRepositoryName: "alpha-corp/main-api-gateway"

  deployments:
    - environmentRef: { name: "env-alpha-prod" }
      version: "v1.8.0"
      replicas: 3
      # API Gateway's config (routes to microservices) is often managed in its own Git repo
      # or via ConfigMaps updated by service registrations.
      # The GitOpsDeployment for the gateway itself would point to its application code.
      gitOps: { deploymentRef: { name: "dep-alpha-main-gateway-prod", namespace: "alpha-prod-apps" } }

  networking: # The Gateway itself is the main external entry point for APIs
    - environmentRef: { name: "env-alpha-prod" }
      routes:
        - hostnames: ["api.alphacorp.com"] # This is THE API endpoint
          paths: [{ value: "/", type: "Prefix" }]
          port: 8080 # Port exposed by the Gateway K8s Service
          protocol: "HTTPS"
          gatewayRef: { name: "gw-alpha-external", namespace: "alpha-gateways" } # K8s Gateway CR
          tls: { mode: "Terminate", certificateRef: { name: "tls-api-alphacorp-com", namespace: "alpha-prod-apps" } }

  observability:
    - environmentRef: { name: "env-alpha-prod" }
      logging: { level: "INFO", loggingConfigRef: { name: "logconf-alpha-gateway-prod", namespace: "alpha-corp-admin" } }
      metrics: { metricsConfigRef: { name: "metconf-alpha-standard-scrape", namespace: "alpha-corp-admin" } } # Gateway exposes its own metrics
      tracing: { tracingConfigRef: { name: "traceconf-alpha-opentelemetry", namespace: "alpha-corp-admin" }, samplingRate: 0.2 }

status:
  phase: "Ready"
  message: "Main API Gateway is operational."