# --- Sample Secret CR for User Service DB Credentials (Namespaced: alpha-prod-apps-usw2) ---
apiVersion: platform.adhar.io/v1alpha1
kind: Secret
metadata:
  name: "psec-user-service-prod-db"
  namespace: "alpha-prod-apps-usw2" # Same namespace as the application that will consume it
spec:
  secretStoreRef: { name: "pss-central-vault" } # Cluster-scoped store
  targetSecret:
    name: "user-service-db-credentials" # K8s secret to be created/updated
    labels: { "app.kubernetes.io/managed-by": "adhar-platform-secrets-controller" }
  refreshInterval: "8h"
  data: # Fetch specific keys from Vault
    - remoteKey: "database/alpha-corp/prod/user-service" # Path in Vault KVv2
      remoteProperty: "username" # Key within the Vault secret data
      secretKey: "DB_USER" # Key in the target K8s Secret
    - remoteKey: "database/alpha-corp/prod/user-service"
      remoteProperty: "password"
      secretKey: "DB_PASSWORD"
    - remoteKey: "database/alpha-corp/prod/user-service"
      remoteProperty: "db_url"
      secretKey: "DB_URL"
    - remoteKey: "database/alpha-corp/prod/user-service"
      remoteProperty: "port"
      secretKey: "DB_PORT"
    - remoteKey: "database/alpha-corp/prod/user-service"
      remoteProperty: "database_name"
      secretKey: "DB_NAME"
status: { syncStatus: "Synced", lastSyncTimestamp: "2025-05-18T12:00:00Z", targetSecretName: "user-service-db-credentials" }
