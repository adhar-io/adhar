# --- Sample MetricsConfig CR for Alpha Spring Actuator (Namespaced: alpha-corp-admin) ---
apiVersion: platform.adhar.io/v1alpha1
kind: MetricsConfig
metadata:
  name: "metconf-alpha-spring-actuator"
  namespace: "alpha-corp-admin"
spec:
  displayName: "Alpha Spring Boot Actuator Metrics"
  scrapeEndpoints: [{portName: "http-management", path: "/actuator/prometheus", interval: "15s"}]
  additionalSettings:
    enableDetailedMetrics: true
    metricsPath: "/actuator/metrics"
    enableHealthCheck: true
    metricsFormat: "Prometheus"
status: { inUseByCount: 2 }