# --- LoggingConfig CR - Alpha Default JSON (Namespaced: alpha-corp-admin) ---
# (Reusable logging configuration)
apiVersion: platform.adhar.io/v1alpha1
kind: LoggingConfig
metadata:
  name: "logconf-alpha-default-json"
  namespace: "alpha-corp-admin"
spec:
  displayName: "Alpha Default JSON Logging (Info Level)"
  level: "INFO"
  format: "JSON"
  outputs:
    - name: "stdout-json"
      type: "stdout"
    - name: "loki-stream" # Example: sending logs to a Loki instance
      type: "http"
      endpointUrl: "http://loki.alpha-observability.svc.cluster.local:3100/loki/api/v1/push"
  sampling:
    rate: 1.0 # Log all by default
  labels: # Labels to add to all log entries using this config
    platform_source: "adhar"
    organization_id: "alpha-001"
status:
  observedGeneration: 1
  inUseByCount: 5 # Example
  conditions:
    - type: "Ready"
      status: "True"
      lastTransitionTime: "2025-01-17T10:00:00Z"
      reason: "ConfigValid"
      message: "LoggingConfig is valid."