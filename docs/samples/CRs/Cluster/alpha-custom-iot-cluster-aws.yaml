# --- Sample Cluster CR 4: Self-Managed Cluster on AWS (Conceptual) ---
# This is more complex and would require a sophisticated Composition Function
# to orchestrate VM creation, K8s installation (e.g., k3s, kubeadm), and configuration.
apiVersion: platform.adhar.com/v1alpha1
kind: Cluster
metadata:
  name: "alpha-custom-iot-cluster-aws"
  namespace: "alpha-corp-admin"
  labels:
    platform.adhar.com/organization: "org-alpha-corp"
    platform.adhar.com/environment-type: "production"
    platform.adhar.com/custom: "true"
spec:
  displayName: "Alpha Corp Custom IoT Edge Cluster (AWS VMs)"
  organizationRef: { name: "org-alpha-corp" }
  environmentType: "production"
  provider: "SelfManagedCloud" # Indicates a custom provisioning flow
  region: "eu-west-1" # Cloud where VMs will be spun up
  version: "1.27.5" # Kubernetes version to install
  controlPlane:
    highAvailability: true
  nodePools:
    - name: "master-nodes"
      instanceType: "t3.medium" # AWS EC2 instance type
      count: 3
      storageSize: "50Gi"
      labels: { "node-role.kubernetes.io/master": "" }
      taints: [{key: "node-role.kubernetes.io/master", effect: "NoSchedule"}]
    - name: "worker-nodes-iot"
      instanceType: "t3.small"
      count: 5
      minCount: 3
      maxCount: 10
      storageSize: "30Gi"
      labels: { "workload-type": "iot-edge" }
  networkConfig:
    vpcId: "vpc-alphaedgeeuwest1"
    subnetIds: ["subnet-alphaedgea", "subnet-alphaedgeb"]
    cniPlugin: "cilium" # Example CNI for self-managed
  providerConfigRef: "aws-provider-config-euw1" # For provisioning VMs on AWS
  # selfManagedCloudConfig: # Specifics for the self-managed provisioning logic
  #   cloudProvider: "AWS"
  #   kubernetesDistribution: "k3s" # e.g., k3s for lightweight edge clusters
  #   vmImageId: "ami-xxxxxxxxxxxxxxxxx" # Base AMI for VMs
  #   sshKeyName: "adhar-edge-cluster-ssh-key"
  #   bootstrapScriptUrl: "s3://adhar-bootstrap-scripts/k3s-aws-install.sh"
  deletionPolicy: "Delete" # Will need to tear down VMs and associated resources
status:
  phase: "Pending"