# --- Sample Cluster CR 1: Production EKS Cluster for Alpha Corp ---
apiVersion: platform.adhar.com/v1alpha1
kind: Cluster # This is an instance of the XCluster XRD
metadata:
  name: "alpha-prod-usw2-eks-01"
  namespace: "alpha-corp-admin" # Where the management of this cluster resource resides
  labels:
    platform.adhar.com/organization: "org-alpha-corp"
    platform.adhar.com/environment-type: "production"
    platform.adhar.com/region: "us-west-2"
spec:
  displayName: "Alpha Corp Production EKS Cluster (US-West-2)"
  organizationRef: { name: "org-alpha-corp" }
  environmentType: "production"
  provider: "AWS_EKS"
  region: "us-west-2"
  version: "1.28" # Desired Kubernetes version
  controlPlane:
    highAvailability: true # Production cluster
    endpointAccess: "PublicAndPrivate" # Both public and private API server endpoints
  nodePools:
    - name: "general-purpose-app"
      instanceType: "m5.xlarge"
      count: 3
      minCount: 2
      maxCount: 5
      storageSize: "100Gi"
      labels: { "nodepool-type": "application", "workload": "general" }
      taints: []
    - name: "critical-services"
      instanceType: "r5.large"
      count: 2
      minCount: 2
      maxCount: 3
      storageSize: "80Gi"
      labels: { "nodepool-type": "critical", "workload": "infra-support" }
      taints:
        - key: "CriticalServiceOnly"
          effect: "NoSchedule"
  networkConfig:
    vpcId: "vpc-alphaprodusw2" # Assumes this VPC exists or will be created/selected by composition
    subnetIds: ["subnet-alphaprodusw2a", "subnet-alphaprodusw2b", "subnet-alphaprodusw2c"]
    podCidrBlock: "10.100.0.0/16"
    serviceCidrBlock: "10.101.0.0/16"
    cniPlugin: "aws-vpc-cni"
  providerConfigRef: "aws-provider-config-usw2" # Crossplane ProviderConfig for AWS in us-west-2
  eksConfig:
    clusterRoleARN: "arn:aws:iam::123456789012:role/AdharAlphaProdEKSClusterRole"
    nodeRoleARN: "arn:aws:iam::123456789012:role/AdharAlphaProdEKSNodeRole"
    # Additional EKS specific configurations can be added here
    # e.g., encryptionConfig, kubernetesNetworkConfig (for service IPv4/v6 CIDR), logging
  deletionPolicy: "Delete" # Delete the underlying EKS cluster when this CR is deleted
status: # Status would be populated by Crossplane
  phase: "Provisioning"
  message: "EKS cluster provisioning initiated."
  # conditions: [...]
  # connectionSecretRef: # Will be populated once the cluster is ready
  #   name: "alpha-prod-usw2-eks-01-kubeconfig"
  #   namespace: "alpha-corp-admin"