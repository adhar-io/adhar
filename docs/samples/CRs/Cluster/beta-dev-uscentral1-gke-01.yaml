# --- Sample Cluster CR 2: Development GKE Cluster for Beta Solutions ---
apiVersion: platform.adhar.com/v1alpha1
kind: Cluster
metadata:
  name: "beta-dev-uscentral1-gke-01"
  namespace: "beta-solutions-admin"
  labels:
    platform.adhar.com/organization: "org-beta-solutions"
    platform.adhar.com/environment-type: "development"
    platform.adhar.com/region: "us-central1"
spec:
  displayName: "Beta Solutions Development GKE Cluster (US-Central1)"
  organizationRef: { name: "org-beta-solutions" }
  environmentType: "development"
  provider: "GCP_GKE"
  region: "us-central1"
  version: "1.27"
  controlPlane:
    highAvailability: false # Dev cluster might not need HA control plane
    endpointAccess: "Public"
  nodePools:
    - name: "default-pool"
      instanceType: "e2-medium"
      count: 1
      minCount: 1
      maxCount: 3
      storageSize: "50Gi"
      labels: { "nodepool-type": "general-dev" }
  networkConfig:
    # If vpcId/subnetIds are not provided, the Composition Function might create a new VPC/subnetwork
    podCidrBlock: "10.20.0.0/16"
    serviceCidrBlock: "10.21.0.0/16"
    cniPlugin: "calico" # Or GKE default
  providerConfigRef: "gcp-provider-config-uscentral1" # Crossplane ProviderConfig for GCP
  gkeConfig:
    network: "projects/beta-gcp-project/global/networks/beta-dev-network" # Example existing network
    subnetwork: "projects/beta-gcp-project/regions/us-central1/subnetworks/beta-dev-subnet"
    # releaseChannel: "REGULAR"
  deletionPolicy: "Delete"
status:
  phase: "Pending"