# --- Sample ApplicationTemplate: Adhar Kit Service ---
apiVersion: platform.adhar.com/v1alpha1
kind: ApplicationTemplate
metadata:
  name: "adhar-kit-service-template"
  namespace: "platform-templates"
  labels:
    platform.adhar.com/template-type: "backend-service"
    platform.adhar.com/language: "java"
    platform.adhar.com/framework: "spring-boot" # Example, could be Quarkus, etc.
    platform.adhar.com/custom-kit: "adhar-kit"
spec:
  displayName: "Adhar Kit Microservice Chassis"
  description: >-
    A common chassis for building Spring Boot microservices using the Adhar Kit.
    This multi-module Maven template provides various starters for cross-cutting concerns like web, data, messaging, security, and observability,
    accelerating development and ensuring consistency across the organization.
  tags: ["adhar-kit", "chassis", "microservice", "spring-boot", "java", "maven", "platform-integrated", "event-driven", "data-access"]
  ownerTeamRef:
    name: "adhar-platform-sdk-team"
    namespace: "platform-admin"
  type: "service"
  source:
    url: "https://github.com/adhar-platform/adhar-kit-service-template-maven.git" # Assuming a Maven multi-module template
    path: "/" # Root of the multi-module template project
    revision: "v3.0.0" # Updated version
  parametersSchema:
    openAPIV3Schema:
      type: object
      properties:
        serviceName:
          type: string
          description: "The name for the new microservice (e.g., 'user-service', 'order-processor'). This will be used for the main application module and default artifactId."
          pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
        basePackage:
          type: string
          description: "Base Java package name for the service (e.g., 'com.myorg.myservice')."
          pattern: "^[a-z_][a-z0-9_]*(\\.[a-z_][a-z0-9_]*)*$"
        adharKitVersion:
          type: string
          description: "Version of the Adhar Kit Bill of Materials (BOM) and parent POM to use."
          default: "2.0.0" # Version of the Adhar Kit itself
        javaVersion:
          type: string
          enum: ["11", "17", "21"]
          default: "17"
        springBootVersion: # Adhar Kit might be tied to specific Spring Boot versions
          type: string
          description: "Spring Boot version (managed by Adhar Kit BOM)."
          default: "2.7.12" # Example
        apiContractType:
          type: string
          description: "Primary API contract type for the service's main interface."
          enum: ["openapi-rest", "grpc", "asyncapi-events", "none"]
          default: "openapi-rest"
        includeStarters:
          type: array
          description: "Select Adhar Kit starters to include in the service."
          items:
            type: string
            enum:
              - "adhar-kit-starter-web"         # For RESTful APIs with Spring MVC/WebFlux
              - "adhar-kit-starter-data-jpa"    # For JPA-based data access
              - "adhar-kit-starter-data-mongodb"# For MongoDB access
              - "adhar-kit-starter-data-r2dbc"  # For reactive data access
              - "adhar-kit-starter-kafka"       # For Kafka integration
              - "adhar-kit-starter-rabbitmq"    # For RabbitMQ integration
              - "adhar-kit-starter-security-oauth2" # For OAuth2/OIDC security
              - "adhar-kit-starter-observability" # For logging, metrics, tracing defaults
              - "adhar-kit-starter-resilience"    # For circuit breakers, retries
              - "adhar-kit-starter-test"        # For common test utilities
          default: ["adhar-kit-starter-web", "adhar-kit-starter-observability"]
          # UI representation could be checkboxes
        databaseType: # This might be redundant if covered by data starters, but can be a high-level choice
          type: string
          description: "If a data starter is chosen, specify the primary database type for initial setup."
          enum: ["none", "postgresql", "mysql", "mongodb"]
          default: "none"
      required:
        - serviceName
        - basePackage
        - apiContractType
  output:
    repositoryPattern: "{{ organization.name | lower }}-ms-{{ template.parameters.serviceName }}"
    defaultFiles: # Key files in a multi-module Maven project
      - "pom.xml"  # Parent POM
      - "{{ template.parameters.serviceName }}-app/pom.xml" # Application module POM
      - "{{ template.parameters.serviceName }}-app/src/main/java/{{ template.parameters.basePackage | replace('.', '/') }}/{{ template.parameters.serviceName | capitalize }}Application.java"
      - "{{ template.parameters.serviceName }}-api/pom.xml" # Optional API module POM
      - "{{ template.parameters.serviceName }}-api/src/main/resources/api/{{ 'openapi.yaml' if template.parameters.apiContractType == 'openapi-rest' else ('service.proto' if template.parameters.apiContractType == 'grpc' else 'asyncapi.yaml') }}"
      - "README.md"
      - "Dockerfile.adhar"
      - ".github/workflows/ci-adhar-kit-service.yaml"
status:
  observedGeneration: 3 # Incremented due to update
  usageCount: 10 # Example
  conditions:
    - type: "Ready"
      status: "True"
      lastTransitionTime: "2025-05-17T12:00:00Z" # Updated timestamp
      reason: "TemplateAvailable"
      message: "Adhar Kit microservice chassis template is enhanced and available."