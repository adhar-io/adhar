# --- Sample ApplicationTemplate: Nx Monorepo ---
apiVersion: platform.adhar.com/v1alpha1
kind: ApplicationTemplate
metadata:
  name: "nx-monorepo-advanced-template" # Renamed for clarity
  namespace: "platform-templates"
  labels:
    platform.adhar.com/template-type: "monorepo-fullstack"
    platform.adhar.com/framework: "nx"
    platform.adhar.com/ui-library: "react"
    platform.adhar.com/design-system: "shadcn-ui"
spec:
  displayName: "Nx Monorepo (Microfrontends & Microservices)"
  description: "An advanced Nx monorepo template for building full-stack solutions. Supports a React UI component library (with Shadcn UI), a microfrontend host, multiple remote microfrontends, and backend NestJS microservices."
  tags: ["nx", "monorepo", "react", "nestjs", "microfrontend", "microservice", "fullstack", "shadcn-ui"]
  ownerTeamRef:
    name: "fullstack-platform-innovators"
    namespace: "platform-admin"
  type: "other" # Monorepo contains multiple types
  source:
    url: "https://github.com/adhar-platform-templates/nx-monorepo-advanced.git"
    path: "/"
    revision: "v1.0.0"
  parametersSchema:
    openAPIV3Schema:
      type: object
      properties:
        workspaceName: # Renamed from monorepoName for clarity
          type: string
          description: "The name for the new Nx workspace (e.g., 'digital-experience-platform', 'enterprise-suite')."
          pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
        npmScope: # Renamed from scopeName
          type: string
          description: "NPM scope for packages within the monorepo (e.g., '@myorg', '@companyname')."
          pattern: "^@[a-zA-Z0-9_-]+$"
          default: "@adhar-platform"
        hostAppName:
          type: string
          description: "Name for the microfrontend host application (e.g., 'shell', 'portal')."
          default: "host"
        uiComponentName:
          type: string
          description: "Name for the shared UI component library (e.g., 'shared-ui', 'design-system-components')."
          default: "ui-kit"
        includeStorybook:
          type: boolean
          description: "Include Storybook setup for the UI component library."
          default: true
        initialRemoteMicrofrontends:
          type: array
          description: "Define initial remote microfrontend applications to scaffold."
          items:
            type: object
            properties:
              name: { type: string, description: "Name of the remote microfrontend (e.g., 'profile', 'orders')." }
              port: { type: integer, description: "Default development port for this remote.", default: 3001 }
            required: [name]
          default: [{name: "feature-alpha", port: 3001}]
        initialBackendMicroservices:
          type: array
          description: "Define initial backend NestJS microservices to scaffold."
          items:
            type: object
            properties:
              name: { type: string, description: "Name of the backend microservice (e.g., 'user-api', 'product-catalog')." }
              port: { type: integer, description: "Default development port for this service.", default: 3333 }
            required: [name]
          default: [{name: "service-alpha", port: 3333}]
      required:
        - workspaceName
        - npmScope
  output:
    repositoryPattern: "{{ organization.name | lower }}-workspace-{{ template.parameters.workspaceName }}"
    defaultFiles:
      - "nx.json"
      - "package.json"
      - "apps/{{ template.parameters.hostAppName }}/src/main.tsx" # Host App
      - "libs/{{ template.parameters.uiComponentName }}/src/index.ts" # Shared UI Kit
      - "apps/{{ template.parameters.initialRemoteMicrofrontends[0].name if template.parameters.initialRemoteMicrofrontends else 'remote-placeholder' }}/src/main.tsx" # Example first remote MFE
      - "apps/{{ template.parameters.initialBackendMicroservices[0].name if template.parameters.initialBackendMicroservices else 'service-placeholder' }}/src/main.ts" # Example first backend MS
      - ".github/workflows/ci-monorepo-fullstack.yaml"
status:
  observedGeneration: 1
  usageCount: 1
  conditions:
    - type: "Ready"
      status: "True"
      lastTransitionTime: "2025-05-17T11:50:00Z"
      reason: "TemplateAvailable"
      message: "Application template for advanced Nx monorepo is available."