# --- Sample ApplicationTemplate: Frontend React Application ---
apiVersion: platform.adhar.io/v1alpha1
kind: ApplicationTemplate
metadata:
  name: "react-frontend-template"
  namespace: "platform-templates"
  labels:
    platform.adhar.com/template-type: "frontend-app"
    platform.adhar.com/language: "javascript"
    platform.adhar.com/framework: "react"
spec:
  displayName: "React Frontend Application / Microfrontend Remote"
  description: "A starter template for a React SPA (using Vite & TypeScript). Can be configured as a standalone app or a remote module for a microfrontend architecture."
  tags: ["react", "vite", "typescript", "frontend", "spa", "microfrontend", "remote-module"]
  ownerTeamRef:
    name: "frontend-platform-guild"
    namespace: "platform-admin"
  type: "website" # Can also be 'service' if it's a microfrontend component
  source:
    url: "https://github.com/adhar-platform-templates/react-frontend.git" # Assume this repo now has mife setup options
    path: "/"
    revision: "v1.2.0" # Updated version with MFE capabilities
  parametersSchema:
    openAPIV3Schema:
      type: object
      properties:
        applicationName:
          type: string
          description: "The desired name for the new frontend application (e.g., 'customer-portal-ui', 'profile-mfe')."
          pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
        architecture:
          type: string
          description: "Select the application architecture."
          enum: ["standalone", "microfrontend-remote"]
          default: "standalone"
        hostApplicationScope: # Relevant if microfrontend-remote
          type: string
          description: "If a remote, specify the scope/name of the host application it's intended for (e.g., 'shellApp')."
          default: "shell"
        exposedModuleName: # Relevant if microfrontend-remote
          type: string
          description: "If a remote, the name of the module to expose (e.g., './ProfilePage', './SettingsWidget')."
          default: "./App" # Expose the main App component by default
        includeTailwindCSS:
          type: boolean
          description: "Include Tailwind CSS for styling."
          default: true
        includeRouter:
          type: string
          description: "Select a routing library."
          enum: ["none", "react-router-dom"]
          default: "react-router-dom"
        stateManagement:
          type: string
          description: "Select a state management library."
          enum: ["none", "zustand", "redux-toolkit"]
          default: "zustand"
      required:
        - applicationName
        - architecture
  output:
    repositoryPattern: "{{ organization.name | lower }}-{{ 'mife' if template.parameters.architecture == 'microfrontend-remote' else 'ui' }}-{{ template.parameters.applicationName }}"
    defaultFiles:
      - "vite.config.ts" # This would be configured for Module Federation if 'microfrontend-remote'
      - "package.json"
      - "index.html"
      - "src/main.tsx"
      - "src/App.tsx"
      - ".github/workflows/ci-frontend.yaml"
status:
  observedGeneration: 2 # Incremented due to update
  usageCount: 15 # Example
  conditions:
    - type: "Ready"
      status: "True"
      lastTransitionTime: "2025-05-17T11:30:00Z" # Updated timestamp
      reason: "TemplateAvailable"
      message: "Application template is available for use with microfrontend remote capabilities."