# --- Sample ApplicationTemplate: API Gateway (Spring Cloud Gateway) ---
apiVersion: platform.adhar.com/v1alpha1
kind: ApplicationTemplate
metadata:
  name: "spring-cloud-gateway-template"
  namespace: "platform-templates"
  labels:
    platform.adhar.com/template-type: "api-gateway"
    platform.adhar.com/language: "java"
    platform.adhar.com/framework: "spring-cloud-gateway"
spec:
  displayName: "API Gateway (Spring Cloud Gateway)"
  description: "A template for an API Gateway using Spring Cloud Gateway. Essential for routing to backend microservices. Includes basic routing, filter examples, and service discovery options."
  tags: ["java", "spring-cloud", "api-gateway", "microservices", "edge-service"]
  ownerTeamRef:
    name: "platform-engineering-core-services"
    namespace: "platform-admin"
  type: "service"
  source:
    url: "https://github.com/adhar-platform-templates/spring-cloud-gateway.git"
    path: "/"
    revision: "v1.0.1" # Minor version bump for clarity
  parametersSchema:
    openAPIV3Schema:
      type: object
      properties:
        gatewayName:
          type: string
          description: "The name for the API Gateway instance (e.g., 'main-api-gateway', 'internal-services-gw')."
          pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
        javaVersion:
          type: string
          enum: ["11", "17", "21"]
          default: "17"
        includeRateLimiting:
          type: boolean
          description: "Include basic rate limiting filter example."
          default: true
        includeCircuitBreaker:
          type: boolean
          description: "Include basic circuit breaker filter example."
          default: true
        defaultDiscoveryService:
          type: string
          description: "Service discovery integration (e.g., 'kubernetes', 'eureka', 'consul'). 'kubernetes' implies using K8s service discovery."
          enum: ["kubernetes", "eureka", "consul", "none"]
          default: "kubernetes"
        basePathStrategy:
          type: string
          description: "Strategy for base paths of routed microservices (e.g., '/service-a', '/service-b')."
          enum: ["strip-prefix", "rewrite-path", "none"]
          default: "strip-prefix"
      required:
        - gatewayName
  output:
    repositoryPattern: "{{ organization.name | lower }}-gateway-{{ template.parameters.gatewayName }}"
    defaultFiles:
      - "Dockerfile"
      - "pom.xml"
      - "src/main/resources/application.yml" # Would contain route definitions for microservices
      - "src/main/java/com/example/gateway/GatewayApplication.java"
      - "src/main/java/com/example/gateway/RouteConfiguration.java"
status:
  observedGeneration: 2
  usageCount: 4
  conditions:
    - type: "Ready"
      status: "True"
      lastTransitionTime: "2025-05-17T11:40:00Z"
      reason: "TemplateAvailable"
      message: "Application template is available for use."