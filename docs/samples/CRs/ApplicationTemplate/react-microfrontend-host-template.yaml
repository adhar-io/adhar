# --- Sample ApplicationTemplate: Microfrontend Host (Shell) Application ---
apiVersion: platform.adhar.com/v1alpha1
kind: ApplicationTemplate
metadata:
  name: "react-microfrontend-host-template"
  namespace: "platform-templates"
  labels:
    platform.adhar.com/template-type: "frontend-host"
    platform.adhar.com/language: "javascript"
    platform.adhar.com/framework: "react"
spec:
  displayName: "React Microfrontend Host (Shell)"
  description: "A template for creating a React-based host (or shell) application designed to load and orchestrate remote microfrontend modules using Module Federation (Vite)."
  tags: ["react", "vite", "typescript", "frontend", "microfrontend", "host-shell", "module-federation"]
  ownerTeamRef:
    name: "frontend-platform-guild"
    namespace: "platform-admin"
  type: "website"
  source:
    url: "https://github.com/adhar-platform-templates/react-microfrontend-host.git"
    path: "/"
    revision: "v1.0.0"
  parametersSchema:
    openAPIV3Schema:
      type: object
      properties:
        applicationName:
          type: string
          description: "The name for the host/shell application (e.g., 'main-shell', 'platform-ui-host')."
          pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
        defaultLayout:
          type: string
          description: "Select a default layout structure for the shell."
          enum: ["sidebar-header-content", "header-content-footer", "minimal"]
          default: "sidebar-header-content"
        initialRemoteModules: # Example of defining initial remotes
          type: array
          description: "Define initial remote modules to be configured in the host."
          items:
            type: object
            properties:
              scopeName:
                type: string
                description: "The scope name of the remote module (e.g., 'profileMFE', 'settingsMFE')."
              remoteUrl:
                type: string
                format: uri
                description: "The URL where the remoteEntry.js for the remote module will be hosted (can be a placeholder)."
              exposedModule:
                type: string
                description: "The module exposed by the remote (e.g., './ProfilePage')."
            required:
              - scopeName
              - remoteUrl
              - exposedModule
          default: []
      required:
        - applicationName
  output:
    repositoryPattern: "{{ organization.name | lower }}-host-{{ template.parameters.applicationName }}"
    defaultFiles:
      - "vite.config.ts" # Configured for Module Federation (host)
      - "package.json"
      - "index.html"
      - "src/main.tsx"
      - "src/App.tsx"
      - "src/remotes.d.ts" # TypeScript definitions for remotes
      - "src/bootstrap.tsx"
      - ".github/workflows/ci-host.yaml"
status:
  observedGeneration: 1
  usageCount: 1
  conditions:
    - type: "Ready"
      status: "True"
      lastTransitionTime: "2025-05-17T11:35:00Z"
      reason: "TemplateAvailable"
      message: "Application template for microfrontend host is available."