# --- Sample ApplicationTemplate: Python FastAPI Service ---
apiVersion: platform.adhar.com/v1alpha1
kind: ApplicationTemplate
metadata:
  name: "python-fastapi-service-template"
  namespace: "platform-templates"
  labels:
    platform.adhar.com/template-type: "backend-service"
    platform.adhar.com/language: "python"
    platform.adhar.com/framework: "fastapi"
spec:
  displayName: "Python FastAPI Service"
  description: "A template for creating high-performance Python APIs using FastAPI, with Pydantic for data validation and Uvicorn/Gunicorn for serving."
  tags: ["python", "fastapi", "pydantic", "api", "backend", "uvicorn", "gunicorn"]
  ownerTeamRef:
    name: "python-platform-guild"
    namespace: "platform-admin"
  type: "service"
  source:
    url: "https://github.com/adhar-platform-templates/python-fastapi-service.git"
    path: "/"
    revision: "v1.1.0"
  parametersSchema:
    openAPIV3Schema:
      type: object
      properties:
        serviceName:
          type: string
          description: "The name for the new FastAPI service (e.g., 'recommendation-engine', 'data-validator')."
          pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
        pythonVersion:
          type: string
          description: "Python version to use."
          enum: ["3.8", "3.9", "3.10", "3.11"]
          default: "3.10"
        includeDatabaseIntegration:
          type: string
          description: "Include basic setup for a database ORM/driver."
          enum: ["none", "sqlalchemy-asyncpg", "tortoise-orm", "beanie-mongodb"]
          default: "none"
        includeDockerSetup:
          type: boolean
          description: "Include a Dockerfile and docker-compose.yml for local development."
          default: true
        dependencyManager:
          type: string
          description: "Choose a dependency manager."
          enum: ["pip", "poetry", "pdm"]
          default: "poetry"
      required:
        - serviceName
  output:
    repositoryPattern: "{{ organization.name | lower }}-py-{{ template.parameters.serviceName }}"
    defaultFiles:
      - "{{ 'pyproject.toml' if template.parameters.dependencyManager in ['poetry', 'pdm'] else 'requirements.txt' }}"
      - "Dockerfile"
      - "README.md"
      - "app/main.py"
      - "app/core/config.py"
      - "app/api/v1/endpoints/"
      - ".github/workflows/ci-python.yaml"
status:
  observedGeneration: 1
  usageCount: 0
  conditions:
    - type: "Ready"
      status: "True"
      lastTransitionTime: "2025-05-17T12:20:00Z"
      reason: "TemplateAvailable"
      message: "Python FastAPI service template is available."